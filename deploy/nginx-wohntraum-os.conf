# Nginx Reverse-Proxy für Wohntraum Rheinhessen OS
# Ablage: /etc/nginx/sites-available/wohntraum-os
# Aktivieren: ln -s /etc/nginx/sites-available/wohntraum-os /etc/nginx/sites-enabled/
# Domain unten anpassen!

server {
    listen 80;
    listen [::]:80;
    server_name os.wohntraumrheinhessen.site;

    # Max. Upload-Größe (für DMS-Dateien)
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
