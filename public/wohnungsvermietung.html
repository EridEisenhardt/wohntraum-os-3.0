<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vermietung · Wohnungsvermietung – Macher OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f6f7f9;--surf:#fff;--surf2:#f1f3f6;--line:#e6e8ec;--bord2:#eef0f3;--text:#1c2024;--muted:#6b7280;--dim:#4b5563;--accent:#185fa5;--green:#1f7a4d;--red:#c0392b;--warn:#b45309;--r:8px;--rl:12px;}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px}
.hdr{background:var(--surf);border-bottom:1px solid var(--line);padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.logo{background:#1a1a2e;color:#fff;font-weight:700;font-size:11px;padding:5px 9px;border-radius:4px}.hdr-title{font-size:16px;font-weight:600}.crumb{font-size:11px;color:var(--muted)}
.main{max-width:1280px;margin:0 auto;padding:20px 24px 60px}
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);margin-bottom:16px;overflow:hidden}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.form{padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.fld{display:flex;flex-direction:column;gap:4px}.fld label{font-size:11px;color:var(--muted);font-weight:600}
.fld input,.fld select{font:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:var(--r);background:var(--surf)}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--accent)}
.ck{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--dim)}
.btn{font-size:13px;font-weight:600;padding:9px 15px;border-radius:var(--r);border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer}.btn:hover{opacity:.92}.btn.sec{background:var(--surf2);color:var(--text);border-color:var(--line)}
.foot-row{padding:0 16px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{font-size:11.5px;font-weight:600;padding:5px 10px;border:1px solid var(--line);border-radius:16px;background:var(--surf);color:var(--dim);cursor:pointer;white-space:nowrap}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}.chip .c{opacity:.7;font-weight:700;margin-left:3px}
.wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.wc{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);padding:13px 15px}
.wc.frei{border-left:4px solid var(--green)}
.wc-hd{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.wc-title{font-weight:700;flex:1;min-width:140px;font-size:13.5px}
.wc-row{display:grid;grid-template-columns:110px 1fr;gap:8px;align-items:center;margin:5px 0;font-size:12.5px}
.wc-row label{color:var(--muted);font-size:11px;font-weight:600}
.inl{width:100%;border:1px solid transparent;background:transparent;font:inherit;font-size:12.5px;border-radius:5px;padding:4px 6px}
.inl:hover{border-color:var(--line)}.inl:focus{outline:none;border-color:var(--accent);background:var(--surf2)}
select.inl.st{font-weight:700;color:var(--accent);border-color:var(--line);background:var(--surf2)}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:11px;font-weight:600;background:#eef3fb;color:var(--accent);border:1px solid #cfe0f3;border-radius:12px;padding:2px 4px 2px 9px;display:flex;align-items:center;gap:4px}
.tag b{cursor:pointer;color:var(--muted)}.tag b:hover{color:var(--red)}
.abtn{font-size:12px;padding:3px 8px;border-radius:5px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer}.abtn:hover{color:var(--red);border-color:var(--red)}
.empty{text-align:center;padding:26px;color:var(--muted)}
.tblwrap{overflow-x:auto;background:var(--surf);border:1px solid var(--line);border-radius:12px}
.vtbl{width:100%;border-collapse:collapse;font-size:12.5px;min-width:1550px}
.vtbl th,.vtbl td{padding:7px 8px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
.vtbl th{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700;background:var(--surf2)}
.vtbl tbody tr:hover td{background:#fafbfc}
.vtbl tr.frei td{background:#f2fbf6}
.vtbl input,.vtbl select{font:inherit;font-size:12.5px;padding:4px 6px;border:1px solid transparent;border-radius:6px;background:transparent;width:100%;color:inherit}
.vtbl input:hover,.vtbl select:hover{border-color:var(--line)}
.vtbl td input[type=text],.vtbl td input:not([type]){min-width:150px}
.vtbl input:focus,.vtbl select:focus{border-color:var(--accent);background:var(--surf);outline:none}
.vtbl input[type=checkbox]{width:15px;height:15px}
.abtn{font:inherit;font-size:12px;padding:3px 8px;border-radius:5px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer}
.abtn:hover{color:var(--red);border-color:var(--red)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--line);border-radius:var(--r);padding:10px 20px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:99}.toast.show{opacity:1}
.viewtoggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:12px}
.viewtoggle button{font:inherit;font-size:12px;font-weight:600;padding:6px 14px;border:none;background:var(--surf);color:var(--dim);cursor:pointer}.viewtoggle button.on{background:var(--accent);color:#fff}
.kb{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kbcol{flex:0 0 240px;background:var(--surf2);border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;max-height:72vh}
.kbcol.over{outline:2px dashed var(--accent);outline-offset:-2px}
.kbcolhd{padding:9px 12px;font-size:11.5px;font-weight:700;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:6px}.kbcolhd span.n{color:var(--muted)}
.kbcolbd{padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:40px}
.kbcard{background:var(--surf);border:1px solid var(--line);border-radius:8px;padding:9px 10px;cursor:grab;box-shadow:0 1px 2px rgba(0,0,0,.04)}.kbcard:active{cursor:grabbing}.kbcard.frei{border-left:3px solid var(--green)}
.kbt{font-weight:600;font-size:12.5px}.kbm{font-size:11px;color:var(--muted);margin-top:2px}
.kbtag{display:inline-block;font-size:10px;font-weight:600;background:#eef3fb;color:var(--accent);border-radius:10px;padding:1px 7px;margin:5px 4px 0 0}
.kbnil{color:var(--muted);font-size:11px;text-align:center;padding:8px}
</style></head><body>
<div class="hdr"><div class="logo">MACHER OS</div><div>
  <div class="crumb">Vermietung › Wohnungsvermietung</div>
  <div class="hdr-title">Wohnungsvermietung – Prozess</div></div></div>
<div class="main">
  <div class="card" style="margin-bottom:16px">
    <div class="card-hd"><span>📆 Vermietungshorizont
      <span style="display:inline-flex;align-items:center;gap:6px;margin-left:8px">
        <button class="chip" onclick="vhYear(-1)" style="padding:3px 9px">‹</button>
        <b id="vhYear">2026</b>
        <button class="chip" onclick="vhYear(1)" style="padding:3px 9px">›</button>
      </span></span>
      <span class="crumb" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">Klick auf Einheit ändert Status:
        <span style="background:#e5e7eb;color:#374151;padding:1px 7px;border-radius:10px;font-weight:600">noch nichts</span>
        <span style="background:#fde68a;color:#92400e;padding:1px 7px;border-radius:10px;font-weight:600">in Arbeit</span>
        <span style="background:#bbf7d0;color:#166534;padding:1px 7px;border-radius:10px;font-weight:600">vorbereitet</span>
        <span style="background:#bfdbfe;color:#1e40af;padding:1px 7px;border-radius:10px;font-weight:600">umgesetzt</span>
      </span>
    </div>
    <div style="overflow-x:auto">
      <table class="vtbl" id="vhTbl" style="width:100%;border-collapse:collapse;font-size:12.5px">
        <thead><tr id="vhHead"></tr></thead>
        <tbody id="vhBody"></tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <div class="card-hd">Neue Einheit in den Vermietungsprozess</div>
    <div class="form">
      <div class="fld"><label>Gebäude</label><select id="f_geb" onchange="fillEinheit()"></select></div>
      <div class="fld"><label>Wohnungseinheit</label><select id="f_einheit"></select></div>
      <div class="fld"><label>Grund der Vermietung</label><input id="f_grund" placeholder="z. B. Kündigung Mieter"></div>
      <div class="fld"><label>Mieterzielgruppe</label><input id="f_ziel" placeholder="z. B. Familie / Single / Sozial"></div>
      <div class="fld"><label>Einzugsdatum</label><input type="date" id="f_einzug"></div>
      <div class="fld"><label>Auszugsdatum (Vormieter)</label><input type="date" id="f_auszug"></div>
      <div class="fld"><label>Status</label><select id="f_status"></select></div>
      <div class="fld"><label>Name des Vormieters</label><input id="f_vormieter" placeholder="Vormieter"></div>
    </div>
    <div class="foot-row">
      <button class="btn" onclick="save()">+ Einheit anlegen</button>
      <button class="btn sec" onclick="addGebaeude()">+ Gebäude</button>
      <button class="btn sec" onclick="addEinheit()">+ Einheit zum Gebäude</button>
      <span id="msg" style="font-size:12px;color:var(--green)"></span>
    </div>
  </div>

  <div class="viewtoggle"><button id="vListe" class="on" onclick="setView('liste')">Karten</button><button id="vTab" onclick="setView('tabelle')">Liste</button><button id="vBoard" onclick="setView('board')">Kanban-Board</button><button onclick="exportCRM()" title="Gefilterte Einheiten als CSV für den CRM-Import herunterladen">⬇ CRM Export</button><label style="display:inline-flex;align-items:center;gap:6px;margin-left:auto;font-size:13px;cursor:pointer;color:var(--dim)"><input type="checkbox" id="hideDone" onchange="HIDE_DONE=this.checked;render()"> Erledigte ausblenden</label></div>
  <div class="chips" id="stageChips"></div>
  <div id="grid"><div class="empty" id="loading">Lädt…</div></div>
</div><div class="toast" id="toast"></div>
<script>
const sb=window.supabase.createClient('https://jqzxctfqvcwbctpjksvg.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxenhjdGZxdmN3YmN0cGprc3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzA0MzIsImV4cCI6MjA5NzcwNjQzMn0.RKIbZxJdusKWWPjBJqlxZ8e1m8So02UslOg55YRsn3o');
const $=id=>document.getElementById(id);const esc=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
/* ---------- Vermietungshorizont (einzelne Einheiten mit Status-Klick) ---------- */
const VHMON=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const VHROWS=[['rueck','↩︎ Rückläufer (Einheiten zurück)'],['vermietet','🔑 Neuvermietung'],['sanierung','🏗 Rückkehr aus Sanierung']];
const VHSTAT=['grau','gelb','gruen','blau'];
const VHSTYLE={grau:'background:#e5e7eb;color:#374151',gelb:'background:#fde68a;color:#92400e',gruen:'background:#bbf7d0;color:#166534',blau:'background:#bfdbfe;color:#1e40af'};
const VHNEXT={grau:'gelb',gelb:'gruen',gruen:'blau',blau:'grau'};
let VHY=new Date().getFullYear(), VHE=[];
function vhYear(d){VHY+=d;vhLoad();}
async function vhLoad(){
  $('vhYear').textContent=VHY;
  const {data}=await sb.from('vermietungshorizont_einheiten').select('*').eq('jahr',VHY).order('pos').order('created_at');
  VHE=data||[]; vhRender();
}
function vhRender(){
  $('vhHead').innerHTML='<th style="text-align:left;padding:6px 8px;min-width:150px"></th>'+VHMON.map(m=>'<th style="padding:6px 6px;text-align:center;border-bottom:1px solid var(--line);color:var(--muted);font-weight:700;min-width:96px">'+m+'</th>').join('');
  $('vhBody').innerHTML=VHROWS.map(function(rw){
    return '<tr><td style="font-weight:600;padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:top">'+rw[1]+'</td>'
      +VHMON.map(function(m,i){var mo=i+1;
        var items=VHE.filter(function(e){return e.monat===mo&&e.kategorie===rw[0];});
        var chips=items.map(function(e){
          var st=VHSTYLE[e.status]||VHSTYLE.grau;
          return '<span title="Klick = Status ändern" onclick="vhCycle(\''+e.id+'\')" style="'+st+';display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:12px;margin:2px 3px 0 0;cursor:pointer">'+esc(e.einheit||'—')
            +'<b onclick="event.stopPropagation();vhDel(\''+e.id+'\')" style="cursor:pointer;opacity:.6">×</b></span>';
        }).join('');
        return '<td style="padding:4px;border-bottom:1px solid var(--line);vertical-align:top">'+chips
          +'<div><button class="chip" style="padding:2px 8px;font-size:11px;margin-top:3px" onclick="vhAdd('+mo+',\''+rw[0]+'\')">＋</button></div></td>';
      }).join('')+'</tr>';
  }).join('');
}
async function vhAdd(monat,kat){
  var name=(prompt('Einheit (z. B. Rh24 WE1):')||'').trim(); if(!name)return;
  var res=await sb.from('vermietungshorizont_einheiten').insert({jahr:VHY,monat:monat,kategorie:kat,einheit:name,status:'grau',pos:VHE.length+1}).select();
  if(res.error){toast('Fehler: '+res.error.message);return;}
  VHE.push(res.data[0]); vhRender();
}
async function vhCycle(id){
  var e=VHE.find(function(x){return x.id===id;}); if(!e)return;
  e.status=VHNEXT[e.status]||'grau'; vhRender();
  var res=await sb.from('vermietungshorizont_einheiten').update({status:e.status}).eq('id',id);
  if(res.error)toast('Fehler: '+res.error.message);
}
async function vhDel(id){
  var res=await sb.from('vermietungshorizont_einheiten').delete().eq('id',id);
  if(res.error){toast('Fehler: '+res.error.message);return;}
  VHE=VHE.filter(function(x){return x.id!==id;}); vhRender();
}

const STAGES=['1 · Eingang der Kündigung','2 · Kalkulation der neuen Wohnung','3 · Einheit in Vermietung','4 · Mietvertrag erstellen & unterschreiben','5 · Schlüsselübergabe','6 · 1. Mietzahlung','7 · Nacharbeit Backoffice / HV','8 · Erledigt','A · Warteliste','B · Renovierung / Sanierung','C · Leerstand'];
let ROWS=[],GEB=[],EINH=[],INT=[],VL=[],NOTIZ=[],FSTAGE='',HIDE_DONE=false;
function fmtDT(ts){try{return new Date(ts).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})+' Uhr';}catch(e){return ts;}}
async function addNotiz(vid,el){const t=(el.value||'').trim();if(!t)return;const{data,error}=await sb.from('vermietung_notizen').insert({vermietung_id:vid,text:t}).select();if(error){toast('Fehler: '+error.message);return;}if(data&&data[0])NOTIZ.unshift(data[0]);el.value='';render();}
async function delNotiz(id){if(!confirm('Notiz löschen?'))return;await sb.from('vermietung_notizen').delete().eq('id',id);NOTIZ=NOTIZ.filter(n=>n.id!==id);render();}
function notizBlock(vid){const list=NOTIZ.filter(n=>n.vermietung_id===vid);
  const items=list.map(n=>`<div style="border-left:2px solid var(--line);padding:2px 0 4px 8px;margin-bottom:4px"><div style="font-size:10.5px;color:var(--muted)">${fmtDT(n.created_at)} <b style="cursor:pointer;color:#c0392b;float:right" onclick="delNotiz('${n.id}')">×</b></div><div style="font-size:12px;white-space:pre-wrap">${esc(n.text)}</div></div>`).join('')||'<span style="color:var(--muted);font-size:11px">noch keine Notizen</span>';
  return `<div class="wc-row" style="grid-template-columns:110px 1fr;align-items:start"><label>Notizen</label><div>
    <div style="max-height:150px;overflow:auto;margin-bottom:5px">${items}</div>
    <textarea class="inl" rows="2" placeholder="Neue Notiz … (wird mit Datum & Uhrzeit gespeichert)" style="resize:vertical;width:100%"></textarea>
    <button class="btn sec" style="margin-top:4px;font-size:12px" onclick="var t=this.previousElementSibling;addNotiz('${vid}',t)">+ Notiz speichern</button>
  </div></div>`;}
const DONE='8 · Erledigt';
function baseList(){let a=FSTAGE?ROWS.filter(r=>r.status===FSTAGE):ROWS;if(HIDE_DONE&&FSTAGE!==DONE)a=a.filter(r=>r.status!==DONE);return a;}
function optlist(arr,sel){return arr.map(o=>`<option ${o===sel?'selected':''}>${esc(o)}</option>`).join('');}
function unitsOf(g){return EINH.filter(e=>e.gebaeude===g).map(e=>e.name);}
function fillEinheit(){const g=$('f_geb').value;$('f_einheit').innerHTML='<option value="">—</option>'+unitsOf(g).map(u=>`<option>${esc(u)}</option>`).join('');}
function clearForm(){['f_grund','f_ziel','f_einzug','f_auszug','f_vormieter'].forEach(id=>$(id).value='');$('msg').textContent='';}
async function loadRefs(){
  const[g,e,i,v,nz]=await Promise.all([
    sb.from('gebaeude').select('name').order('pos').order('name'),
    sb.from('wohneinheiten').select('gebaeude,name').order('name'),
    sb.from('mietinteressenten').select('id,name,status').order('created_at',{ascending:false}),
    sb.from('vermietung_leads').select('id,vermietung_id,interessent_id'),
    sb.from('vermietung_notizen').select('*').order('created_at',{ascending:false})
  ]);
  GEB=(g.data||[]).map(r=>r.name);EINH=e.data||[];INT=i.data||[];VL=v.data||[];NOTIZ=nz.data||[];
  $('f_geb').innerHTML='<option value="">—</option>'+GEB.map(x=>`<option>${esc(x)}</option>`).join('');
  $('f_status').innerHTML=optlist(STAGES,STAGES[0]);
  fillEinheit();
}
async function load(){
  await loadRefs();
  const{data,error}=await sb.from('wohnungsvermietung').select('*').order('created_at',{ascending:false});
  if(error){$('grid').innerHTML='<div class="empty">Fehler: '+esc(error.message)+'</div>';return;}
  ROWS=data||[];render();
}
async function addGebaeude(){const n=(prompt('Neues Gebäude / Immobilie:')||'').trim();if(!n)return;const{error}=await sb.from('gebaeude').insert({name:n,pos:99});if(error){toast(error.message);return;}await loadRefs();$('f_geb').value=n;fillEinheit();}
async function addEinheit(){const g=$('f_geb').value;if(!g){toast('Erst Gebäude wählen');return;}const n=(prompt('Neue Wohnungseinheit für „'+g+'":')||'').trim();if(!n)return;const{error}=await sb.from('wohneinheiten').insert({gebaeude:g,name:n});if(error){toast(error.message);return;}await loadRefs();$('f_geb').value=g;fillEinheit();$('f_einheit').value=n;render();}
async function save(){
  const row={gebaeude:$('f_geb').value||null,einheit:$('f_einheit').value||null,grund:$('f_grund').value.trim()||null,zielgruppe:$('f_ziel').value.trim()||null,einzug:$('f_einzug').value||null,auszug:$('f_auszug').value||null,status:$('f_status').value,vormieter:$('f_vormieter').value.trim()||null,freigabe:false};
  if(!row.gebaeude){toast('Bitte Gebäude wählen');return;}
  const{error}=await sb.from('wohnungsvermietung').insert(row);
  if(error){$('msg').style.color='var(--red)';$('msg').textContent='Fehler: '+error.message;return;}
  $('msg').style.color='var(--green)';$('msg').textContent='Einheit angelegt ✓';clearForm();load();
}
async function upd(id,field,val){const{error}=await sb.from('wohnungsvermietung').update({[field]:(val===''?null:val),updated_at:new Date().toISOString()}).eq('id',id);if(error){toast('Fehler: '+error.message);return;}const r=ROWS.find(x=>x.id===id);if(r){r[field]=(val===''?null:val);if(field==='status'||field==='gebaeude')render();}}
async function toggleFreigabe(id,val){await sb.from('wohnungsvermietung').update({freigabe:val,updated_at:new Date().toISOString()}).eq('id',id);const r=ROWS.find(x=>x.id===id);if(r)r.freigabe=val;render();}
async function del(id){if(!confirm('Einheit aus dem Prozess löschen?'))return;await sb.from('wohnungsvermietung').delete().eq('id',id);ROWS=ROWS.filter(r=>r.id!==id);VL=VL.filter(v=>v.vermietung_id!==id);render();}
async function addLead(vid,iid){if(!iid)return;const{data,error}=await sb.from('vermietung_leads').insert({vermietung_id:vid,interessent_id:iid}).select();if(error){toast(error.message);return;}if(data&&data[0])VL.push(data[0]);render();}
async function delLead(linkId){await sb.from('vermietung_leads').delete().eq('id',linkId);VL=VL.filter(v=>v.id!==linkId);render();}
function intName(iid){const i=INT.find(x=>x.id===iid);return i?(i.name||'(ohne Name)'):'(unbekannt)';}
function intOpts(sel){return '<option value="">— nicht gewählt —</option>'+INT.map(i=>`<option value="${i.id}" ${i.id===sel?'selected':''}>${esc(i.name||'(ohne Name)')}${i.status?' · '+esc(i.status):''}</option>`).join('');}
function renderChips(){
  const cnt={};STAGES.forEach(s=>cnt[s]=0);ROWS.forEach(r=>{if(cnt[r.status]!=null)cnt[r.status]++;});
  const chip=(val,lbl,n)=>`<span class="chip ${FSTAGE===val?'on':''}" onclick="FSTAGE='${esc(val).replace(/'/g,"\\'")}';render()">${lbl}<span class="c">${n}</span></span>`;
  $('stageChips').innerHTML=chip('','Alle',ROWS.length)+STAGES.map(s=>chip(s,esc(s),cnt[s])).join('');
}
let VIEW='liste', DRAG=null;
function setView(v){VIEW=v;$('vListe').classList.toggle('on',v==='liste');$('vTab').classList.toggle('on',v==='tabelle');$('vBoard').classList.toggle('on',v==='board');render();}
function dragStart(ev,id){DRAG=id;ev.dataTransfer.effectAllowed='move';}
function allowDrop(ev,el){ev.preventDefault();if(el)el.classList.add('over');}
function dragLeave(el){if(el)el.classList.remove('over');}
function drop(ev,stage,el){ev.preventDefault();if(el)el.classList.remove('over');if(DRAG){upd(DRAG,'status',stage);DRAG=null;}}

// ——— CRM Export (CSV, Excel-kompatibel) ———
function csvCell(v){const s=(v==null?'':String(v));return '"'+s.replace(/"/g,'""')+'"';}
function csvDownload(dateiname,header,zeilen){
  const txt=[header].concat(zeilen).map(r=>r.map(csvCell).join(';')).join('\r\n');
  const blob=new Blob(['\ufeff'+txt],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=dateiname+'_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
}
function exportCRM(){
  const list=baseList();
  if(!list.length){toast('Keine Einheiten zum Exportieren');return;}
  const header=['Gebaeude','Einheit','Status','Vormieter','Grund der Vermietung','Mieterzielgruppe',
    'Auszug Vormieter','Einzugsdatum','Interessenten','Reserviert','Mietvertrag & Einzug','Freigabe','Angelegt am'];
  const zeilen=list.map(r=>[r.gebaeude,r.einheit,r.status,r.vormieter,r.grund,r.zielgruppe,
    r.auszug,r.einzug,VL.filter(v=>v.vermietung_id===r.id).map(v=>intName(v.interessent_id)).join(' | '),
    r.reserviert_id?intName(r.reserviert_id):'',r.finaler_mieter_id?intName(r.finaler_mieter_id):'',
    r.freigabe?'Ja':'Nein',(r.created_at||'').slice(0,10)]);
  csvDownload('crm_export_wohnungsvermietung',header,zeilen);
  toast(list.length+' Einheit(en) exportiert ✓');
}
function boardView(){
  return '<div class="kb">'+STAGES.map(s=>{const list=(HIDE_DONE&&s===DONE)?[]:ROWS.filter(r=>r.status===s);const se=esc(s).replace(/'/g,"\\'");
    const cards=list.map(r=>{const linked=VL.filter(v=>v.vermietung_id===r.id).length;
      return `<div class="kbcard ${r.freigabe?'frei':''}" draggable="true" ondragstart="dragStart(event,'${r.id}')">
        <div class="kbt">🏠 ${esc(r.gebaeude||'—')}</div>
        <div class="kbm">${esc(r.einheit||'—')}${r.vormieter?' · Vormieter: '+esc(r.vormieter):''}</div>
        ${r.zielgruppe?`<span class="kbtag">${esc(r.zielgruppe)}</span>`:''}${r.freigabe?'<span class="kbtag" style="background:#e8f6ee;color:var(--green)">Freigabe ✓</span>':''}${linked?`<span class="kbtag">${linked} Interessent${linked>1?'en':''}</span>`:''}
      </div>`;}).join('');
    return `<div class="kbcol" ondragover="allowDrop(event,this)" ondragleave="dragLeave(this)" ondrop="drop(event,'${se}',this)">
      <div class="kbcolhd"><span>${esc(s)}</span><span class="n">${list.length}</span></div>
      <div class="kbcolbd">${cards||'<div class="kbnil">—</div>'}</div></div>`;}).join('')+'</div>';
}
function fmtD(d){if(!d)return '—';const p=String(d).split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0]:d;}
function tableView(list){
  return '<div class="tblwrap"><table class="vtbl"><thead><tr>'
    +'<th>Gebäude</th><th>Einheit</th><th>Status</th><th>Vormieter</th><th>Grund</th><th>Zielgruppe</th>'
    +'<th>Auszug</th><th>Einzug</th><th>Interessenten</th><th>Reserviert</th><th>Mietvertrag &amp; Einzug</th><th>Freigabe</th><th></th></tr></thead><tbody>'
    +list.map(r=>{
      const units=unitsOf(r.gebaeude);
      const linked=VL.filter(v=>v.vermietung_id===r.id);
      return `<tr class="${r.freigabe?'frei':''}">
        <td><select style="min-width:240px" onchange="upd('${r.id}','gebaeude',this.value)"><option value="">—</option>${GEB.map(g=>`<option ${g===r.gebaeude?'selected':''}>${esc(g)}</option>`).join('')}</select></td>
        <td><select style="min-width:150px" onchange="upd('${r.id}','einheit',this.value)"><option value="">—</option>${units.map(u=>`<option ${u===r.einheit?'selected':''}>${esc(u)}</option>`).join('')}</select></td>
        <td><select onchange="upd('${r.id}','status',this.value)">${optlist(STAGES,r.status)}</select></td>
        <td><input value="${esc(r.vormieter)}" onchange="upd('${r.id}','vormieter',this.value)"></td>
        <td><input value="${esc(r.grund)}" onchange="upd('${r.id}','grund',this.value)"></td>
        <td><input value="${esc(r.zielgruppe)}" onchange="upd('${r.id}','zielgruppe',this.value)"></td>
        <td><input type="date" value="${r.auszug||''}" onchange="upd('${r.id}','auszug',this.value)"></td>
        <td><input type="date" value="${r.einzug||''}" onchange="upd('${r.id}','einzug',this.value)"></td>
        <td>${linked.length?linked.map(v=>esc(intName(v.interessent_id))).join(', '):'<span style="color:var(--muted)">—</span>'}</td>
        <td><select onchange="upd('${r.id}','reserviert_id',this.value)">${intOpts(r.reserviert_id)}</select></td>
        <td><select onchange="upd('${r.id}','finaler_mieter_id',this.value)">${intOpts(r.finaler_mieter_id)}</select></td>
        <td style="text-align:center"><input type="checkbox" ${r.freigabe?'checked':''} onchange="toggleFreigabe('${r.id}',this.checked)"></td>
        <td><button class="abtn" onclick="del('${r.id}')">✕</button></td></tr>`;}).join('')
    +'</tbody></table></div>';
}
function render(){
  renderChips();
  $('stageChips').style.display=VIEW==='board'?'none':'flex';
  if(VIEW==='board'){$('grid').innerHTML=ROWS.length?boardView():'<div class="empty">Noch keine Einheiten im Prozess — oben anlegen.</div>';return;}
  const list=baseList();
  if(!ROWS.length){$('grid').innerHTML='<div class="empty">Noch keine Einheiten im Prozess — oben anlegen.</div>';return;}
  if(!list.length){$('grid').innerHTML='<div class="empty">Keine Einheiten in dieser Stufe.</div>';return;}
  if(VIEW==='tabelle'){$('grid').innerHTML=tableView(list);return;}
  $('grid').innerHTML='<div class="wgrid">'+list.map(r=>{
    const units=unitsOf(r.gebaeude);
    const linked=VL.filter(v=>v.vermietung_id===r.id);
    const linkedIds=new Set(linked.map(v=>v.interessent_id));
    const addable=INT.filter(i=>!linkedIds.has(i.id));
    return `<div class="wc ${r.freigabe?'frei':''}">
      <div class="wc-hd">
        <span class="wc-title">🏠 ${esc(r.gebaeude||'—')}</span>
        <button class="abtn" onclick="del('${r.id}')">✕</button>
      </div>
      <div class="wc-row"><label>Einheit</label><select class="inl" onchange="upd('${r.id}','einheit',this.value)"><option value="">—</option>${units.map(u=>`<option ${u===r.einheit?'selected':''}>${esc(u)}</option>`).join('')}</select></div>
      <div class="wc-row"><label>Status</label><select class="inl st" onchange="upd('${r.id}','status',this.value)">${optlist(STAGES,r.status)}</select></div>
      <div class="wc-row"><label>Vormieter</label><input class="inl" value="${esc(r.vormieter)}" placeholder="Name des Vormieters" onchange="upd('${r.id}','vormieter',this.value)"></div>
      <div class="wc-row"><label>Grund</label><input class="inl" value="${esc(r.grund)}" placeholder="Grund der Vermietung" onchange="upd('${r.id}','grund',this.value)"></div>
      <div class="wc-row"><label>Zielgruppe</label><input class="inl" value="${esc(r.zielgruppe)}" placeholder="Mieterzielgruppe" onchange="upd('${r.id}','zielgruppe',this.value)"></div>
      <div class="wc-row"><label>Einzug</label><input class="inl" type="date" value="${r.einzug||''}" onchange="upd('${r.id}','einzug',this.value)"></div>
      <div class="wc-row"><label>Auszug</label><input class="inl" type="date" value="${r.auszug||''}" onchange="upd('${r.id}','auszug',this.value)"></div>
      <div class="wc-row"><label>Freigabe</label><span class="ck"><input type="checkbox" ${r.freigabe?'checked':''} onchange="toggleFreigabe('${r.id}',this.checked)"> für Einzug (alle Mängel beseitigt)</span></div>
      <div class="wc-row" style="grid-template-columns:110px 1fr;align-items:start"><label>Interessenten</label><div>
        <div class="tags">${linked.length?linked.map(v=>`<span class="tag">${esc(intName(v.interessent_id))} <b onclick="delLead('${v.id}')">×</b></span>`).join(''):'<span style="color:var(--muted);font-size:11px">keine verknüpft</span>'}</div>
        <select class="inl" style="margin-top:5px" onchange="addLead('${r.id}',this.value);this.value=''"><option value="">+ Interessent verknüpfen…</option>${addable.map(i=>`<option value="${i.id}">${esc(i.name||'(ohne Name)')}${i.status?' · '+esc(i.status):''}</option>`).join('')}</select>
      </div></div>
      <div class="wc-row"><label>Reserviert</label><select class="inl" onchange="upd('${r.id}','reserviert_id',this.value)">${intOpts(r.reserviert_id)}</select></div>
      <div class="wc-row"><label>Mietvertrag &amp; Einzug</label><select class="inl" onchange="upd('${r.id}','finaler_mieter_id',this.value)">${intOpts(r.finaler_mieter_id)}</select></div>
      ${notizBlock(r.id)}
    </div>`;}).join('')+'</div>';
}
(async()=>{const{data:{session}}=await sb.auth.getSession();if(!session){$('main').innerHTML='<div class="empty" style="padding:60px">Bitte zuerst im OS einloggen.</div>';return;}clearForm();$('f_einzug').value='';load();vhLoad();})();
</script></body></html>
