<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vermietung · Mietinteressenten – Macher OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f6f7f9;--surf:#fff;--surf2:#f1f3f6;--line:#e6e8ec;--bord2:#eef0f3;--text:#1c2024;--muted:#6b7280;--dim:#4b5563;--accent:#185fa5;--green:#1f7a4d;--red:#c0392b;--warn:#b45309;--r:8px;--rl:12px;}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px}
.hdr{background:var(--surf);border-bottom:1px solid var(--line);padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.logo{background:#1a1a2e;color:#fff;font-weight:700;font-size:11px;padding:5px 9px;border-radius:4px}.hdr-title{font-size:16px;font-weight:600}.crumb{font-size:11px;color:var(--muted)}
.main{max-width:1360px;margin:0 auto;padding:20px 24px 60px}
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);margin-bottom:16px;overflow:hidden}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.form{padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:11px;color:var(--muted);font-weight:600}
.fld input,.fld select{font:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:var(--r);background:var(--surf)}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--accent)}
.btn{font-size:13px;font-weight:600;padding:9px 15px;border-radius:var(--r);border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer}.btn:hover{opacity:.92}.btn.sec{background:var(--surf2);color:var(--text);border-color:var(--line)}
.foot-row{padding:0 16px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{font-size:11.5px;font-weight:600;padding:5px 10px;border:1px solid var(--line);border-radius:16px;background:var(--surf);color:var(--dim);cursor:pointer;white-space:nowrap}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}.chip .c{opacity:.7;font-weight:700;margin-left:3px}
.tablewrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:1200px}
th,td{padding:7px 9px;text-align:left;border-bottom:1px solid var(--bord2);white-space:nowrap;vertical-align:middle}
th{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700;background:var(--surf2)}
tbody tr.res-absage td{background:#fbf4f4}
tbody tr.res-warte td{background:#fef9ec}
input.inl,select.inl{border:1px solid transparent;background:transparent;font:inherit;font-size:12.5px;border-radius:5px;padding:4px 6px;max-width:100%}
input.inl:hover,select.inl:hover{border-color:var(--line)}input.inl:focus,select.inl:focus{outline:none;border-color:var(--accent);background:var(--surf2)}
select.inl.st{font-weight:700;color:var(--accent);border-color:var(--line);background:var(--surf2)}
.abtn{font-size:12px;padding:3px 8px;border-radius:5px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer}.abtn:hover{color:var(--red);border-color:var(--red)}
.empty{text-align:center;padding:26px;color:var(--muted)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--line);border-radius:var(--r);padding:10px 20px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:99}.toast.show{opacity:1}
.ntbtn{font-size:12px;font-weight:600;padding:4px 9px;border-radius:6px;border:1px solid var(--line);background:var(--surf);color:var(--dim);cursor:pointer;white-space:nowrap}.ntbtn:hover{border-color:var(--accent);color:var(--accent)}.ntbtn .c{font-weight:700;color:var(--accent)}
.ov{position:fixed;inset:0;background:rgba(20,25,35,.45);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:40px 16px;overflow:auto}.ov.show{display:flex}
.dlg{background:var(--surf);border-radius:12px;width:100%;max-width:780px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.opgrid{display:grid;grid-template-columns:1fr 1fr;gap:2px 18px}
.opf{border-bottom:1px solid var(--bord2);padding:6px 0}
.opl{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700}
.opv{font-size:13px}
.nrcell{color:var(--muted);font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.nrbadge{display:inline-block;font-size:10.5px;font-weight:700;color:var(--muted);background:var(--surf2);border-radius:5px;padding:1px 5px;margin-right:2px}
.umzugbadge{display:inline-block;font-size:9.5px;font-weight:700;color:#155e75;background:#e0f2f7;border-radius:5px;padding:1px 5px;margin-left:5px;white-space:nowrap}
.opi{width:100%;font:inherit;font-size:13px;padding:4px 6px;border:1px solid transparent;border-radius:6px;background:transparent;color:inherit}
.opi:hover{border-color:var(--line)}
.opi:focus{border-color:var(--accent);background:var(--surf);outline:none}
.secttl{font-weight:700;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin:16px 0 8px;border-top:1px solid var(--line);padding-top:12px}
.opennm{color:var(--accent);cursor:pointer;font-weight:600;text-decoration:none}.opennm:hover{text-decoration:underline}
.dlg-hd{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-weight:700}
.dlg-bd{padding:16px 18px;max-height:60vh;overflow:auto}
.note{border:1px solid var(--bord2);border-left:3px solid var(--accent);border-radius:8px;padding:9px 12px;margin-bottom:10px;background:var(--surf2)}
.note .ts{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px}.note .tx{font-size:13px;white-space:pre-wrap;line-height:1.45}
.note .x{float:right;color:var(--muted);cursor:pointer;font-size:12px}.note .x:hover{color:var(--red)}
.dlg-ft{padding:12px 18px;border-top:1px solid var(--line)}
.dlg-ft textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font:inherit;font-size:13px;resize:vertical}
.viewtoggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:12px}
.viewtoggle button{font:inherit;font-size:12px;font-weight:600;padding:6px 14px;border:none;background:var(--surf);color:var(--dim);cursor:pointer}.viewtoggle button.on{background:var(--accent);color:#fff}
.kb{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kbcol{flex:0 0 236px;background:var(--surf2);border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;max-height:72vh}
.kbcol.over{outline:2px dashed var(--accent);outline-offset:-2px}
.kbcolhd{padding:9px 12px;font-size:11.5px;font-weight:700;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:6px}.kbcolhd span{color:var(--muted)}
.kbcolbd{padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:40px}
.kbcard{background:var(--surf);border:1px solid var(--line);border-radius:8px;padding:9px 10px;cursor:grab;box-shadow:0 1px 2px rgba(0,0,0,.04)}.kbcard:active{cursor:grabbing}
.kbt{font-weight:600;font-size:12.5px}.kbm{font-size:11px;color:var(--muted);margin-top:2px}
.kbtag{display:inline-block;font-size:10px;font-weight:600;background:#eef3fb;color:var(--accent);border-radius:10px;padding:1px 7px;margin:5px 4px 0 0}.kbtag.warn{background:#fdeeee;color:var(--red)}
.kbnote{margin-top:6px;font-size:11px;padding:2px 8px;border-radius:5px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer}
.kbnil{color:var(--muted);font-size:11px;text-align:center;padding:8px}
</style></head><body>
<div class="hdr"><div class="logo">MACHER OS</div><div>
  <div class="crumb">Vermietung › Mietinteressenten</div>
  <div class="hdr-title">Mietinteressenten – Lead-Funnel</div></div></div>
<div class="main">
  <div class="card">
    <div class="card-hd">Neuen Lead erfassen</div>
    <div class="form">
      <div class="fld"><label>Art des Interessenten</label><select id="f_typ" onchange="typToggle()"><option value="neu">Neu-Interessent</option><option value="umzug">Bestandsmieter · Umzugswunsch</option></select></div>
      <div class="fld"><label>Name / Interessent</label><input id="f_name" placeholder="Name"></div>
      <div class="fld"><label>Kontakt (Tel./E-Mail)</label><input id="f_kontakt" placeholder="Kontakt"></div>
      <div class="fld"><label>Lead-Eingang</label><input type="date" id="f_eingang"></div>
      <div class="fld"><label>Leadquelle</label><select id="f_quelle"></select></div>
      <div class="fld"><label>Personenanzahl</label><input type="number" id="f_personen" min="0" step="1" placeholder="z. B. 2"></div>
      <div class="fld"><label>Einzug ab</label><input id="f_einzug" placeholder="z. B. 01.09.2026 / sofort"></div>
      <div class="fld"><label>Art der Mietzahlung</label><select id="f_zahlart"></select></div>
      <div class="fld umzugfld" style="display:none"><label>Aktuelles Objekt / Wohnung</label><input id="f_aktobj" placeholder="z. B. Haus Alzeyer Str. 4, WE 2"></div>
      <div class="fld umzugfld" style="display:none"><label>Grund des Umzugswunsches</label><input id="f_ugrund" placeholder="z. B. zu klein, Nachwuchs, barrierefrei"></div>
    </div>
    <div class="foot-row"><button class="btn" onclick="save()">+ Lead speichern</button><button class="btn sec" onclick="clearForm()">Leeren</button>
      <button class="btn sec" onclick="addQuelle()">+ Leadquelle anlegen</button><span id="msg" style="font-size:12px;color:var(--green)"></span></div>
  </div>

  <div class="viewtoggle" style="margin-bottom:8px">
    <button id="tAlle" class="on" onclick="setTyp('')">Alle</button>
    <button id="tNeu" onclick="setTyp('neu')">Neu-Interessenten</button>
    <button id="tUmzug" onclick="setTyp('umzug')">Umzugswünsche Bestand</button>
  </div>
  <div class="viewtoggle"><button id="vListe" class="on" onclick="setView('liste')">Liste</button><button id="vBoard" onclick="setView('board')">Kanban-Board</button><button onclick="exportCRM()" title="Gefilterte Leads als CSV für den CRM-Import herunterladen">⬇ CRM Export</button></div>
  <div class="chips" id="stageChips"></div>
  <div class="card"><div class="card-hd"><span>Leads</span><span class="crumb">Meilensteine: ✅ erledigt · ⏸️ warten · ❌ nicht erfolgt &nbsp;·&nbsp; <span id="cnt"></span></span></div>
    <div class="tablewrap" id="tbl"><div class="empty" id="loading">Lädt…</div></div></div>
</div>
<div class="ov" id="ov" onclick="if(event.target===this)closeNotes()">
  <div class="dlg">
    <div class="dlg-hd"><span id="ntTitle">Mietinteressent</span><span class="abtn" onclick="closeNotes()">✕</span></div>
    <div class="dlg-bd">
      <div id="opInfo" class="opgrid"></div>
      <div class="secttl">Historie · Verlauf &amp; Notizen</div>
      <div id="ntList"></div>
    </div>
    <div class="dlg-ft"><textarea id="ntInput" rows="3" placeholder="Notiz, Absprache oder Gespräch festhalten … (Datum & Uhrzeit werden automatisch gespeichert)"></textarea>
      <div style="margin-top:8px"><button class="btn" onclick="addNote()">+ Notiz speichern</button></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const sb=window.supabase.createClient('https://jqzxctfqvcwbctpjksvg.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxenhjdGZxdmN3YmN0cGprc3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzA0MzIsImV4cCI6MjA5NzcwNjQzMn0.RKIbZxJdusKWWPjBJqlxZ8e1m8So02UslOg55YRsn3o');
const $=id=>document.getElementById(id);const esc=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
const STAGES=['0 · Leadeingang','1 · Qualifizierung','2 · Selbstauskunft','3 · Rückmeldung Selbstauskunft','4 · Telefoninterview','5 · Kalkulation Mietangebot','6 · Mietangebot','7 · Mietvertragsentwurf','8 · Genehmigung Wohnung','9 · Mietvertrag unterschreiben','10 · Schlüsselübergabe','11 · Warten auf 1. Mietzahlung','12 · Erledigt','A · Warteliste'];
const ZAHLART=['Selbstzahler','Jobcenter','Sozialamt','Aufstockung der Miete','Selbstzahler mit Wohngeld'];
const ERGEBNIS=['','Absage vom Interessenten','Absage vom Vermieter','Absage der Kostenzusage','Warteliste'];
const FREIGABE=['','Ja','Nein','Warten'];
const SELBST=['','Ja','Warten auf Auskunft','Nein'];
const MILE=['','✅','⏸️','❌'];
const MILEF=[['kostenuebernahme','Zusage Kostenübernahme'],['mietangebot_erhalten','Mietangebot erhalten'],['mietvertrag_unterschrieben','Mietvertrag unterschrieben'],['schluesseluebergabe_erfolgt','Schlüsselübergabe erfolgt'],['erste_mietzahlung','1. Mietzahlung']];
function mileCell(r,field){return `<td style="text-align:center"><select class="inl" style="text-align:center" onchange="upd('${r.id}','${field}',this.value)">${MILE.map(o=>`<option value="${o}" ${o===(r[field]||'')?'selected':''}>${o===''?'—':o}</option>`).join('')}</select></td>`;}
let ROWS=[], QUELLEN=[], FSTAGE='', FTYP='', NOTES=[], HIST=[], NT_CUR=null;
const typLabel=t=>t==='umzug'?'Umzugswunsch':'Neu';
const FLABEL={name:'Name',kontakt:'Kontakt',eingang:'Lead-Eingang',quelle:'Leadquelle',personen:'Personenanzahl',einzug_ab:'Einzug ab',zahlungsart:'Mietzahlung',ergebnis:'Ergebnis',status:'Status',selbstauskunft_vorhanden:'Selbstauskunft vorhanden',freigabe_schluessel:'Freigabe Schlüsselübergabe',typ:'Art',aktuelles_objekt:'Aktuelles Objekt',umzug_grund:'Umzugsgrund',kostenuebernahme:'Zusage Kostenübernahme',mietangebot_erhalten:'Mietangebot erhalten',mietvertrag_unterschrieben:'Mietvertrag unterschrieben',schluesseluebergabe_erfolgt:'Schlüsselübergabe erfolgt',erste_mietzahlung:'1. Mietzahlung'};
function fmtDT(ts){try{return new Date(ts).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})+' Uhr';}catch(e){return ts;}}
function noteCount(id){return NOTES.filter(n=>n.interessent_id===id).length;}
function fmtDate(d){if(!d)return '';const p=String(d).split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0]:d;}
function opTxt(r,f,type){return `<input class="opi" type="${type||'text'}" value="${esc(r[f])}" onchange="opUpd('${f}',this.value)">`;}
function opSel(r,f,arr,leer){return `<select class="opi" onchange="opUpd('${f}',this.value)">${(leer?['']:[]).concat(arr).map(o=>`<option value="${esc(o)}" ${String(o)===String(r[f]||'')?'selected':''}>${o===''?'—':esc(o)}</option>`).join('')}</select>`;}
function renderLeadInfo(){const r=ROWS.find(x=>x.id===NT_CUR);if(!r){$('opInfo').innerHTML='';return;}
  const F=(l,inp)=>`<div class="opf"><div class="opl">${l}</div><div class="opv">${inp}</div></div>`;
  const mile=f=>`<select class="opi" style="text-align:center" onchange="opUpd('${f}',this.value)">${MILE.map(o=>`<option value="${o}" ${o===(r[f]||'')?'selected':''}>${o===''?'—':o}</option>`).join('')}</select>`;
  $('opInfo').innerHTML=
    F('Name',opTxt(r,'name'))+F('Kontakt',opTxt(r,'kontakt'))+
    F('Lead-Eingang',opTxt(r,'eingang','date'))+F('Leadquelle',opSel(r,'quelle',QUELLEN,true))+
    F('Status',opSel(r,'status',STAGES,false))+F('Personenanzahl',opTxt(r,'personen','number'))+
    F('Einzug ab',opTxt(r,'einzug_ab'))+F('Art der Mietzahlung',opSel(r,'zahlungsart',ZAHLART,true))+
    F('Ergebnis',opSel(r,'ergebnis',ERGEBNIS.filter(Boolean),true))+F('Selbstauskunft vorhanden',opSel(r,'selbstauskunft_vorhanden',SELBST.filter(Boolean),true))+F('Freigabe Schlüsselübergabe',opSel(r,'freigabe_schluessel',FREIGABE.filter(Boolean),true))+
    F('Art des Interessenten',opSel(r,'typ',['neu','umzug'],false))+
    (r.typ==='umzug'?F('Aktuelles Objekt',opTxt(r,'aktuelles_objekt'))+F('Grund des Umzugswunsches',opTxt(r,'umzug_grund')):'')+
    MILEF.map(m=>F(m[1],mile(m[0]))).join('');
}
async function opUpd(field,val){
  if(!NT_CUR)return;
  await upd(NT_CUR,field,val);
  renderLeadInfo();renderNotes();
  const r=ROWS.find(x=>x.id===NT_CUR);
  $('ntTitle').textContent=leadTitle(r);
  toast('Gespeichert ✓');
}
function leadTitle(r){return 'Mietinteressent #'+((r&&r.nummer!=null)?r.nummer:'?')+' · '+((r&&(r.name||r.kontakt))||'Lead');}
function openNotes(id){NT_CUR=id;const r=ROWS.find(x=>x.id===id);$('ntTitle').textContent=leadTitle(r);$('ntInput').value='';renderLeadInfo();renderNotes();$('ov').classList.add('show');setTimeout(()=>$('ntInput').focus(),50);}
function closeNotes(){$('ov').classList.remove('show');NT_CUR=null;}
function renderNotes(){
  const items=[];
  NOTES.filter(n=>n.interessent_id===NT_CUR).forEach(n=>items.push({t:n.created_at,kind:'note',text:n.text,id:n.id}));
  HIST.filter(h=>h.interessent_id===NT_CUR).forEach(h=>items.push({t:h.created_at,kind:h.aktion||'geändert',feld:h.feld,alt:h.alt,neu:h.neu}));
  items.sort((a,b)=>new Date(b.t)-new Date(a.t));
  $('ntList').innerHTML=items.length?items.map(it=>{
    if(it.kind==='note')return `<div class="note"><span class="x" onclick="delNote('${it.id}')">✕</span><div class="ts">📝 Notiz · ${fmtDT(it.t)}</div><div class="tx">${esc(it.text)}</div></div>`;
    if(it.kind==='erstellt')return `<div class="note" style="border-left-color:var(--green)"><div class="ts">➕ ${fmtDT(it.t)}</div><div class="tx">Lead angelegt</div></div>`;
    return `<div class="note" style="border-left-color:var(--muted);background:var(--surf)"><div class="ts">🔄 Änderung · ${fmtDT(it.t)}</div><div class="tx"><b>${esc(it.feld)}</b>: ${esc(it.alt||'—')} → ${esc(it.neu||'—')}</div></div>`;
  }).join(''):'<div class="empty" style="padding:14px">Noch keine Einträge.</div>';
}
async function addNote(){const t=$('ntInput').value.trim();if(!t){toast('Bitte Text eingeben');return;}const{data,error}=await sb.from('mietinteressent_notizen').insert({interessent_id:NT_CUR,text:t}).select();if(error){toast(error.message);return;}if(data&&data[0])NOTES.unshift(data[0]);$('ntInput').value='';renderNotes();render();}
async function delNote(nid){if(!confirm('Notiz löschen?'))return;await sb.from('mietinteressent_notizen').delete().eq('id',nid);NOTES=NOTES.filter(n=>n.id!==nid);renderNotes();render();}
async function logHist(id,field,alt,neu){const rec={interessent_id:id,feld:(FLABEL[field]||field),alt:(alt==null||alt===''?null:String(alt)),neu:(neu==null||neu===''?null:String(neu)),aktion:'geändert'};const{data}=await sb.from('mietinteressent_historie').insert(rec).select();if(data&&data[0])HIST.unshift(data[0]);if(NT_CUR===id)renderNotes();}
function opts(arr,sel){return arr.map(o=>`<option ${o===sel?'selected':''}>${esc(o)}</option>`).join('');}
function clearForm(){['f_name','f_kontakt','f_personen','f_einzug','f_aktobj','f_ugrund'].forEach(id=>$(id).value='');$('f_eingang').value=new Date().toISOString().slice(0,10);if($('f_typ')){$('f_typ').value=FTYP==='umzug'?'umzug':'neu';typToggle();}$('msg').textContent='';}
async function loadQuellen(){
  const{data}=await sb.from('mietlead_quellen').select('name').order('pos',{ascending:true}).order('name',{ascending:true});
  QUELLEN=(data||[]).map(r=>r.name);
  $('f_quelle').innerHTML='<option value="">—</option>'+QUELLEN.map(q=>`<option>${esc(q)}</option>`).join('');
  $('f_zahlart').innerHTML='<option value="">—</option>'+ZAHLART.map(z=>`<option>${esc(z)}</option>`).join('');
}
async function addQuelle(){
  const n=(prompt('Neue Leadquelle:')||'').trim(); if(!n)return;
  const{error}=await sb.from('mietlead_quellen').insert({name:n,pos:8}); if(error){toast(error.message);return;}
  await loadQuellen(); $('f_quelle').value=n; render();
}
async function load(){
  await loadQuellen();
  const{data,error}=await sb.from('mietinteressenten').select('*').order('eingang',{ascending:false,nullsFirst:false}).order('created_at',{ascending:false});
  if(error){$('tbl').innerHTML='<div class="empty">Fehler: '+esc(error.message)+'</div>';return;}
  ROWS=data||[];
  const nd=await sb.from('mietinteressent_notizen').select('id,interessent_id,text,created_at').order('created_at',{ascending:false});
  NOTES=nd.data||[];
  const hd=await sb.from('mietinteressent_historie').select('id,interessent_id,feld,alt,neu,aktion,created_at').order('created_at',{ascending:false});
  HIST=hd.data||[];
  render();
}
async function save(){
  const row={name:$('f_name').value.trim()||null,kontakt:$('f_kontakt').value.trim()||null,eingang:$('f_eingang').value||null,quelle:$('f_quelle').value||null,personen:$('f_personen').value?parseInt($('f_personen').value,10):null,einzug_ab:$('f_einzug').value.trim()||null,zahlungsart:$('f_zahlart').value||null,typ:$('f_typ').value||'neu',aktuelles_objekt:$('f_aktobj').value.trim()||null,umzug_grund:$('f_ugrund').value.trim()||null,status:STAGES[0]};
  if(!row.name&&!row.kontakt){toast('Bitte Name oder Kontakt angeben');return;}
  const{data,error}=await sb.from('mietinteressenten').insert(row).select();
  if(error){$('msg').style.color='var(--red)';$('msg').textContent='Fehler: '+error.message;return;}
  if(data&&data[0])await sb.from('mietinteressent_historie').insert({interessent_id:data[0].id,aktion:'erstellt',feld:'Lead',neu:'angelegt'});
  $('msg').style.color='var(--green)';$('msg').textContent='Lead gespeichert ✓';clearForm();load();
}
async function upd(id,field,val){const r=ROWS.find(x=>x.id===id);const oldv=r?r[field]:null;const nv=(val===''?null:val);const{error}=await sb.from('mietinteressenten').update({[field]:nv,updated_at:new Date().toISOString()}).eq('id',id);if(error){toast('Fehler: '+error.message);return;}if(r)r[field]=nv;if(String(oldv==null?'':oldv)!==String(nv==null?'':nv))logHist(id,field,oldv,nv);if(field==='status'||field==='ergebnis')render();}
async function del(id){if(!confirm('Lead löschen?'))return;await sb.from('mietinteressenten').delete().eq('id',id);ROWS=ROWS.filter(r=>r.id!==id);render();}
function renderChips(){
  const BR=baseRows();
  const cnt={};STAGES.forEach(s=>cnt[s]=0);BR.forEach(r=>{if(cnt[r.status]!=null)cnt[r.status]++;});
  const chip=(val,lbl,n)=>`<span class="chip ${FSTAGE===val?'on':''}" onclick="FSTAGE='${esc(val).replace(/'/g,"\\'")}';render()">${lbl}<span class="c">${n}</span></span>`;
  $('stageChips').innerHTML=chip('','Alle',BR.length)+STAGES.map(s=>chip(s,esc(s),cnt[s])).join('');
}
let VIEW='liste', DRAG=null;
function typToggle(){const on=$('f_typ').value==='umzug';document.querySelectorAll('.umzugfld').forEach(e=>e.style.display=on?'':'none');}
function setTyp(t){FTYP=t;$('tAlle').classList.toggle('on',t==='');$('tNeu').classList.toggle('on',t==='neu');$('tUmzug').classList.toggle('on',t==='umzug');FSTAGE='';render();}
function baseRows(){return FTYP?ROWS.filter(r=>(r.typ||'neu')===FTYP):ROWS;}
function setView(v){VIEW=v;$('vListe').classList.toggle('on',v==='liste');$('vBoard').classList.toggle('on',v==='board');render();}
function dragStart(ev,id){DRAG=id;ev.dataTransfer.effectAllowed='move';}
function allowDrop(ev,el){ev.preventDefault();if(el)el.classList.add('over');}
function dragLeave(el){if(el)el.classList.remove('over');}
function drop(ev,stage,el){ev.preventDefault();if(el)el.classList.remove('over');if(DRAG){upd(DRAG,'status',stage);DRAG=null;}}

// ——— CRM Export (CSV, Excel-kompatibel) ———
function csvCell(v){const s=(v==null?'':String(v));return '"'+s.replace(/"/g,'""')+'"';}
function csvDownload(dateiname,header,zeilen){
  const txt=[header].concat(zeilen).map(r=>r.map(csvCell).join(';')).join('\r\n');
  const blob=new Blob(['\ufeff'+txt],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=dateiname+'_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
}
function exportCRM(){
  const list=FSTAGE?baseRows().filter(r=>r.status===FSTAGE):baseRows();
  if(!list.length){toast('Keine Leads zum Exportieren');return;}
  const header=['Nr','Art','Aktuelles Objekt','Umzugsgrund','Name','Kontakt','Kategorien','Potenzial','Lead-Eingang','Leadquelle','Status','Personenanzahl',
    'Einzug ab','Art der Mietzahlung','Ergebnis','Selbstauskunft vorhanden','Freigabe Schluesseluebergabe',
    'Zusage Kostenuebernahme','Mietangebot erhalten','Mietvertrag unterschrieben','Schluesseluebergabe erfolgt','1. Mietzahlung','Notizen'];
  const zeilen=list.map(r=>[r.nummer,(r.typ==='umzug'?'Umzugswunsch Bestand':'Neu-Interessent'),r.aktuelles_objekt,r.umzug_grund,r.name,r.kontakt,'Mieter-Vermittler','',r.eingang,r.quelle,r.status,r.personen,
    r.einzug_ab,r.zahlungsart,r.ergebnis,r.selbstauskunft_vorhanden,r.freigabe_schluessel,
    r.kostenuebernahme,r.mietangebot_erhalten,r.mietvertrag_unterschrieben,r.schluesseluebergabe_erfolgt,r.erste_mietzahlung,
    NOTES.filter(n=>n.interessent_id===r.id).map(n=>fmtDT(n.created_at)+': '+(n.text||n.notiz||'')).join(' | ')]);
  csvDownload('crm_export_mietinteressenten',header,zeilen);
  toast(list.length+' Lead(s) exportiert ✓');
}
function boardView(){
  const BR=baseRows();
  return '<div class="kb">'+STAGES.map(s=>{const list=BR.filter(r=>r.status===s);const se=esc(s).replace(/'/g,"\\'");
    const cards=list.map(r=>`<div class="kbcard" draggable="true" ondragstart="dragStart(event,'${r.id}')">
      <div class="kbt opennm" onclick="openNotes('${r.id}')" title="Onepager öffnen"><span class="nrbadge">#${r.nummer!=null?r.nummer:'?'}</span> ${esc(r.name||r.kontakt||'—')}</div>
      <div class="kbm">${r.quelle?esc(r.quelle):'—'}${r.personen?' · '+r.personen+' P':''}${r.einzug_ab?' · Einzug '+esc(r.einzug_ab):''}</div>
      ${r.zahlungsart?`<span class="kbtag">${esc(r.zahlungsart)}</span>`:''}${r.ergebnis?`<span class="kbtag warn">${esc(r.ergebnis)}</span>`:''}
      <div><button class="kbnote" onclick="openNotes('${r.id}')">📄 Öffnen${noteCount(r.id)?' · '+noteCount(r.id)+'📝':''}</button></div>
    </div>`).join('');
    return `<div class="kbcol" ondragover="allowDrop(event,this)" ondragleave="dragLeave(this)" ondrop="drop(event,'${se}',this)">
      <div class="kbcolhd"><span style="color:var(--text)">${esc(s)}</span><span>${list.length}</span></div>
      <div class="kbcolbd">${cards||'<div class="kbnil">—</div>'}</div></div>`;}).join('')+'</div>';
}
function render(){
  renderChips();
  $('stageChips').style.display=VIEW==='board'?'none':'flex';
  const BR=baseRows();
  if(VIEW==='board'){$('cnt').textContent=BR.length+' Leads';$('tbl').innerHTML=BR.length?boardView():'<div class="empty">Keine Einträge in dieser Ansicht.</div>';return;}
  const list=FSTAGE?BR.filter(r=>r.status===FSTAGE):BR;
  $('cnt').textContent=list.length+' von '+BR.length+(FTYP?(' · '+(FTYP==='umzug'?'Umzugswünsche':'Neu-Interessenten')):'');
  if(!BR.length){$('tbl').innerHTML='<div class="empty">Keine Einträge in dieser Ansicht — oben erfassen.</div>';return;}
  const qOpts=(sel)=>'<option value="">—</option>'+QUELLEN.map(q=>`<option ${q===sel?'selected':''}>${esc(q)}</option>`).join('');
  $('tbl').innerHTML='<table><thead><tr><th>Nr</th><th>Name</th><th>Kontakt</th><th>Eingang</th><th>Leadquelle</th><th>Pers.</th><th>Einzug ab</th><th>Mietzahlung</th><th>Ergebnis</th><th>Status</th><th>Selbst&shy;auskunft vorhanden</th><th>Freigabe Schlüssel&shy;übergabe</th><th>Zusage Kosten&shy;übernahme</th><th>Mietangebot erhalten</th><th>Mietvertrag unter&shy;schrieben</th><th>Schlüssel&shy;übergabe</th><th>1. Miet&shy;zahlung</th><th>Notizen</th><th></th></tr></thead><tbody>'
    +list.map(r=>{const cls=(r.ergebnis&&/Absage/.test(r.ergebnis))?'res-absage':((r.ergebnis==='Warteliste'||r.status==='A · Warteliste')?'res-warte':'');
      return `<tr class="${cls}">
        <td class="nrcell">${r.nummer!=null?r.nummer:'—'}</td>
        <td><input class="inl" style="min-width:120px" value="${esc(r.name)}" placeholder="Name" onchange="upd('${r.id}','name',this.value)">${r.typ==='umzug'?'<span class="umzugbadge" title="'+esc(r.aktuelles_objekt||'Bestandsmieter mit Umzugswunsch')+'">↔ Umzug</span>':''}</td>
        <td><input class="inl" style="min-width:130px" value="${esc(r.kontakt)}" placeholder="Kontakt" onchange="upd('${r.id}','kontakt',this.value)"></td>
        <td><input class="inl" type="date" value="${r.eingang||''}" onchange="upd('${r.id}','eingang',this.value)"></td>
        <td><select class="inl" onchange="upd('${r.id}','quelle',this.value)">${qOpts(r.quelle)}</select></td>
        <td><input class="inl" type="number" min="0" step="1" style="width:56px" value="${r.personen!=null?r.personen:''}" onchange="upd('${r.id}','personen',this.value)"></td>
        <td><input class="inl" style="width:120px" value="${esc(r.einzug_ab)}" placeholder="ab…" onchange="upd('${r.id}','einzug_ab',this.value)"></td>
        <td><select class="inl" onchange="upd('${r.id}','zahlungsart',this.value)"><option value="">—</option>${opts(ZAHLART,r.zahlungsart)}</select></td>
        <td><select class="inl" onchange="upd('${r.id}','ergebnis',this.value)">${ERGEBNIS.map(o=>`<option value="${esc(o)}" ${o===(r.ergebnis||'')?'selected':''}>${o===''?'—':esc(o)}</option>`).join('')}</select></td>
        <td><select class="inl st" onchange="upd('${r.id}','status',this.value)">${opts(STAGES,r.status)}</select></td>
        <td><select class="inl" onchange="upd('${r.id}','selbstauskunft_vorhanden',this.value)">${SELBST.map(o=>`<option value="${esc(o)}" ${o===(r.selbstauskunft_vorhanden||'')?'selected':''}>${o===''?'—':esc(o)}</option>`).join('')}</select></td>
        <td><select class="inl" onchange="upd('${r.id}','freigabe_schluessel',this.value)">${FREIGABE.map(o=>`<option value="${esc(o)}" ${o===(r.freigabe_schluessel||'')?'selected':''}>${o===''?'—':esc(o)}</option>`).join('')}</select></td>
        ${mileCell(r,'kostenuebernahme')}${mileCell(r,'mietangebot_erhalten')}${mileCell(r,'mietvertrag_unterschrieben')}${mileCell(r,'schluesseluebergabe_erfolgt')}${mileCell(r,'erste_mietzahlung')}
        <td><button class="ntbtn" onclick="openNotes('${r.id}')">📄 Öffnen${noteCount(r.id)?' · <span class="c">'+noteCount(r.id)+'</span>📝':''}</button></td>
        <td><button class="abtn" onclick="del('${r.id}')">✕</button></td></tr>`;}).join('')
    +'</tbody></table>';
  if(!list.length)$('tbl').innerHTML='<div class="empty">Keine Leads in dieser Stufe.</div>';
}
(async()=>{const{data:{session}}=await sb.auth.getSession();if(!session){$('main').innerHTML='<div class="empty" style="padding:60px">Bitte zuerst im OS einloggen.</div>';return;}clearForm();load();})();
</script></body></html>
