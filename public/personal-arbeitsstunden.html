<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal · Arbeitsstunden – Macher OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f6f7f9;--surf:#fff;--surf2:#f1f3f6;--line:#e6e8ec;--bord2:#eef0f3;--text:#1c2024;--muted:#6b7280;--dim:#4b5563;--accent:#185fa5;--green:#1f7a4d;--red:#c0392b;--r:8px;--rl:12px;}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px}
.hdr{background:var(--surf);border-bottom:1px solid var(--line);padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.logo{background:#1a1a2e;color:#fff;font-weight:700;font-size:11px;padding:5px 9px;border-radius:4px}.hdr-title{font-size:16px;font-weight:600}.hdr-sub{font-size:11px;color:var(--muted)}
.main{max-width:1240px;margin:0 auto;padding:20px 24px 60px}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:14px}
.bar select{font:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:var(--r);background:var(--surf)}
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);overflow:hidden}
.tablewrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:1120px}
th,td{border:1px solid var(--line);padding:4px 6px;text-align:center}
th{background:var(--surf2);font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700}
td.ma,th.ma{text-align:left;white-space:nowrap;position:sticky;left:0;background:var(--surf);font-weight:600;z-index:1}
th.cur,td.cur{background:#fef9e7}
input.c{width:52px;border:1px solid transparent;background:transparent;font:inherit;font-size:11px;text-align:center;border-radius:4px;padding:1px}
input.c:hover{border-color:var(--line)}input.c:focus{outline:none;border-color:var(--accent);background:#fff}
.lbl{font-size:9px;color:var(--muted)}
.delta.pos{color:var(--green);font-weight:600}.delta.neg{color:var(--red);font-weight:600}
.foot{font-size:11px;color:var(--muted);margin-top:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--line);border-radius:var(--r);padding:10px 20px;font-size:13px;opacity:0;transition:.3s;pointer-events:none}.toast.show{opacity:1}
</style></head><body>
<div class="hdr"><div class="logo">MACHER OS</div><div><div class="hdr-title">Personal · Arbeitsstunden</div><div class="hdr-sub">Zeiterfassung Soll / Ist · Überstunden (Ist − Soll)</div></div></div>
<div class="main">
  <div class="bar"><label style="font-size:12px;color:var(--muted)">Jahr</label><select id="jahr" onchange="load()"></select></div>
  <div class="card"><div class="tablewrap" id="tbl"><div style="padding:30px;text-align:center;color:var(--muted)">Lädt…</div></div></div>
  <div class="foot">Je Zelle: <b>Soll</b> (Sollstunden) und <b>Ist</b> (geleistete Stunden); Δ = Überstunden. Werte je Mitarbeiter/Monat in Supabase gespeichert.</div>
</div><div class="toast" id="toast"></div>
<script>
const sb=window.supabase.createClient('https://jqzxctfqvcwbctpjksvg.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxenhjdGZxdmN3YmN0cGprc3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzA0MzIsImV4cCI6MjA5NzcwNjQzMn0.RKIbZxJdusKWWPjBJqlxZ8e1m8So02UslOg55YRsn3o');
const $=id=>document.getElementById(id);const esc=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const numDE=v=>{if(v==null||v==='')return null;const n=parseFloat(String(v).replace(',','.'));return isNaN(n)?null:n;};
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
const MON=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
let MA=[],PM={};
function initYear(){const y=new Date().getFullYear();let o='';for(let j=y-1;j<=y+1;j++)o+=`<option ${j===y?'selected':''}>${j}</option>`;$('jahr').innerHTML=o;}
async function pmSet(maid,monat,field,val){const jahr=+$('jahr').value;const v=numDE(val);const rec={mitarbeiter_id:maid,jahr,monat,[field]:v,updated_at:new Date().toISOString()};const{error}=await sb.from('personal_monat').upsert(rec,{onConflict:'mitarbeiter_id,jahr,monat'});if(error){toast('Fehler: '+error.message);return;}PM[maid+'_'+monat]=Object.assign({},PM[maid+'_'+monat]||{},{[field]:v});render();}
async function load(){
  const jahr=+$('jahr').value;
  const ma=await sb.from('mitarbeiter').select('id,name,vorname,unternehmen').order('pos');MA=ma.data||[];
  const pm=await sb.from('personal_monat').select('mitarbeiter_id,monat,stunden_soll,stunden_ist').eq('jahr',jahr);
  PM={};(pm.data||[]).forEach(r=>PM[r.mitarbeiter_id+'_'+r.monat]=r);render();
}
function nm(m){return((m.vorname||'')+' '+(m.name||'')).trim()||'—';}
function render(){
  const jahr=+$('jahr').value;const now=new Date();const cur=now.getFullYear()===jahr?now.getMonth()+1:0;
  if(!MA.length){$('tbl').innerHTML='<div style="padding:30px;text-align:center;color:var(--muted)">Keine Mitarbeiter — in der Personalakte anlegen.</div>';return;}
  let head='<thead><tr><th class="ma">Mitarbeiter</th>'+MON.map((x,i)=>`<th class="${i+1===cur?'cur':''}">${x}</th>`).join('')+'</tr></thead>';
  let body=MA.map(m=>{
    let cells='';let sumSoll=0,sumIst=0;
    for(let mo=1;mo<=12;mo++){const p=PM[m.id+'_'+mo]||{};const soll=p.stunden_soll,ist=p.stunden_ist;if(soll!=null)sumSoll+=Number(soll);if(ist!=null)sumIst+=Number(ist);
      const d=(soll!=null&&ist!=null)?(Number(ist)-Number(soll)):null;
      cells+=`<td class="${mo===cur?'cur':''}">
        <div><span class="lbl">S</span> <input class="c" inputmode="decimal" value="${soll!=null?soll:''}" onchange="pmSet('${m.id}',${mo},'stunden_soll',this.value)"></div>
        <div><span class="lbl">I</span> <input class="c" inputmode="decimal" value="${ist!=null?ist:''}" onchange="pmSet('${m.id}',${mo},'stunden_ist',this.value)"></div>
        <div class="delta ${d>0?'pos':(d<0?'neg':'')}">${d!=null?(d>0?'+':'')+d:''}</div></td>`;
    }
    return `<tr><td class="ma">${esc(nm(m))}<div class="lbl">Σ Soll ${sumSoll} · Ist ${sumIst} · Δ ${sumIst-sumSoll}</div></td>${cells}</tr>`;
  }).join('');
  $('tbl').innerHTML='<table>'+head+'<tbody>'+body+'</tbody></table>';
}
(async()=>{const{data:{session}}=await sb.auth.getSession();if(!session){$('main').innerHTML='<div style="padding:60px;text-align:center;color:var(--muted)">Bitte einloggen.</div>';return;}initYear();load();})();
</script></body></html>
