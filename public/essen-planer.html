<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essen-Planer · Eric Privat</title>
<style>
:root{--bg:#f6f7f9;--surf:#fff;--line:#e6e8ec;--text:#1c2024;--muted:#6b7280;--accent:#0f9d6b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
.hdr{background:var(--surf);border-bottom:1px solid var(--line);padding:16px 24px}
.hdr-title{font-size:18px;font-weight:700}
.hdr-sub{font-size:12px;color:var(--muted);margin-top:2px}
.wrap{max-width:900px;margin:60px auto;padding:0 24px;text-align:center}
.card{background:var(--surf);border:1px dashed var(--line);border-radius:14px;padding:56px 28px;color:var(--muted)}
.card .ic{font-size:40px}
.card h2{color:var(--text);font-size:18px;margin:12px 0 6px}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-title">Essen-Planer</div><div class="hdr-sub">Eric Privat</div></div>
<div class="wrap"><div class="card">
  <div class="ic">🍽️</div>
  <h2>Essen-Planer</h2>
  <p>Diese Seite ist angelegt und wird noch befüllt.</p>
</div></div>
</body>
</html>
