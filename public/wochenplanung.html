<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wochenplanung · Macher OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f6f7f9;--surf:#fff;--surf2:#f1f3f6;--surf3:#e7ebf0;--line:#e6e8ec;--bord2:#eef0f3;
  --text:#1c2024;--muted:#6b7280;--dim:#4b5563;
  --accent:#185fa5;--ok:#1f7a4d;--warn:#b45309;--danger:#c62828;--top3:#c8741f;
  --b-routine:#7c3aed;--b-aufgabe:#185fa5;--b-sport:#1f7a4d;--b-ziel:#c8741f;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;font-variant-numeric:tabular-nums}
.hdr{background:var(--surf);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.hdr-l{display:flex;align-items:center;gap:12px}
.logo{background:var(--accent);color:#fff;font-weight:700;font-size:11px;letter-spacing:.08em;padding:5px 9px;border-radius:4px}
.hdr-title{font-size:16px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--muted)}
.wknav{display:flex;align-items:center;gap:6px}
.wknav button{font-size:14px;font-weight:600;width:30px;height:30px;border-radius:var(--r);border:1px solid var(--line);background:var(--surf2);color:var(--text);cursor:pointer}
.wknav button:hover{background:var(--surf3)}
.wknav .kwlbl{font-size:14px;font-weight:600;min-width:150px;text-align:center}
.wknav .par{font-size:10px;color:var(--muted);font-weight:600}
.main{max-width:1300px;margin:0 auto;padding:20px 24px 60px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);padding:14px 16px}
.kpi .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi .v{font-size:24px;font-weight:700;margin-top:4px}
.kpi .h{font-size:10px;color:var(--muted);margin-top:3px}
.kpi.big{grid-column:span 2}@media(max-width:600px){.kpi.big{grid-column:span 1}}
.bar{height:12px;background:var(--surf3);border-radius:20px;overflow:hidden;margin-top:8px}
.bar > div{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--ok));transition:width .4s}
.sec{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);margin-bottom:18px;overflow:hidden}
.sec-hd{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.sec-hd .t{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.sec-hd .dot{width:9px;height:9px;border-radius:3px}
.sec-hd .prog{font-size:11px;color:var(--muted);font-weight:500}
.addbtn{font-size:12px;font-weight:600;padding:6px 12px;border-radius:var(--r);border:1px dashed var(--line);background:var(--surf2);color:var(--accent);cursor:pointer}
.addbtn:hover{background:var(--surf3)}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.btn{font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:var(--r);border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer}
.btn:hover{opacity:.92}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.seg button{font:inherit;font-size:12px;font-weight:600;padding:6px 11px;border:none;background:var(--surf);color:var(--muted);cursor:pointer;border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--accent);color:#fff}
.seg button.today{box-shadow:inset 0 -3px 0 var(--top3)}
.grp{font-size:11px;color:var(--muted);font-weight:600;margin-right:2px}
.tablewrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:980px}
th,td{padding:7px 9px;text-align:left;border-bottom:1px solid var(--bord2);vertical-align:middle}
th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:var(--surf2)}
tr.done td{background:rgba(31,122,77,.05)}
.cin{width:100%;border:1px solid transparent;background:transparent;font:inherit;color:var(--text);padding:5px 6px;border-radius:5px}
.cin:hover{border-color:var(--line)} .cin:focus{outline:none;border-color:var(--accent);background:var(--surf)}
select.cin{cursor:pointer}
.stsel{font:inherit;font-size:12px;font-weight:600;border:1px solid var(--line);border-radius:20px;padding:4px 8px;cursor:pointer;background:var(--surf2)}
.st-offen{color:var(--muted)} .st-in_arbeit{color:var(--accent)} .st-warten{color:var(--warn)} .st-erledigt{color:var(--ok)}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;color:#fff}
.p-P1{background:var(--danger)}.p-P2{background:var(--warn)}.p-P3{background:var(--accent)}.p-P4{background:var(--muted)}
.abtn{font-size:12px;padding:3px 8px;border-radius:5px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer}
.abtn:hover{color:var(--danger);border-color:var(--danger)}
.ueber{color:var(--warn);font-weight:700;font-size:13px;cursor:help}
.empty{text-align:center;padding:18px;color:var(--muted);font-size:12.5px}
/* Board */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:900px){.board{grid-template-columns:1fr 1fr}}
.col{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);overflow:hidden}
.col-hd{padding:9px 12px;font-size:12px;font-weight:700;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
.col-bd{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:60px}
.card{border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:var(--r);padding:8px 10px;font-size:12.5px;background:var(--surf)}
.card .ct{font-weight:600;margin-bottom:5px}
.card .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.card .tag{font-size:10px;color:var(--muted);background:var(--surf2);border-radius:20px;padding:1px 7px}
.card select{font:inherit;font-size:11px;border:1px solid var(--line);border-radius:5px;padding:2px 4px;margin-top:6px;background:var(--surf2)}
.zftbl{min-width:1040px}
.zftbl th.today,.zftbl td.today{background:rgba(200,116,31,.08)}
.zftbl td{vertical-align:top}
.zfcell{display:flex;flex-direction:column;gap:4px}
.zfchk{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);cursor:pointer;user-select:none}
.zfchk.on{color:var(--ok);font-weight:600}
.slotlbl{font-weight:600;color:var(--dim);white-space:nowrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surf3);border:1px solid var(--line);border-radius:var(--r);padding:10px 20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-l">
    <div class="logo">MACHER OS</div>
    <div>
      <div class="hdr-title">Wochenplanung</div>
      <div class="hdr-sub">Jahresziele · Routine · Aufgaben · Sport — P1–P4, Liste & Board</div>
    </div>
  </div>
  <div class="wknav">
    <button onclick="shiftWeek(-1)" title="Vorherige Woche">‹</button>
    <div><div class="kwlbl" id="kwlbl">KW —</div><div class="par" id="par" style="text-align:center"></div></div>
    <button onclick="shiftWeek(1)" title="Nächste Woche">›</button>
    <button onclick="thisWeek()" title="Aktuelle Woche" style="width:auto;padding:0 10px;font-size:12px">heute</button>
  </div>
</div>

<div class="main" id="main">
  <div class="kpis" id="kpis"></div>

  <!-- Tages-Zeitfenster (ganz oben) -->
  <div class="sec">
    <div class="sec-hd">
      <div class="t"><span class="dot" style="background:var(--top3)"></span>⏱ Tages-Zeitfenster <span style="font-weight:400;color:var(--muted);font-size:12px">(5 pro Tag · „eingehalten" abhaken)</span></div>
      <span class="prog" id="zfProg"></span>
    </div>
    <div class="tablewrap"><table class="zftbl" id="zfTbl"></table></div>
  </div>

  <!-- Top 3 Fragen -->
  <div class="sec">
    <div class="sec-hd"><div class="t"><span class="dot" style="background:#c8741f"></span>Top 3 Fragen zur Wochenplanung</div><span class="prog" id="fragenSaved"></span></div>
    <div style="padding:14px 16px;display:grid;gap:14px">
      <div><label style="font-size:12.5px;font-weight:600;color:var(--dim)">1 · Was ist kommende Woche wirklich wichtig?</label>
        <textarea id="fa1" rows="2" style="width:100%;margin-top:5px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;resize:vertical;background:var(--surf2)" onchange="saveFragen()"></textarea></div>
      <div><label style="font-size:12.5px;font-weight:600;color:var(--dim)">2 · Was bringt mich und meine Jahresziele wirklich voran?</label>
        <textarea id="fa2" rows="2" style="width:100%;margin-top:5px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;resize:vertical;background:var(--surf2)" onchange="saveFragen()"></textarea></div>
      <div><label style="font-size:12.5px;font-weight:600;color:var(--dim)">3 · Von welchen Dingen möchte ich mich nicht ablenken lassen?</label>
        <textarea id="fa3" rows="2" style="width:100%;margin-top:5px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;resize:vertical;background:var(--surf2)" onchange="saveFragen()"></textarea></div>
    </div>
  </div>

  <!-- Jahresziele -->
  <div class="sec">
    <div class="sec-hd">
      <div class="t"><span class="dot" style="background:var(--b-ziel)"></span>🎯 Jahresziele <span style="font-weight:400;color:var(--muted);font-size:12px">(übergeordnet · Aufgaben verknüpfbar)</span></div>
      <button class="addbtn" onclick="addRow('jahresziele')">+ Jahresziel</button>
    </div>
    <div class="tablewrap"><table id="zieleTbl"></table></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn" onclick="carryOver()">↪ Nicht erledigte aus Vorwoche übernehmen</button>
    <span class="seg"><span class="grp" style="padding:6px 4px 6px 10px">Ansicht</span>
      <button id="vList" class="on" onclick="setView('list')">Liste</button>
      <button id="vBoard" onclick="setView('board')">Board</button>
    </span>
    <span class="seg" id="bereichSeg"></span>
  </div>
  <div class="toolbar" id="tagSeg"></div>

  <div id="work"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const SB_URL='https://jqzxctfqvcwbctpjksvg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxenhjdGZxdmN3YmN0cGprc3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzA0MzIsImV4cCI6MjA5NzcwNjQzMn0.RKIbZxJdusKWWPjBJqlxZ8e1m8So02UslOg55YRsn3o';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

const STATI=[['offen','Offen'],['in_arbeit','In Arbeit'],['warten','Warten'],['erledigt','Erledigt']];
const PRIOS=['P1','P2','P3','P4'];
const PRV={'P1':1,'P2':2,'P3':3,'P4':4};
const TAGE=['Mo','Di','Mi','Do','Fr','Sa','So'];
const TAGV={'Mo':1,'Di':2,'Mi':3,'Do':4,'Fr':5,'Sa':6,'So':7};
const KATS=['Ankauf','Verkauf','Vermietung','Sanierungen','Bauprojekte','Mitarbeiter','Assetmanagement','Steuer','Finanzierung','Recht','Privat','Sonstiges'];
const BEREICHE={routine:{t:'Routine',c:'var(--b-routine)'},aufgabe:{t:'Aufgaben',c:'var(--b-aufgabe)'},sport:{t:'Sport / Regeneration',c:'var(--b-sport)'}};
const RHY=['jede','gerade','ungerade'];
const TODAY_TAG=TAGE[(new Date().getDay()+6)%7];

function isoWeek(d){ const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const dn=(date.getUTCDay()+6)%7; date.setUTCDate(date.getUTCDate()-dn+3); const ft=new Date(Date.UTC(date.getUTCFullYear(),0,4)); const kw=1+Math.round(((date-ft)/86400000-3+((ft.getUTCDay()+6)%7))/7); return {kw,jahr:date.getUTCFullYear()}; }
function mondayOf(jahr,kw){ const s=new Date(Date.UTC(jahr,0,1+(kw-1)*7)); const dow=s.getUTCDay(); if(dow<=4) s.setUTCDate(s.getUTCDate()-((dow+6)%7)); else s.setUTCDate(s.getUTCDate()+(8-dow)); return s; }
function fmtRange(jahr,kw){ const mo=mondayOf(jahr,kw); const su=new Date(mo); su.setUTCDate(mo.getUTCDate()+6); const f=d=>('0'+d.getUTCDate()).slice(-2)+'.'+('0'+(d.getUTCMonth()+1)).slice(-2)+'.'; return f(mo)+'–'+f(su)+mo.getUTCFullYear(); }

let CUR=isoWeek(new Date());
let ROWS=[];
let VIEW='list', F_BEREICH='', F_TAG='';

function shiftWeek(n){ const mo=mondayOf(CUR.jahr,CUR.kw); mo.setUTCDate(mo.getUTCDate()+n*7); CUR=isoWeek(new Date(mo.getUTCFullYear(),mo.getUTCMonth(),mo.getUTCDate())); load(); }
function thisWeek(){ CUR=isoWeek(new Date()); load(); }
function isCurWeek(){ const n=isoWeek(new Date()); return n.kw===CUR.kw && n.jahr===CUR.jahr; }
function parity(){ return CUR.kw%2===0?'gerade':'ungerade'; }

function setView(v){ VIEW=v; $('vList').classList.toggle('on',v==='list'); $('vBoard').classList.toggle('on',v==='board'); render(); }

async function load(){
  $('kwlbl').textContent='KW '+CUR.kw+' · '+CUR.jahr;
  $('kwlbl').title=fmtRange(CUR.jahr,CUR.kw);
  $('par').textContent=fmtRange(CUR.jahr,CUR.kw)+' · '+parity()+' Woche';
  const { data, error } = await sb.from('wochenplanung').select('id,bereich,pos,aufgabe,kategorie,prioritaet,typ,wochentag,uhrzeit,ziel,rhythmus,uebernommen,status,notizen')
    .eq('jahr',CUR.jahr).eq('kw',CUR.kw).order('pos',{ascending:true}).order('created_at',{ascending:true});
  ROWS = error ? [] : (data||[]);
  if(error) toast('Fehler beim Laden: '+error.message);
  await loadZF();
  render(); loadFragen();
}

let ZF={};
async function loadZF(){
  const { data } = await sb.from('wochen_zeitfenster').select('tag,slot,inhalt,eingehalten').eq('jahr',CUR.jahr).eq('kw',CUR.kw);
  ZF={}; (data||[]).forEach(r=>{ ZF[r.tag+'_'+r.slot]=r; });
}
async function zfSet(tag,slot,field,val){
  const rec={ jahr:CUR.jahr, kw:CUR.kw, tag, slot, updated_at:new Date().toISOString() };
  rec[field] = field==='inhalt' ? (String(val).trim()||null) : !!val;
  const { error } = await sb.from('wochen_zeitfenster').upsert(rec,{ onConflict:'jahr,kw,tag,slot' });
  if(error){ toast('Speichern fehlgeschlagen: '+error.message); return; }
  const k=tag+'_'+slot; ZF[k]=Object.assign({tag,slot,inhalt:null,eingehalten:false}, ZF[k]||{}, {[field]:rec[field]});
  render();
}
function renderZF(){
  let head='<thead><tr><th>Zeitfenster</th>'+TAGE.map(t=>`<th class="${t===TODAY_TAG&&isCurWeek()?'today':''}">${t}</th>`).join('')+'</tr></thead>';
  let body='';
  for(let slot=1;slot<=5;slot++){
    body+='<tr><td class="slotlbl">Zeitfenster '+slot+'</td>'+TAGE.map(t=>{
      const r=ZF[t+'_'+slot]||{};
      const on=!!r.eingehalten, td=(t===TODAY_TAG&&isCurWeek())?'today':'';
      return `<td class="${td}"><div class="zfcell">
        <input class="cin" value="${esc(r.inhalt)}" placeholder="—" style="min-width:120px" onchange="zfSet('${t}',${slot},'inhalt',this.value)">
        <label class="zfchk ${on?'on':''}"><input type="checkbox" ${on?'checked':''} onchange="zfSet('${t}',${slot},'eingehalten',this.checked)"> ${on?'eingehalten ✓':'eingehalten'}</label>
      </div></td>`;
    }).join('')+'</tr>';
  }
  $('zfTbl').innerHTML=head+'<tbody>'+body+'</tbody>';
  const vals=Object.values(ZF).filter(r=>(r.inhalt||'').trim());
  const kept=vals.filter(r=>r.eingehalten).length;
  $('zfProg').textContent = vals.length ? `${Math.round(kept/vals.length*100)}% eingehalten (${kept}/${vals.length})` : 'noch keine Zeitfenster erfasst';
}

async function loadFragen(){
  const { data } = await sb.from('wochen_fragen').select('antwort1,antwort2,antwort3').eq('jahr',CUR.jahr).eq('kw',CUR.kw).maybeSingle();
  $('fa1').value=data?.antwort1||''; $('fa2').value=data?.antwort2||''; $('fa3').value=data?.antwort3||''; $('fragenSaved').textContent='';
}
let fragenTimer=null;
async function saveFragen(){
  const rec={ jahr:CUR.jahr, kw:CUR.kw, antwort1:$('fa1').value.trim()||null, antwort2:$('fa2').value.trim()||null, antwort3:$('fa3').value.trim()||null, updated_at:new Date().toISOString() };
  const { error } = await sb.from('wochen_fragen').upsert(rec, { onConflict:'jahr,kw' });
  $('fragenSaved').textContent = error ? 'Fehler: '+error.message : 'gespeichert ✓';
  clearTimeout(fragenTimer); fragenTimer=setTimeout(()=>{ $('fragenSaved').textContent=''; }, 2000);
}

async function addRow(bereich){
  const max=Math.max(0,...ROWS.filter(r=>r.bereich===bereich).map(r=>r.pos||0));
  const u=(await sb.auth.getUser()).data.user;
  const rec={ jahr:CUR.jahr, kw:CUR.kw, bereich, pos:max+1, status:'offen', uebernommen:false, created_by:u?u.id:null };
  if(bereich!=='jahresziele') rec.prioritaet='P2';
  if(bereich==='routine') rec.rhythmus='jede';
  const { error } = await sb.from('wochenplanung').insert(rec);
  if(error){ toast('Anlegen fehlgeschlagen: '+error.message); return; }
  await load();
}
async function updField(id, field, val){
  const { error } = await sb.from('wochenplanung').update({ [field]: (val===''?null:val) }).eq('id',id);
  if(error){ toast('Speichern fehlgeschlagen: '+error.message); return; }
  const r=ROWS.find(x=>x.id===id); if(r){ r[field]=val; render(); }
}
async function delRow(id){
  if(!confirm('Eintrag löschen?')) return;
  const { error } = await sb.from('wochenplanung').delete().eq('id',id);
  if(error){ toast('Löschen fehlgeschlagen: '+error.message); return; }
  await load();
}

async function carryOver(){
  const mo=mondayOf(CUR.jahr,CUR.kw); mo.setUTCDate(mo.getUTCDate()-7);
  const prev=isoWeek(new Date(mo.getUTCFullYear(),mo.getUTCMonth(),mo.getUTCDate()));
  const { data, error } = await sb.from('wochenplanung').select('*').eq('jahr',prev.jahr).eq('kw',prev.kw).neq('status','erledigt').neq('bereich','jahresziele');
  if(error){ toast('Fehler: '+error.message); return; }
  const src=(data||[]).filter(r=>(r.aufgabe||'').trim());
  if(!src.length){ toast('Keine offenen Aufgaben in KW '+prev.kw); return; }
  const existing=new Set(ROWS.map(r=>(r.aufgabe||'').trim().toLowerCase()));
  const todo=src.filter(r=>!existing.has(r.aufgabe.trim().toLowerCase()));
  if(!todo.length){ toast('Alle offenen Aufgaben aus KW '+prev.kw+' sind bereits übernommen'); return; }
  if(!confirm(todo.length+' nicht erledigte Aufgabe(n) aus KW '+prev.kw+' in KW '+CUR.kw+' übernehmen?')) return;
  const u=(await sb.auth.getUser()).data.user;
  const recs=todo.map(r=>({ jahr:CUR.jahr,kw:CUR.kw,bereich:r.bereich||'aufgabe',pos:r.pos||0,aufgabe:r.aufgabe,kategorie:r.kategorie,prioritaet:r.prioritaet||'P2',wochentag:r.wochentag,uhrzeit:r.uhrzeit,ziel:r.ziel,rhythmus:r.rhythmus,status:'offen',uebernommen:true,notizen:r.notizen,created_by:u?u.id:null }));
  const { error:e2 } = await sb.from('wochenplanung').insert(recs);
  if(e2){ toast('Übernahme fehlgeschlagen: '+e2.message); return; }
  toast(recs.length+' Aufgabe(n) übernommen ↪'); await load();
}

function pct(done,total){ return total? Math.round(done/total*100):0; }
function zielNames(){ return ROWS.filter(r=>r.bereich==='jahresziele'&&r.aufgabe).map(r=>r.aufgabe); }
function routineVisible(r){ if(r.bereich!=='routine'||!r.rhythmus||r.rhythmus==='jede') return true; return r.rhythmus===parity(); }
function tagMatch(r){ if(F_TAG==='') return true; if(F_TAG==='none') return !(r.wochentag&&r.wochentag.trim()); return (r.wochentag||'').split(/[,\s]+/).includes(F_TAG); }

function zieleTable(){
  const z=ROWS.filter(r=>r.bereich==='jahresziele');
  const rows=z.map(r=>`<tr class="${r.status==='erledigt'?'done':''}">
    <td style="min-width:280px"><input class="cin" value="${esc(r.aufgabe)}" placeholder="Jahresziel…" onchange="updField('${r.id}','aufgabe',this.value)"></td>
    <td><input class="cin" value="${esc(r.notizen)}" placeholder="Notiz / Kennzahl" style="min-width:200px" onchange="updField('${r.id}','notizen',this.value)"></td>
    <td style="width:40px"><button class="abtn" onclick="delRow('${r.id}')">✕</button></td></tr>`).join('');
  $('zieleTbl').innerHTML='<thead><tr><th>Jahresziel</th><th>Notiz</th><th></th></tr></thead><tbody>'
    +(rows||`<tr><td colspan="3"><div class="empty">Noch keine Jahresziele — „+ Jahresziel" klicken.</div></td></tr>`)+'</tbody>';
}

function bereichSeg(){
  const opts=[['','Alle'],['routine','Routine'],['aufgabe','Aufgaben'],['sport','Sport / Regeneration']];
  $('bereichSeg').innerHTML='<span class="grp" style="padding:6px 4px 6px 10px">Bereich</span>'+opts.map(o=>`<button class="${F_BEREICH===o[0]?'on':''}" onclick="F_BEREICH='${o[0]}';render()">${o[1]}</button>`).join('');
}
function tagSeg(){
  const opts=[['','Alle'],...TAGE.map(t=>[t,t]),['none','Unterminiert']];
  $('tagSeg').innerHTML='<span class="seg"><span class="grp" style="padding:6px 4px 6px 10px">Tag</span>'
    +opts.map(o=>`<button class="${F_TAG===o[0]?'on':''} ${o[0]===TODAY_TAG?'today':''}" onclick="F_TAG='${o[0]}';render()">${o[1]}</button>`).join('')+'</span>';
}

function workItems(){
  return ROWS.filter(r=>r.bereich!=='jahresziele')
    .filter(r=>!F_BEREICH||r.bereich===F_BEREICH)
    .filter(r=>routineVisible(r))
    .filter(r=>tagMatch(r));
}
function sortItems(list){
  return list.slice().sort((a,b)=>{
    const da=TAGV[a.wochentag]||9, db=TAGV[b.wochentag]||9; if(da!==db) return da-db;
    const pa=PRV[a.prioritaet]||9, pb=PRV[b.prioritaet]||9; if(pa!==pb) return pa-pb;
    return (a.pos||0)-(b.pos||0);
  });
}

function rowHtml(r){
  const stOpts=STATI.map(s=>`<option value="${s[0]}" ${s[0]===r.status?'selected':''}>${s[1]}</option>`).join('');
  const brOpts=Object.keys(BEREICHE).map(k=>`<option value="${k}" ${k===r.bereich?'selected':''}>${BEREICHE[k].t}</option>`).join('');
  const prOpts=PRIOS.map(p=>`<option ${p===(r.prioritaet||'')?'selected':''}>${p}</option>`).join('');
  const tagOpts=TAGE.map(t=>`<option ${t===(r.wochentag||'')?'selected':''}>${t}</option>`).join('');
  const rhyOpts=RHY.map(t=>`<option ${t===(r.rhythmus||'')?'selected':''}>${t}</option>`).join('');
  const ueber=r.uebernommen?`<span class="ueber" title="Aus Vorwoche übernommen">↪</span> `:'';
  const zl=zielNames().map(n=>`<option value="${esc(n)}">`).join('');
  return `<tr class="${r.status==='erledigt'?'done':''}">
    <td style="min-width:220px">${ueber}<input class="cin" value="${esc(r.aufgabe)}" placeholder="Bezeichnung…" style="width:86%" onchange="updField('${r.id}','aufgabe',this.value)"></td>
    <td><select class="cin" onchange="updField('${r.id}','bereich',this.value)">${brOpts}</select></td>
    <td><select class="cin" onchange="updField('${r.id}','prioritaet',this.value)"><option value="">—</option>${prOpts}</select></td>
    <td><select class="cin" onchange="updField('${r.id}','wochentag',this.value)"><option value="">—</option>${tagOpts}</select></td>
    <td><input class="cin" value="${esc(r.uhrzeit)}" placeholder="z. B. 07:00" style="width:90px" onchange="updField('${r.id}','uhrzeit',this.value)"></td>
    <td>${r.bereich==='routine'?`<select class="cin" onchange="updField('${r.id}','rhythmus',this.value)">${rhyOpts}</select>`:`<input class="cin" list="ziellist" value="${esc(r.ziel)}" placeholder="Jahresziel" style="min-width:120px" onchange="updField('${r.id}','ziel',this.value)">`}</td>
    <td><select class="stsel st-${r.status}" onchange="updField('${r.id}','status',this.value)">${stOpts}</select></td>
    <td><input class="cin" value="${esc(r.notizen)}" placeholder="Notiz" style="min-width:120px" onchange="updField('${r.id}','notizen',this.value)"></td>
    <td style="width:40px"><button class="abtn" onclick="delRow('${r.id}')">✕</button></td>
  </tr><datalist id="ziellist">${zl}</datalist>`;
}

function listView(){
  const items=sortItems(workItems());
  const head='<thead><tr><th>Bezeichnung</th><th>Bereich</th><th>Prio</th><th>Tag</th><th>Uhrzeit</th><th>Rhythmus / Ziel</th><th>Status</th><th>Notiz</th><th></th></tr></thead>';
  return `<div class="sec"><div class="sec-hd">
      <div class="t"><span class="dot" style="background:var(--accent)"></span>Wochenübersicht <span style="font-weight:400;color:var(--muted);font-size:12px">(Tag → Priorität)</span></div>
      <div style="display:flex;gap:8px"><button class="addbtn" onclick="addRow('routine')">+ Routine</button><button class="addbtn" onclick="addRow('aufgabe')">+ Aufgabe</button><button class="addbtn" onclick="addRow('sport')">+ Sport</button></div>
    </div>
    <div class="tablewrap"><table>${head}<tbody>${items.map(rowHtml).join('')||`<tr><td colspan="9"><div class="empty">Keine Einträge für diesen Filter.</div></td></tr>`}</tbody></table></div></div>`;
}

function boardView(){
  const items=workItems();
  const cols=STATI.map(s=>{
    const list=sortItems(items.filter(r=>r.status===s[0]));
    const cards=list.map(r=>{
      const stOpts=STATI.map(x=>`<option value="${x[0]}" ${x[0]===r.status?'selected':''}>${x[1]}</option>`).join('');
      const c=BEREICHE[r.bereich]?BEREICHE[r.bereich].c:'var(--accent)';
      return `<div class="card" style="border-left-color:${c}">
        <div class="ct">${r.uebernommen?'<span class="ueber" title="übernommen">↪</span> ':''}${esc(r.aufgabe)||'<span style="color:var(--muted)">(ohne Titel)</span>'}</div>
        <div class="meta">
          ${r.prioritaet?`<span class="pill p-${r.prioritaet}">${r.prioritaet}</span>`:''}
          ${r.wochentag?`<span class="tag">${esc(r.wochentag)}</span>`:''}
          ${r.uhrzeit?`<span class="tag">${esc(r.uhrzeit)}</span>`:''}
          <span class="tag">${BEREICHE[r.bereich]?BEREICHE[r.bereich].t:r.bereich}</span>
        </div>
        <select onchange="updField('${r.id}','status',this.value)">${stOpts}</select>
      </div>`;
    }).join('');
    return `<div class="col"><div class="col-hd"><span>${s[1]}</span><span style="color:var(--muted)">${list.length}</span></div><div class="col-bd">${cards||'<div class="empty" style="padding:10px">—</div>'}</div></div>`;
  }).join('');
  return `<div class="board">${cols}</div>`;
}

function render(){
  const items=ROWS.filter(r=>r.bereich!=='jahresziele');
  const done=items.filter(r=>r.status==='erledigt').length;
  const ziele=ROWS.filter(r=>r.bereich==='jahresziele');
  const ueberCnt=ROWS.filter(r=>r.uebernommen).length;
  const p=pct(done,items.length);
  const zfv=Object.values(ZF).filter(r=>(r.inhalt||'').trim());
  const zfKept=zfv.filter(r=>r.eingehalten).length;
  const zfPct=pct(zfKept,zfv.length);
  $('kpis').innerHTML=`
    <div class="kpi big"><div class="l">Wochenfortschritt</div><div class="v">${p}%</div><div class="bar"><div style="width:${p}%"></div></div><div class="h">${done} von ${items.length} Einträgen erledigt</div></div>
    <div class="kpi"><div class="l">Zeitfenster eingehalten</div><div class="v">${zfv.length?zfPct+'%':'—'}</div><div class="h">${zfKept}/${zfv.length} umgesetzt</div></div>
    <div class="kpi"><div class="l">Jahresziele</div><div class="v">${ziele.length}</div><div class="h">übergeordnete Ziele</div></div>
    <div class="kpi"><div class="l">Übernommen</div><div class="v">${ueberCnt}</div><div class="h">↪ aus Vorwoche</div></div>`;
  renderZF(); zieleTable(); bereichSeg(); tagSeg();
  $('work').innerHTML = VIEW==='list' ? listView() : boardView();
}

(async()=>{
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ $('main').innerHTML='<div class="empty" style="padding:60px">Bitte zuerst im OS einloggen.</div>'; return; }
  load();
})();
</script>
</body>
</html>
