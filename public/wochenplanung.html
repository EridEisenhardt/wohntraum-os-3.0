<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wochenplanung · Macher OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f6f7f9;--surf:#fff;--surf2:#f1f3f6;--surf3:#e7ebf0;--line:#e6e8ec;--bord2:#eef0f3;
  --text:#1c2024;--muted:#6b7280;--dim:#4b5563;
  --accent:#2563eb;--ok:#1f7a4d;--warn:#b45309;--danger:#c62828;--top3:#c8741f;
  --ziel:#7c3aed;--ziel-bg:#efeafc;--ziel-bd:#e0d6f7;
  --b-routine:#7c3aed;--b-aufgabe:#2563eb;--b-sport:#1f7a4d;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;font-variant-numeric:tabular-nums}
.hdr{background:var(--surf);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.hdr-l{display:flex;align-items:baseline;gap:12px}
.hdr-title{font-size:20px;font-weight:700}
.hdr-sub{font-size:12.5px;color:var(--muted)}
.wknav{display:flex;align-items:center;gap:6px}
.wknav button{font-size:14px;font-weight:600;width:30px;height:30px;border-radius:var(--r);border:1px solid var(--line);background:var(--surf2);color:var(--text);cursor:pointer}
.wknav button:hover{background:var(--surf3)}
.wknav .kwlbl{font-size:13px;font-weight:600;min-width:96px;text-align:center}
.main{max-width:1160px;margin:0 auto;padding:18px 24px 60px}
.sec{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);margin-bottom:16px;overflow:hidden}
.sec-hd{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.sec-hd .t{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px}
.sec-hd .t .cnt{color:var(--muted);font-weight:600;text-transform:none;letter-spacing:0}
.sec-hd .prog{font-size:11px;color:var(--muted);font-weight:600}
.pad{padding:14px 16px}
/* Chips (Jahresziele) */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--ziel-bg);color:#5b3fb0;border:1px solid var(--ziel-bd);border-radius:20px;padding:6px 11px;font-size:12.5px;font-weight:600}
.chip .cd{width:7px;height:7px;border-radius:50%;background:var(--ziel)}
.chip button{border:none;background:none;color:#9184c0;cursor:pointer;font-size:14px;line-height:1;padding:0}
.chip button:hover{color:var(--danger)}
.addrow{display:flex;gap:8px;flex-wrap:wrap}
.addrow input{flex:1;min-width:160px;border:1px solid var(--line);border-radius:var(--r);padding:9px 11px;font:inherit;font-size:13px;background:var(--surf)}
.addrow input:focus{outline:none;border-color:var(--accent)}
.btn{font-size:12.5px;font-weight:600;padding:9px 15px;border-radius:var(--r);border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;white-space:nowrap}
.btn:hover{opacity:.92}
.btn.g{background:var(--surf);color:var(--text);border-color:var(--line)}
.btn.g:hover{background:var(--surf2)}
/* Routine rows */
.rz{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--bord2)}
.rz:last-of-type{border-bottom:none}
.rztime{font-weight:600;min-width:118px;font-variant-numeric:tabular-nums}
.rzname{flex:1;min-width:120px}
.rzname input,.rztime input{width:100%;border:1px solid transparent;background:transparent;font:inherit;font-weight:inherit;padding:5px 6px;border-radius:5px;color:var(--text)}
.rzname input:hover,.rztime input:hover{border-color:var(--line)} .rzname input:focus,.rztime input:focus{outline:none;border-color:var(--accent);background:var(--surf)}
.daytg{display:flex;gap:3px}
.daytg button{min-width:30px;height:27px;border-radius:6px;border:1px solid var(--line);background:var(--surf2);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer}
.daytg button.on{background:#e7effd;color:var(--accent);border-color:#bcd4f5}
.trash{border:1px solid var(--line);background:var(--surf);border-radius:6px;width:30px;height:28px;cursor:pointer;color:var(--muted)}
.trash:hover{color:var(--danger);border-color:var(--danger)}
/* Zeitfenster-Matrix */
.tablewrap{overflow-x:auto}
.zftbl{width:100%;border-collapse:collapse;font-size:12px;min-width:1000px}
.zftbl th,.zftbl td{padding:7px 8px;border-bottom:1px solid var(--bord2);text-align:left;vertical-align:top}
.zftbl th{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:var(--surf2)}
.zftbl th.today,.zftbl td.today{background:rgba(200,116,31,.08)}
.zfcell{display:flex;flex-direction:column;gap:4px}
.zfcell input.cin{width:100%;min-width:120px;border:1px solid transparent;background:transparent;font:inherit;padding:5px 6px;border-radius:5px}
.zfcell input.cin:hover{border-color:var(--line)} .zfcell input.cin:focus{outline:none;border-color:var(--accent);background:var(--surf)}
.zfchk{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);cursor:pointer}
.zfchk.on{color:var(--ok);font-weight:600}
.slotlbl{font-weight:600;color:var(--dim);white-space:nowrap}
/* Toolbar */
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.fchip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;border:1px solid var(--line);background:var(--surf);font-size:12.5px;font-weight:600;color:var(--text);cursor:pointer}
.fchip .cnt{background:var(--surf2);border-radius:20px;padding:0 7px;font-size:11px;color:var(--muted)}
.fchip.on{background:var(--text);color:#fff;border-color:var(--text)}.fchip.on .cnt{background:rgba(255,255,255,.22);color:#fff}
.fchip.today{box-shadow:0 0 0 2px #f0c98a}
.bchip{padding:7px 12px;border-radius:20px;border:1px solid var(--line);background:var(--surf);font-size:12.5px;font-weight:600;color:var(--text);cursor:pointer}
.bchip.on{background:#e7effd;color:var(--accent);border-color:#bcd4f5}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.seg button{font:inherit;font-size:12px;font-weight:600;padding:7px 13px;border:none;background:var(--surf);color:var(--muted);cursor:pointer;border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}.seg button.on{background:var(--accent);color:#fff}
.chkbox{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--dim);border:1px solid var(--line);background:var(--surf);border-radius:20px;padding:6px 12px;cursor:pointer}
/* Work table */
table.wt{width:100%;border-collapse:collapse;font-size:12.5px;min-width:940px}
.wt th,.wt td{padding:7px 9px;text-align:left;border-bottom:1px solid var(--bord2);vertical-align:middle}
.wt th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:var(--surf2)}
.wt tr.done td{background:rgba(31,122,77,.05)}
.cin{width:100%;border:1px solid transparent;background:transparent;font:inherit;color:var(--text);padding:5px 6px;border-radius:5px}
.cin:hover{border-color:var(--line)} .cin:focus{outline:none;border-color:var(--accent);background:var(--surf)}
select.cin{cursor:pointer}
.stsel{font:inherit;font-size:12px;font-weight:600;border:1px solid var(--line);border-radius:20px;padding:4px 8px;cursor:pointer;background:var(--surf2)}
.st-offen{color:var(--muted)}.st-in_arbeit{color:var(--accent)}.st-warten{color:var(--warn)}.st-erledigt{color:var(--ok)}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;color:#fff}
.p-P1{background:var(--danger)}.p-P2{background:var(--warn)}.p-P3{background:var(--accent)}.p-P4{background:var(--muted)}
.abtn{font-size:12px;padding:3px 8px;border-radius:5px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer}
.abtn:hover{color:var(--danger);border-color:var(--danger)}
.ueber{color:var(--warn);font-weight:700;cursor:help}
.empty{text-align:center;padding:26px;color:var(--muted);font-size:12.5px}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}@media(max-width:900px){.board{grid-template-columns:1fr 1fr}}
.col{background:var(--surf2);border:1px solid var(--line);border-radius:var(--rl);overflow:hidden}
.col-hd{padding:9px 12px;font-size:12px;font-weight:700;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;background:var(--surf)}
.col-bd{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:50px}
.card{border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:var(--r);padding:8px 10px;font-size:12.5px;background:var(--surf)}
.card .ct{font-weight:600;margin-bottom:5px}
.card .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.card .tag{font-size:10px;color:var(--muted);background:var(--surf2);border-radius:20px;padding:1px 7px}
.card select{font:inherit;font-size:11px;border:1px solid var(--line);border-radius:5px;padding:2px 4px;margin-top:6px;background:var(--surf2)}
.foot{font-size:11px;color:var(--muted);text-align:center;margin-top:18px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surf3);border:1px solid var(--line);border-radius:var(--r);padding:10px 20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-l">
    <div class="hdr-title">Wochenplanung</div>
    <div class="hdr-sub" id="heute"></div>
  </div>
  <div class="wknav">
    <button onclick="shiftWeek(-1)" title="Vorherige Woche">‹</button>
    <div class="kwlbl" id="kwlbl">KW —</div>
    <button onclick="shiftWeek(1)" title="Nächste Woche">›</button>
    <button onclick="thisWeek()" style="width:auto;padding:0 10px;font-size:12px">heute</button>
  </div>
</div>

<div class="main" id="main">
  <!-- Jahresziele -->
  <div class="sec">
    <div class="sec-hd"><div class="t">Jahresziele <span class="cnt" id="zieleCnt"></span></div></div>
    <div class="pad">
      <div class="chips" id="zieleChips"></div>
      <div class="addrow">
        <input id="newZiel" placeholder="Neues Jahresziel …" onkeydown="if(event.key==='Enter')addZiel()">
        <button class="btn g" onclick="addZiel()">+ Ziel</button>
      </div>
    </div>
  </div>

  <!-- Routinezeitfenster -->
  <div class="sec">
    <div class="sec-hd"><div class="t">Routinezeitfenster <span class="cnt" id="rzCnt"></span></div></div>
    <div id="rzList"></div>
    <div class="pad" style="border-top:1px solid var(--bord2)">
      <div class="addrow">
        <input id="rzName" placeholder="Routine (z. B. Deep Work)">
        <input id="rzZeit" placeholder="Zeit (z. B. 08:00–09:30)" style="max-width:200px">
        <input id="rzTage" placeholder="Tage: Mo Di Mi …" style="max-width:200px">
        <button class="btn g" onclick="addRoutine()">+ Fenster</button>
      </div>
    </div>
  </div>

  <!-- Tages-Zeitfenster (Umsetzung) -->
  <div class="sec">
    <div class="sec-hd"><div class="t">Tages-Zeitfenster · Umsetzung <span class="cnt">5 pro Tag</span></div><span class="prog" id="zfProg"></span></div>
    <div class="tablewrap"><table class="zftbl" id="zfTbl"></table></div>
  </div>

  <!-- Top 3 Fragen -->
  <div class="sec">
    <div class="sec-hd"><div class="t">Top 3 Fragen zur Wochenplanung</div><span class="prog" id="fragenSaved"></span></div>
    <div class="pad" style="display:grid;gap:12px">
      <div><label style="font-size:12px;font-weight:600;color:var(--dim)">1 · Was ist kommende Woche wirklich wichtig?</label>
        <textarea id="fa1" rows="2" style="width:100%;margin-top:5px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;resize:vertical;background:var(--surf2)" onchange="saveFragen()"></textarea></div>
      <div><label style="font-size:12px;font-weight:600;color:var(--dim)">2 · Was bringt mich und meine Jahresziele wirklich voran?</label>
        <textarea id="fa2" rows="2" style="width:100%;margin-top:5px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;resize:vertical;background:var(--surf2)" onchange="saveFragen()"></textarea></div>
      <div><label style="font-size:12px;font-weight:600;color:var(--dim)">3 · Von welchen Dingen möchte ich mich nicht ablenken lassen?</label>
        <textarea id="fa3" rows="2" style="width:100%;margin-top:5px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;resize:vertical;background:var(--surf2)" onchange="saveFragen()"></textarea></div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="tagChips"></div>
  <div class="toolbar">
    <div id="bereichChips" style="display:flex;gap:8px;flex-wrap:wrap"></div>
    <label class="chkbox"><input type="checkbox" id="hideDone" onchange="HIDE_DONE=this.checked;render()"> Erledigte ausblenden</label>
    <span class="seg"><button id="vList" class="on" onclick="setView('list')">Liste</button><button id="vBoard" onclick="setView('board')">Board</button></span>
    <button class="btn g" onclick="carryOver()" title="Nicht erledigte aus Vorwoche übernehmen">↪ Übernehmen</button>
    <button class="btn" onclick="addTask()">+ Neue Aufgabe</button>
  </div>

  <div id="work"></div>

  <div class="foot" id="foot"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const SB_URL='https://jqzxctfqvcwbctpjksvg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxenhjdGZxdmN3YmN0cGprc3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzA0MzIsImV4cCI6MjA5NzcwNjQzMn0.RKIbZxJdusKWWPjBJqlxZ8e1m8So02UslOg55YRsn3o';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

const STATI=[['offen','Offen'],['in_arbeit','In Arbeit'],['warten','Warten'],['erledigt','Erledigt']];
const PRIOS=['P1','P2','P3','P4'];
const PRV={'P1':1,'P2':2,'P3':3,'P4':4};
const TAGE=['Mo','Di','Mi','Do','Fr','Sa','So'];
const TAGV={'Mo':1,'Di':2,'Mi':3,'Do':4,'Fr':5,'Sa':6,'So':7};
const TAGNAME=['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
const MON=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const BEREICHE={routine:{t:'Routine',c:'var(--b-routine)'},aufgabe:{t:'Aufgaben',c:'var(--b-aufgabe)'},sport:{t:'Sport / Regeneration',c:'var(--b-sport)'}};
const TODAY_TAG=TAGE[(new Date().getDay()+6)%7];

function isoWeek(d){ const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const dn=(date.getUTCDay()+6)%7; date.setUTCDate(date.getUTCDate()-dn+3); const ft=new Date(Date.UTC(date.getUTCFullYear(),0,4)); const kw=1+Math.round(((date-ft)/86400000-3+((ft.getUTCDay()+6)%7))/7); return {kw,jahr:date.getUTCFullYear()}; }
function mondayOf(jahr,kw){ const s=new Date(Date.UTC(jahr,0,1+(kw-1)*7)); const dow=s.getUTCDay(); if(dow<=4) s.setUTCDate(s.getUTCDate()-((dow+6)%7)); else s.setUTCDate(s.getUTCDate()+(8-dow)); return s; }
function fmtRange(jahr,kw){ const mo=mondayOf(jahr,kw); const su=new Date(mo); su.setUTCDate(mo.getUTCDate()+6); const f=d=>('0'+d.getUTCDate()).slice(-2)+'.'+('0'+(d.getUTCMonth()+1)).slice(-2)+'.'; return f(mo)+'–'+f(su); }

let CUR=isoWeek(new Date());
let ROWS=[], ZF={};
let VIEW='list', F_BEREICH='', F_TAG='', HIDE_DONE=false;

function shiftWeek(n){ const mo=mondayOf(CUR.jahr,CUR.kw); mo.setUTCDate(mo.getUTCDate()+n*7); CUR=isoWeek(new Date(mo.getUTCFullYear(),mo.getUTCMonth(),mo.getUTCDate())); load(); }
function thisWeek(){ CUR=isoWeek(new Date()); load(); }
function isCurWeek(){ const n=isoWeek(new Date()); return n.kw===CUR.kw && n.jahr===CUR.jahr; }
function setView(v){ VIEW=v; $('vList').classList.toggle('on',v==='list'); $('vBoard').classList.toggle('on',v==='board'); render(); }

async function load(){
  const now=new Date();
  $('heute').textContent='Heute ist '+TAGNAME[(now.getDay()+6)%7]+' · '+('0'+now.getDate()).slice(-2)+'. '+MON[now.getMonth()]+' '+now.getFullYear();
  $('kwlbl').textContent='KW '+CUR.kw+' · '+CUR.jahr; $('kwlbl').title=fmtRange(CUR.jahr,CUR.kw);
  const { data, error } = await sb.from('wochenplanung').select('id,bereich,pos,aufgabe,kategorie,prioritaet,wochentag,uhrzeit,ziel,rhythmus,uebernommen,status,notizen')
    .eq('jahr',CUR.jahr).eq('kw',CUR.kw).order('pos',{ascending:true}).order('created_at',{ascending:true});
  ROWS = error ? [] : (data||[]);
  if(error) toast('Fehler beim Laden: '+error.message);
  await loadZF(); render(); loadFragen();
}
async function loadZF(){
  const { data } = await sb.from('wochen_zeitfenster').select('tag,slot,inhalt,eingehalten').eq('jahr',CUR.jahr).eq('kw',CUR.kw);
  ZF={}; (data||[]).forEach(r=>{ ZF[r.tag+'_'+r.slot]=r; });
}
async function loadFragen(){
  const { data } = await sb.from('wochen_fragen').select('antwort1,antwort2,antwort3').eq('jahr',CUR.jahr).eq('kw',CUR.kw).maybeSingle();
  $('fa1').value=data?.antwort1||''; $('fa2').value=data?.antwort2||''; $('fa3').value=data?.antwort3||''; $('fragenSaved').textContent='';
}
let fragenTimer=null;
async function saveFragen(){
  const rec={ jahr:CUR.jahr, kw:CUR.kw, antwort1:$('fa1').value.trim()||null, antwort2:$('fa2').value.trim()||null, antwort3:$('fa3').value.trim()||null, updated_at:new Date().toISOString() };
  const { error } = await sb.from('wochen_fragen').upsert(rec, { onConflict:'jahr,kw' });
  $('fragenSaved').textContent = error ? 'Fehler: '+error.message : 'gespeichert ✓';
  clearTimeout(fragenTimer); fragenTimer=setTimeout(()=>{ $('fragenSaved').textContent=''; }, 2000);
}

async function insertRow(rec){
  const u=(await sb.auth.getUser()).data.user; rec.jahr=CUR.jahr; rec.kw=CUR.kw; rec.created_by=u?u.id:null;
  const { error } = await sb.from('wochenplanung').insert(rec);
  if(error){ toast('Anlegen fehlgeschlagen: '+error.message); return false; } return true;
}
async function addZiel(){
  const v=$('newZiel').value.trim(); if(!v) return; $('newZiel').value='';
  if(await insertRow({ bereich:'jahresziele', aufgabe:v, status:'offen' })) await load();
}
async function addRoutine(){
  const name=$('rzName').value.trim(); if(!name){ toast('Name fehlt'); return; }
  const zeit=$('rzZeit').value.trim();
  const tage=($('rzTage').value.match(/Mo|Di|Mi|Do|Fr|Sa|So/gi)||[]).map(s=>s[0].toUpperCase()+s[1].toLowerCase());
  const uniq=[...new Set(tage)].sort((a,b)=>TAGV[a]-TAGV[b]).join(',');
  $('rzName').value=''; $('rzZeit').value=''; $('rzTage').value='';
  if(await insertRow({ bereich:'routine', aufgabe:name, uhrzeit:zeit||null, wochentag:uniq||null, status:'offen' })) await load();
}
async function addTask(){
  const max=Math.max(0,...ROWS.filter(r=>r.bereich==='aufgabe').map(r=>r.pos||0));
  if(await insertRow({ bereich:'aufgabe', pos:max+1, prioritaet:'P2', status:'offen', wochentag:(F_TAG&&F_TAG!=='none')?F_TAG:null })) await load();
}
async function updField(id, field, val){
  const { error } = await sb.from('wochenplanung').update({ [field]: (val===''?null:val) }).eq('id',id);
  if(error){ toast('Speichern fehlgeschlagen: '+error.message); return; }
  const r=ROWS.find(x=>x.id===id); if(r){ r[field]=val; render(); }
}
async function toggleDay(id,day){
  const r=ROWS.find(x=>x.id===id); if(!r) return;
  let set=(r.wochentag||'').split(/[,\s]+/).filter(Boolean);
  if(set.includes(day)) set=set.filter(d=>d!==day); else set.push(day);
  set.sort((a,b)=>TAGV[a]-TAGV[b]);
  await updField(id,'wochentag',set.join(','));
}
async function delRow(id){
  const { error } = await sb.from('wochenplanung').delete().eq('id',id);
  if(error){ toast('Löschen fehlgeschlagen: '+error.message); return; }
  await load();
}
async function zfSet(tag,slot,field,val){
  const rec={ jahr:CUR.jahr, kw:CUR.kw, tag, slot, updated_at:new Date().toISOString() };
  rec[field] = field==='inhalt' ? (String(val).trim()||null) : !!val;
  const { error } = await sb.from('wochen_zeitfenster').upsert(rec,{ onConflict:'jahr,kw,tag,slot' });
  if(error){ toast('Speichern fehlgeschlagen: '+error.message); return; }
  const k=tag+'_'+slot; ZF[k]=Object.assign({tag,slot,inhalt:null,eingehalten:false}, ZF[k]||{}, {[field]:rec[field]}); render();
}
async function carryOver(){
  const mo=mondayOf(CUR.jahr,CUR.kw); mo.setUTCDate(mo.getUTCDate()-7);
  const prev=isoWeek(new Date(mo.getUTCFullYear(),mo.getUTCMonth(),mo.getUTCDate()));
  const { data, error } = await sb.from('wochenplanung').select('*').eq('jahr',prev.jahr).eq('kw',prev.kw).neq('status','erledigt').in('bereich',['aufgabe','sport']);
  if(error){ toast('Fehler: '+error.message); return; }
  const src=(data||[]).filter(r=>(r.aufgabe||'').trim());
  if(!src.length){ toast('Keine offenen Aufgaben in KW '+prev.kw); return; }
  const ex=new Set(ROWS.map(r=>(r.aufgabe||'').trim().toLowerCase()));
  const todo=src.filter(r=>!ex.has(r.aufgabe.trim().toLowerCase()));
  if(!todo.length){ toast('Alle offenen Aufgaben bereits übernommen'); return; }
  if(!confirm(todo.length+' nicht erledigte Aufgabe(n) aus KW '+prev.kw+' übernehmen?')) return;
  const u=(await sb.auth.getUser()).data.user;
  const recs=todo.map(r=>({ jahr:CUR.jahr,kw:CUR.kw,bereich:r.bereich,pos:r.pos||0,aufgabe:r.aufgabe,kategorie:r.kategorie,prioritaet:r.prioritaet||'P2',wochentag:r.wochentag,uhrzeit:r.uhrzeit,ziel:r.ziel,status:'offen',uebernommen:true,notizen:r.notizen,created_by:u?u.id:null }));
  const { error:e2 } = await sb.from('wochenplanung').insert(recs);
  if(e2){ toast('Übernahme fehlgeschlagen: '+e2.message); return; }
  toast(recs.length+' Aufgabe(n) übernommen ↪'); await load();
}

function pct(a,b){ return b? Math.round(a/b*100):0; }
function dayList(r){ return (r.wochentag||'').split(/[,\s]+/).filter(Boolean); }

/* Jahresziele */
function renderZiele(){
  const z=ROWS.filter(r=>r.bereich==='jahresziele');
  $('zieleCnt').textContent=z.length+' Ziele';
  $('zieleChips').innerHTML = z.length ? z.map(r=>`<span class="chip"><span class="cd"></span>${esc(r.aufgabe)}<button onclick="delRow('${r.id}')" title="Entfernen">×</button></span>`).join('') : '<span style="color:var(--muted);font-size:12.5px">Noch keine Jahresziele.</span>';
}
/* Routinezeitfenster */
function renderRoutine(){
  const rz=ROWS.filter(r=>r.bereich==='routine').sort((a,b)=>{ const ta=(a.uhrzeit||''),tb=(b.uhrzeit||''); return ta.localeCompare(tb); });
  $('rzCnt').textContent=rz.length+' Fenster';
  $('rzList').innerHTML = rz.length ? rz.map(r=>{
    const days=dayList(r);
    const tg=TAGE.map(t=>`<button class="${days.includes(t)?'on':''}" onclick="toggleDay('${r.id}','${t}')">${t}</button>`).join('');
    return `<div class="rz">
      <div class="rztime"><input value="${esc(r.uhrzeit)}" placeholder="Zeit" onchange="updField('${r.id}','uhrzeit',this.value)"></div>
      <div class="rzname"><input value="${esc(r.aufgabe)}" placeholder="Routine…" onchange="updField('${r.id}','aufgabe',this.value)"></div>
      <div class="daytg">${tg}</div>
      <button class="trash" onclick="delRow('${r.id}')" title="Löschen">🗑</button>
    </div>`;
  }).join('') : '<div class="empty">Noch keine Routinen — unten anlegen.</div>';
}
/* Zeitfenster-Matrix */
function renderZF(){
  let head='<thead><tr><th>Zeitfenster</th>'+TAGE.map(t=>`<th class="${t===TODAY_TAG&&isCurWeek()?'today':''}">${t}</th>`).join('')+'</tr></thead>';
  let body='';
  for(let slot=1;slot<=5;slot++){
    body+='<tr><td class="slotlbl">Fenster '+slot+'</td>'+TAGE.map(t=>{
      const r=ZF[t+'_'+slot]||{}; const on=!!r.eingehalten, td=(t===TODAY_TAG&&isCurWeek())?'today':'';
      return `<td class="${td}"><div class="zfcell">
        <input class="cin" value="${esc(r.inhalt)}" placeholder="—" onchange="zfSet('${t}',${slot},'inhalt',this.value)">
        <label class="zfchk ${on?'on':''}"><input type="checkbox" ${on?'checked':''} onchange="zfSet('${t}',${slot},'eingehalten',this.checked)"> ${on?'eingehalten ✓':'eingehalten'}</label>
      </div></td>`;
    }).join('')+'</tr>';
  }
  $('zfTbl').innerHTML=head+'<tbody>'+body+'</tbody>';
  const vals=Object.values(ZF).filter(r=>(r.inhalt||'').trim()); const kept=vals.filter(r=>r.eingehalten).length;
  $('zfProg').textContent = vals.length ? pct(kept,vals.length)+'% eingehalten ('+kept+'/'+vals.length+')' : 'noch nichts erfasst';
}

/* Filter + Work */
function baseItems(){
  return ROWS.filter(r=>r.bereich!=='jahresziele')
    .filter(r=>!F_BEREICH||r.bereich===F_BEREICH)
    .filter(r=>!HIDE_DONE || r.status!=='erledigt');
}
function tagMatch(r){ if(F_TAG==='') return true; if(F_TAG==='none') return dayList(r).length===0; return dayList(r).includes(F_TAG); }
function sortItems(list){ return list.slice().sort((a,b)=>{ const da=TAGV[dayList(a)[0]]||9,db=TAGV[dayList(b)[0]]||9; if(da!==db)return da-db; const pa=PRV[a.prioritaet]||9,pb=PRV[b.prioritaet]||9; if(pa!==pb)return pa-pb; return (a.pos||0)-(b.pos||0); }); }

function renderTagChips(){
  const base=baseItems();
  const cnt={}; TAGE.forEach(t=>cnt[t]=0); let none=0;
  base.forEach(r=>{ const d=dayList(r); if(!d.length) none++; else d.forEach(x=>{ if(cnt[x]!=null)cnt[x]++; }); });
  const chip=(val,lbl,n,today)=>`<span class="fchip ${F_TAG===val?'on':''} ${today?'today':''}" onclick="F_TAG='${val}';render()">${lbl} <span class="cnt">${n}</span></span>`;
  $('tagChips').innerHTML = chip('','Alle',base.length,false)
    + TAGE.map(t=>chip(t,t,cnt[t], t===TODAY_TAG&&isCurWeek())).join('')
    + chip('none','Unterminiert',none,false);
}
function renderBereichChips(){
  const opts=[['','Alle Bereiche'],['routine','Routine'],['aufgabe','Aufgaben'],['sport','Sport / Regeneration']];
  $('bereichChips').innerHTML=opts.map(o=>`<span class="bchip ${F_BEREICH===o[0]?'on':''}" onclick="F_BEREICH='${o[0]}';render()">${o[1]}</span>`).join('');
}
function rowHtml(r){
  const stOpts=STATI.map(s=>`<option value="${s[0]}" ${s[0]===r.status?'selected':''}>${s[1]}</option>`).join('');
  const brOpts=Object.keys(BEREICHE).map(k=>`<option value="${k}" ${k===r.bereich?'selected':''}>${BEREICHE[k].t}</option>`).join('');
  const prOpts=PRIOS.map(p=>`<option ${p===(r.prioritaet||'')?'selected':''}>${p}</option>`).join('');
  const tagOpts=TAGE.map(t=>`<option ${t===dayList(r)[0]?'selected':''}>${t}</option>`).join('');
  const ueber=r.uebernommen?`<span class="ueber" title="Aus Vorwoche übernommen">↪</span> `:'';
  const zl=ROWS.filter(x=>x.bereich==='jahresziele'&&x.aufgabe).map(x=>`<option value="${esc(x.aufgabe)}">`).join('');
  return `<tr class="${r.status==='erledigt'?'done':''}">
    <td style="min-width:210px">${ueber}<input class="cin" value="${esc(r.aufgabe)}" placeholder="Bezeichnung…" style="width:86%" onchange="updField('${r.id}','aufgabe',this.value)"></td>
    <td><select class="cin" onchange="updField('${r.id}','bereich',this.value)">${brOpts}</select></td>
    <td><select class="cin" onchange="updField('${r.id}','prioritaet',this.value)"><option value="">—</option>${prOpts}</select></td>
    <td><select class="cin" onchange="updField('${r.id}','wochentag',this.value)"><option value="">—</option>${tagOpts}</select></td>
    <td><input class="cin" value="${esc(r.uhrzeit)}" placeholder="Uhrzeit" style="width:90px" onchange="updField('${r.id}','uhrzeit',this.value)"></td>
    <td><input class="cin" list="ziellist" value="${esc(r.ziel)}" placeholder="Jahresziel" style="min-width:110px" onchange="updField('${r.id}','ziel',this.value)"></td>
    <td><select class="stsel st-${r.status}" onchange="updField('${r.id}','status',this.value)">${stOpts}</select></td>
    <td><input class="cin" value="${esc(r.notizen)}" placeholder="Notiz" style="min-width:110px" onchange="updField('${r.id}','notizen',this.value)"></td>
    <td style="width:36px"><button class="abtn" onclick="delRow('${r.id}')">✕</button></td>
  </tr><datalist id="ziellist">${zl}</datalist>`;
}
function listView(items){
  const head='<thead><tr><th>Bezeichnung</th><th>Bereich</th><th>Prio</th><th>Tag</th><th>Uhrzeit</th><th>Jahresziel</th><th>Status</th><th>Notiz</th><th></th></tr></thead>';
  return `<div class="sec"><div class="tablewrap"><table class="wt">${head}<tbody>${items.map(rowHtml).join('')||`<tr><td colspan="9"><div class="empty">Keine Aufgaben für diese Auswahl.</div></td></tr>`}</tbody></table></div></div>`;
}
function boardView(items){
  const cols=STATI.map(s=>{
    const list=sortItems(items.filter(r=>r.status===s[0]));
    const cards=list.map(r=>{
      const stOpts=STATI.map(x=>`<option value="${x[0]}" ${x[0]===r.status?'selected':''}>${x[1]}</option>`).join('');
      const c=BEREICHE[r.bereich]?BEREICHE[r.bereich].c:'var(--accent)';
      return `<div class="card" style="border-left-color:${c}">
        <div class="ct">${r.uebernommen?'<span class="ueber">↪</span> ':''}${esc(r.aufgabe)||'<span style="color:var(--muted)">(ohne Titel)</span>'}</div>
        <div class="meta">${r.prioritaet?`<span class="pill p-${r.prioritaet}">${r.prioritaet}</span>`:''}${(dayList(r)[0])?`<span class="tag">${esc(dayList(r).join(','))}</span>`:''}${r.uhrzeit?`<span class="tag">${esc(r.uhrzeit)}</span>`:''}<span class="tag">${BEREICHE[r.bereich]?BEREICHE[r.bereich].t:r.bereich}</span></div>
        <select onchange="updField('${r.id}','status',this.value)">${stOpts}</select>
      </div>`;
    }).join('');
    return `<div class="col"><div class="col-hd"><span>${s[1]}</span><span style="color:var(--muted)">${list.length}</span></div><div class="col-bd">${cards||'<div class="empty" style="padding:8px">—</div>'}</div></div>`;
  }).join('');
  return `<div class="board">${cols}</div>`;
}

function render(){
  renderZiele(); renderRoutine(); renderZF(); renderBereichChips(); renderTagChips();
  const items=baseItems().filter(tagMatch);
  $('work').innerHTML = VIEW==='list' ? listView(sortItems(items)) : boardView(items);
  const all=ROWS.filter(r=>r.bereich!=='jahresziele'); const done=all.filter(r=>r.status==='erledigt').length;
  $('foot').innerHTML=`In Supabase gespeichert · Woche wechseln oben · P1 = wichtigste Aufgabe · ${done}/${all.length} erledigt`;
}

(async()=>{
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ $('main').innerHTML='<div class="empty" style="padding:60px">Bitte zuerst im OS einloggen.</div>'; return; }
  load();
})();
</script>
</body>
