<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darlehensgenerator · Macher OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f6f7f9;--surf:#fff;--surf2:#f1f3f6;--surf3:#e7ebf0;--line:#e6e8ec;--bord2:#eef0f3;
  --text:#1c2024;--muted:#6b7280;--dim:#4b5563;
  --accent:#185fa5;--accent-dk:#134a82;--intern:#7c3aed;--co:#0f9d6b;
  --ok:#0f9d6b;--warn:#b45309;--danger:#c62828;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;font-variant-numeric:tabular-nums}
.hdr{background:var(--surf);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.hdr-l{display:flex;align-items:center;gap:12px}
.logo{background:var(--accent);color:#fff;font-weight:700;font-size:11px;letter-spacing:.08em;padding:5px 9px;border-radius:4px}
.hdr-title{font-size:16px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--muted)}
.btn{font-size:13px;font-weight:500;padding:8px 14px;border-radius:var(--r);border:1px solid var(--line);background:var(--surf2);color:var(--text);cursor:pointer}
.btn:hover{background:var(--surf3)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.btn-accent:hover{background:var(--accent-dk)}
.layout{display:grid;grid-template-columns:360px 1fr;gap:18px;max-width:1320px;margin:0 auto;padding:20px 24px 60px}
@media(max-width:980px){.layout{grid-template-columns:1fr}}
.panel{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl)}
.panel-hd{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.form{padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:500;color:var(--dim)}
.fg input,.fg select,.fg textarea{font-family:inherit;font-size:13px;background:var(--surf2);border:1px solid var(--line);border-radius:var(--r);color:var(--text);padding:8px 10px;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--accent)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fsec{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding-top:8px;border-top:1px solid var(--line);margin-top:4px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:14px 16px}
.kpi{background:var(--surf2);border:1px solid var(--line);border-radius:var(--r);padding:11px 13px}
.kpi .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.kpi .v{font-size:18px;font-weight:600;margin-top:4px}
.kpi .s{font-size:10px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:4px;padding:0 16px;border-bottom:1px solid var(--line)}
.tab{font-size:13px;font-weight:500;padding:10px 14px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tabbody{padding:16px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--bord2);white-space:nowrap}
th:first-child,td:first-child{text-align:left}
th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:var(--surf2)}
tr.sum td{border-top:2px solid var(--text);font-weight:700;background:#fafbfd}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block}
.p-intern{background:rgba(124,58,237,.1);color:var(--intern)}
.p-co{background:rgba(15,157,107,.12);color:var(--co)}
.contract{font-family:'Georgia',serif;font-size:13px;line-height:1.7;color:#222;max-width:760px}
.contract h1{font-size:18px;text-align:center;margin-bottom:4px}
.contract .ct-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:20px;font-family:'Inter',sans-serif}
.contract h3{font-size:14px;margin:18px 0 4px}
.contract p{margin:6px 0}
.contract .parties{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:14px 0}
.contract .sign{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:46px}
.contract .sign .box{border-top:1px solid #333;padding-top:5px;font-size:11px;color:var(--muted);font-family:'Inter',sans-serif}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surf3);border:1px solid var(--line);border-radius:var(--r);padding:10px 20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.hint{font-size:11px;color:var(--muted)}
@media print{
  .hdr,.panel.input,.tabs,.no-print{display:none!important}
  .layout{grid-template-columns:1fr;padding:0}
  .panel{border:none}
  .tabbody{padding:0}
  #planWrap.hideprint,#contractWrap.hideprint{display:none}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-l">
    <div class="logo">MACHER OS</div>
    <div>
      <div class="hdr-title">Darlehensgenerator</div>
      <div class="hdr-sub">Interne &amp; Co-Investor-Darlehen · Vertrag &amp; Tilgungsplan</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn" onclick="printPlan()">🖨 Tilgungsplan</button>
    <button class="btn" onclick="printContract()">🖨 Vertrag</button>
    <button class="btn btn-accent" onclick="saveLoan()">＋ Ins Darlehensregister</button>
  </div>
</div>

<div class="layout">
  <!-- INPUT -->
  <div class="panel input">
    <div class="panel-hd">Darlehensparameter</div>
    <div class="form">
      <div class="fg">
        <label>Darlehenstyp *</label>
        <select id="typ" onchange="calc()">
          <option value="intern">🔄 Internes Darlehen (zwischen Gesellschaften)</option>
          <option value="coinvest">🤝 Co-Investor-Darlehen</option>
        </select>
      </div>
      <div class="frow">
        <div class="fg">
          <label>Bezeichnung / Zweck *</label>
          <input id="bez" type="text" placeholder="z. B. Gesellschafterdarlehen Projekt Rh24" oninput="calc()">
        </div>
        <div class="fg">
          <label>Interne Darlehensnr. (reserviert)</label>
          <input id="dnr" type="text" placeholder="wird vergeben …" oninput="renderContract()" style="font-weight:700;color:var(--intern)">
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label>Darlehensgeber *</label>
          <input id="geber" list="gesell" type="text" placeholder="Gesellschaft / Co-Investor" oninput="calc()">
        </div>
        <div class="fg">
          <label>Darlehensnehmer *</label>
          <input id="nehmer" list="gesell" type="text" placeholder="Gesellschaft" oninput="calc()">
        </div>
      </div>
      <datalist id="gesell">
        <option>Anders MACHER GmbH</option>
        <option>Wohn(T)raum Rheinhessen GmbH</option>
        <option>Wohntraum Kibo GmbH</option>
        <option>Wohntraum Wonnegau GmbH</option>
        <option>Eric Eisenhardt Immobilien</option>
        <option>E&amp;A Weinstrasse Wohninvest eGBR</option>
      </datalist>

      <div class="fsec">Konditionen</div>
      <div class="frow">
        <div class="fg"><label>Darlehensbetrag (€) *</label><input id="betrag" type="number" min="0" step="1000" value="100000" oninput="calc()"></div>
        <div class="fg"><label>Zinssatz % p.a. *</label><input id="zins" type="number" min="0" step="0.01" value="5.00" oninput="calc()"></div>
      </div>
      <div class="fg">
        <label>Rückzahlungsart *</label>
        <select id="art" onchange="calc()">
          <option value="annuitaet">Annuitätendarlehen (konstante Rate)</option>
          <option value="tilgung">Tilgungsdarlehen (konstante Tilgung)</option>
          <option value="endfaellig">Endfälliges Darlehen (nur Zinsen, Tilgung am Ende)</option>
          <option value="zinsfrei">Zins- und tilgungsfrei (Rückzahlung in einer Summe am Ende)</option>
        </select>
      </div>
      <div class="frow">
        <div class="fg" id="tilgWrap"><label>Anfängliche Tilgung % p.a.</label><input id="tilg" type="number" min="0" step="0.01" value="2.00" oninput="calc()"></div>
        <div class="fg"><label>Laufzeit</label>
          <div style="display:flex;gap:6px">
            <input id="laufzeit" type="number" min="1" step="1" value="10" oninput="calc()" style="flex:1">
            <select id="lzEinheit" onchange="calc()" style="flex:0 0 auto"><option value="j">Jahre</option><option value="m">Monate</option></select>
          </div>
        </div>
      </div>
      <div class="frow">
        <div class="fg"><label>Auszahlungsdatum</label><input id="aus" type="date" oninput="calc()"></div>
        <div class="fg"><label>Zahlweise</label>
          <select id="zahlweise" onchange="calc()">
            <option value="12">monatlich</option>
            <option value="4">vierteljährlich</option>
            <option value="1">jährlich</option>
          </select>
        </div>
      </div>
      <div class="fg"><label>Sicherheiten / Besonderheiten</label><textarea id="sicher" rows="2" placeholder="z. B. Nachrang, Grundschuld, Bürgschaft …" oninput="renderContract()"></textarea></div>
      <p class="hint" id="internHint"></p>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="panel">
    <div class="kpis" id="kpis"></div>
    <div class="tabs">
      <button class="tab on" data-t="plan" onclick="setTab('plan')">Zins- &amp; Tilgungsplan</button>
      <button class="tab" data-t="contract" onclick="setTab('contract')">Darlehensvertrag</button>
    </div>
    <div class="tabbody">
      <div id="planWrap">
        <div style="overflow-x:auto"><table id="planTbl"></table></div>
        <p class="hint" id="planNote" style="margin-top:10px"></p>
      </div>
      <div id="contractWrap" style="display:none">
        <div class="contract" id="contract"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SB_URL='https://jqzxctfqvcwbctpjksvg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxenhjdGZxdmN3YmN0cGprc3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzA0MzIsImV4cCI6MjA5NzcwNjQzMn0.RKIbZxJdusKWWPjBJqlxZ8e1m8So02UslOg55YRsn3o';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

const $=id=>document.getElementById(id);
const eur=n=>n==null||isNaN(n)?'—':Math.round(n).toLocaleString('de-DE')+' €';
const eur2=n=>n==null||isNaN(n)?'—':n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
const fmtD=d=>{if(!d)return '—';const p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0];};
const numD=n=>n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function addYears(iso,y){const d=new Date(iso);d.setFullYear(d.getFullYear()+y);return d.toISOString().slice(0,10);}
function addMonths(iso,mo){const d=new Date(iso);d.setMonth(d.getMonth()+mo);return d.toISOString().slice(0,10);}

// Default Auszahlungsdatum heute
$('aus').value=new Date().toISOString().slice(0,10);

let MODEL=null;

// ——— Nächste interne Darlehensnummer aus dem Register reservieren ———
async function reserveNextDnr(){
  let from=0, max=0, done=false;
  while(!done){
    const {data}=await sb.from('loans').select('dnr_intern').range(from,from+999);
    (data||[]).forEach(r=>{ const n=parseInt(String(r.dnr_intern||'').replace(/\D/g,''),10); if(!isNaN(n)&&n>max)max=n; });
    if(!data||data.length<1000)done=true; else from+=1000;
  }
  const next=String(max+1).padStart(3,'0');
  const el=$('dnr'); if(el && !el.value){ el.value=next; renderContract(); }
  return next;
}

function params(){
  return {
    typ:$('typ').value, bez:$('bez').value.trim(), geber:$('geber').value.trim(), nehmer:$('nehmer').value.trim(),
    betrag:parseFloat($('betrag').value)||0, zins:parseFloat($('zins').value)||0,
    art:$('art').value, tilg:parseFloat($('tilg').value)||0,
    laufzeitMon: (($('lzEinheit').value==='m') ? (parseInt($('laufzeit').value)||0) : (parseInt($('laufzeit').value)||0)*12),
    lzEinheit: $('lzEinheit').value,
    aus:$('aus').value,
    perJahr:parseInt($('zahlweise').value)||12, sicher:$('sicher').value.trim(),
    dnr:$('dnr').value.trim(),
  };
}

// Tilgungsplan: Perioden gemäß Zahlweise; Aggregation auf Jahre.
function computeSchedule(p){
  const per=p.perJahr, i=p.zins/100/per;
  let bal=p.betrag;
  const totalPer=Math.max(1, Math.round((p.laufzeitMon||480)*per/12));
  const maxPer=Math.min(totalPer, 50*per);
  let pay=null, principalFixed=null;
  if(p.art==='annuitaet'){ pay=p.betrag*(p.zins+p.tilg)/100/per; }
  else if(p.art==='tilgung'){ principalFixed=p.betrag/totalPer; }
  const periods=[];
  let n=0;
  const nurEnde = (p.art==='endfaellig' || p.art==='zinsfrei');
  while(n<maxPer && (nurEnde ? n<totalPer : bal>0.005)){
    const interest=(p.art==='zinsfrei')?0:bal*i;
    let principal;
    if(p.art==='annuitaet'){ principal=pay-interest; if(principal>bal)principal=bal; if(principal<0)principal=0; }
    else if(p.art==='tilgung'){ principal=Math.min(principalFixed,bal); }
    else { principal=0; }
    const payment=(p.art==='endfaellig')?interest:(p.art==='zinsfrei'?0:(interest+principal));
    bal-=principal;
    periods.push({interest,principal,payment,bal:Math.max(bal,0)});
    n++;
  }
  // Aggregation je Jahr
  const years=[];
  for(let y=0; y*per<periods.length; y++){
    const slice=periods.slice(y*per,(y+1)*per);
    const start = y===0 ? p.betrag : years[y-1].endBal;
    const zins=slice.reduce((a,r)=>a+r.interest,0);
    const tilg=slice.reduce((a,r)=>a+r.principal,0);
    const rate=slice.reduce((a,r)=>a+r.payment,0);
    years.push({jahr:y+1, startBal:start, zins, tilg, rate, endBal:slice[slice.length-1].bal});
  }
  const totalInterest=periods.reduce((a,r)=>a+r.interest,0);
  const endBalance = (p.art==='endfaellig'||p.art==='zinsfrei') ? p.betrag : (periods.length?periods[periods.length-1].bal:p.betrag);
  const ratePeriod = p.art==='annuitaet' ? pay : (periods.length?periods[0].payment:0);
  const paidOff = endBalance<=0.01;
  return {years,totalInterest,endBalance,ratePeriod,periods:periods.length,per,paidOff};
}

function calc(){
  const p=params();
  $('tilgWrap').style.display = p.art==='annuitaet' ? 'flex' : 'none';
  const tilgLabel = $('tilgWrap').querySelector('label');
  MODEL=computeSchedule(p);
  renderKpis(p,MODEL);
  renderPlan(p,MODEL);
  renderContract();
  $('internHint').textContent = p.typ==='intern'
    ? 'Hinweis: Bei konzerninternen Darlehen Fremdvergleichsgrundsatz (§ 1 AStG) beachten – marktüblicher Zins.'
    : 'Hinweis: Co-Investor-Darlehen – ggf. Nachrangabrede und qualifizierter Rangrücktritt prüfen.';
}

function lzText(p){
  const mo=p.laufzeitMon||0; const j=mo/12;
  if(mo%12===0) return j+(j===1?' Jahr':' Jahre');
  if(mo<24) return mo+' Monate';
  return mo+' Monate ('+j.toFixed(1).replace('.',',')+' J.)';
}
function renderKpis(p,m){
  const perLbl={12:'/Monat',4:'/Quartal',1:'/Jahr'}[p.perJahr];
  const laufLbl = m.paidOff ? (m.periods/p.perJahr).toFixed(1).replace('.',',')+' Jahre' : (lzText(p)+' (Plan)');
  $('kpis').innerHTML=[
   ['Rate '+perLbl, eur2(m.ratePeriod), p.art==='tilgung'?'1. Periode (fallend)':(p.art==='endfaellig'?'nur Zinsen':(p.art==='zinsfrei'?'keine laufende Rate':'konstant'))],
   ['Zinsen p.a. (Jahr 1)', eur(m.years.length?m.years[0].zins:0), 'erstes Jahr'],
   ['Gesamtzins (Laufzeit)', eur(m.totalInterest), m.paidOff?'bis Volltilgung':lzText(p)],
   ['Restschuld am Ende', eur(m.endBalance), (p.art==='endfaellig'||p.art==='zinsfrei')?'Rückzahlung am Ende':(m.paidOff?'getilgt':'nach '+lzText(p))],
   ['Volltilgung nach', m.paidOff?(m.periods/p.perJahr).toFixed(1).replace('.',',')+' J.':'> '+lzText(p), m.paidOff?'rechnerisch':'innerhalb Laufzeit nicht erreicht'],
  ].map(k=>`<div class="kpi"><div class="l">${k[0]}</div><div class="v">${k[1]}</div><div class="s">${k[2]}</div></div>`).join('');
}

function renderPlan(p,m){
  let h='<thead><tr><th>Jahr</th><th>Restschuld Anfang</th><th>Zinsen</th><th>Tilgung</th><th>Rate p.a.</th><th>Restschuld Ende</th></tr></thead><tbody>';
  m.years.forEach(y=>{
    h+=`<tr><td>Jahr ${y.jahr}</td><td>${eur(y.startBal)}</td><td>${eur(y.zins)}</td><td>${eur(y.tilg)}</td><td>${eur(y.rate)}</td><td>${eur(y.endBal)}</td></tr>`;
  });
  const tZ=m.years.reduce((a,y)=>a+y.zins,0), tT=m.years.reduce((a,y)=>a+y.tilg,0), tR=m.years.reduce((a,y)=>a+y.rate,0);
  h+=`<tr class="sum"><td>Summe</td><td></td><td>${eur(tZ)}</td><td>${eur(tT)}</td><td>${eur(tR)}</td><td>${eur(m.endBalance)}</td></tr>`;
  h+='</tbody>';
  $('planTbl').innerHTML=h;
  const artLbl={annuitaet:'Annuitätendarlehen',tilgung:'Tilgungsdarlehen',endfaellig:'Endfälliges Darlehen',zinsfrei:'Zins- und tilgungsfreies Darlehen'}[p.art];
  $('planNote').textContent=`${artLbl} · ${p.zins.toLocaleString('de-DE',{minimumFractionDigits:2})} % p.a. · ${({12:'monatliche',4:'vierteljährliche',1:'jährliche'})[p.perJahr]} Zahlung · Auszahlung ${fmtD(p.aus)}. Werte gerundet.`;
}

function renderContract(){
  const p=params(), m=MODEL||computeSchedule(p);
  const perWort={12:'monatlich',4:'vierteljährlich',1:'jährlich'}[p.perJahr];
  const endIso = p.aus ? addMonths(p.aus, p.laufzeitMon||0) : '';
  const typLbl = p.typ==='intern' ? 'Gesellschafter-/Konzerndarlehen' : 'Co-Investor-Darlehen';
  const pill = p.typ==='intern' ? '<span class="pill p-intern">Intern</span>' : '<span class="pill p-co">Co-Investor</span>';
  let rueck;
  if(p.art==='annuitaet') rueck=`Das Darlehen wird in ${perWort}en, gleichbleibenden Raten von ${eur2(m.ratePeriod)} (Annuität, enthält Zins und Tilgung) zurückgeführt. Die anfängliche Tilgung beträgt ${numD(p.tilg)} % p.a.`;
  else if(p.art==='tilgung') rueck=`Das Darlehen wird in gleichbleibenden Tilgungsraten zuzüglich der jeweils fälligen Zinsen ${perWort} zurückgeführt (fallende Gesamtrate, anfänglich ${eur2(m.ratePeriod)}).`;
  else if(p.art==='zinsfrei') rueck=`Während der Laufzeit sind weder Zins- noch Tilgungsleistungen zu erbringen. Die Rückzahlung des gesamten Darlehensbetrags in Höhe von ${eur(p.betrag)} erfolgt in einer Summe spätestens am Ende der Laufzeit. Vorzeitige Teil- oder Vollrückzahlungen sind jederzeit möglich.`;
  else rueck=`Während der Laufzeit sind ausschließlich die Zinsen ${perWort} zu zahlen (${eur2(m.ratePeriod)}). Die Rückzahlung des gesamten Darlehensbetrags erfolgt in einer Summe am Ende der Laufzeit.`;
  const dnrTxt = p.dnr ? `<span class="pill" style="background:rgba(124,58,237,.1);color:var(--intern)">Interne Darlehensnr. ${p.dnr}</span>` : '';
  const sicher = p.sicher ? p.sicher : (p.typ==='coinvest' ? 'Nachrangdarlehen mit qualifiziertem Rangrücktritt; im Übrigen keine gesonderten Sicherheiten.' : 'Keine gesonderten Sicherheiten vereinbart.');

  $('contract').innerHTML=`
    <h1>Darlehensvertrag</h1>
    <div class="ct-sub">${typLbl} ${pill} ${dnrTxt} &nbsp;·&nbsp; ${p.bez||'—'}</div>
    <div class="parties">
      <div><b>Darlehensgeber</b><br>${p.geber||'________________'}</div>
      <div><b>Darlehensnehmer</b><br>${p.nehmer||'________________'}</div>
    </div>
    <p>Die Parteien schließen den folgenden Darlehensvertrag:</p>

    <h3>§ 1 Darlehensbetrag</h3>
    <p>Der Darlehensgeber gewährt dem Darlehensnehmer ein Darlehen in Höhe von <b>${eur(p.betrag)}</b> (in Worten: ${p.betrag?betragWorte(p.betrag):'—'}).</p>

    <h3>§ 2 Auszahlung</h3>
    <p>Die Auszahlung des Darlehensbetrags erfolgt am <b>${fmtD(p.aus)}</b> auf ein vom Darlehensnehmer benanntes Konto.</p>

    <h3>§ 3 Verzinsung</h3>
    <p>${p.art==='zinsfrei' ? 'Das Darlehen ist <b>zinsfrei</b>. Während der gesamten Laufzeit werden keine Zinsen berechnet.' : `Das Darlehen wird mit <b>${numD(p.zins)} % p.a.</b> verzinst. Die Zinsberechnung erfolgt ${perWort} auf den jeweils valutierenden Darlehensbetrag (act/360 bzw. nach Vereinbarung).`}</p>

    <h3>§ 4 Rückzahlung / Tilgung</h3>
    <p>${rueck} Die erste Rate ist einen Zahlungszeitraum nach Auszahlung fällig.</p>

    <h3>§ 5 Laufzeit</h3>
    <p>Die Laufzeit beträgt <b>${lzText(p)}</b> und endet am <b>${fmtD(endIso)}</b>${m.paidOff && p.art!=='endfaellig' ? ` (rechnerische Volltilgung nach ca. ${(m.periods/p.perJahr).toFixed(1).replace('.',',')} Jahren)` : ''}. Sondertilgungen sind jederzeit ohne Vorfälligkeitsentschädigung zulässig.</p>

    <h3>§ 6 Sicherheiten</h3>
    <p>${sicher}</p>

    <h3>§ 7 Kündigung</h3>
    <p>Das Darlehen kann von beiden Parteien mit einer Frist von drei Monaten zum Monatsende gekündigt werden. Das Recht zur außerordentlichen Kündigung aus wichtigem Grund bleibt unberührt.</p>

    <h3>§ 8 Schlussbestimmungen</h3>
    <p>Änderungen und Ergänzungen bedürfen der Schriftform. Sollte eine Bestimmung unwirksam sein, bleibt die Wirksamkeit des Vertrages im Übrigen unberührt. Es gilt deutsches Recht.${p.typ==='intern' ? ' Die Konditionen entsprechen dem Fremdvergleichsgrundsatz (§ 1 AStG).' : ''}</p>

    <div class="sign">
      <div class="box">Ort, Datum · Darlehensgeber<br>${p.geber||''}</div>
      <div class="box">Ort, Datum · Darlehensnehmer<br>${p.nehmer||''}</div>
    </div>
  `;
}

// einfache Betrag-in-Worten (gerundet auf Euro)
function betragWorte(n){
  n=Math.round(n);
  const e=['null','ein','zwei','drei','vier','fünf','sechs','sieben','acht','neun','zehn','elf','zwölf'];
  function unter1000(x){
    let s='';
    const h=Math.floor(x/100); x%=100;
    if(h) s+= (h===1?'ein':e[h])+'hundert';
    if(x>12){ const z=Math.floor(x/10), ei=x%10; const zw=['','','zwanzig','dreißig','vierzig','fünfzig','sechzig','siebzig','achtzig','neunzig'];
      if(ei) s+= (ei===1?'einund':e[ei]+'und')+zw[z]; else s+=zw[z];
    } else if(x>0){ s+=e[x]; }
    return s;
  }
  let out='';
  const mio=Math.floor(n/1000000); n%=1000000;
  const tsd=Math.floor(n/1000); n%=1000;
  if(mio) out+= (mio===1?'eine Million ':unter1000(mio)+' Millionen ');
  if(tsd) out+= (tsd===1?'eintausend':unter1000(tsd)+'tausend');
  if(n) out+= unter1000(n);
  if(!out) out='null';
  return out.charAt(0).toUpperCase()+out.slice(1)+' Euro';
}

function setTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  $('planWrap').style.display = t==='plan'?'block':'none';
  $('contractWrap').style.display = t==='contract'?'block':'none';
}
function printPlan(){ setTab('plan'); $('contractWrap').classList.add('hideprint'); window.print(); setTimeout(()=>$('contractWrap').classList.remove('hideprint'),500); }
function printContract(){ setTab('contract'); $('planWrap').classList.add('hideprint'); window.print(); setTimeout(()=>$('planWrap').classList.remove('hideprint'),500); }

async function saveLoan(){
  const p=params();
  if(!p.bez||!p.geber||!p.nehmer||!p.betrag){ toast('Bitte Bezeichnung, Geber, Nehmer und Betrag ausfüllen.'); return; }
  if(p.art!=='zinsfrei' && !p.zins){ toast('Bitte einen Zinssatz angeben (oder Rückzahlungsart „Zins- und tilgungsfrei" wählen).'); return; }
  const m=MODEL||computeSchedule(p);
  const kd = p.art==='endfaellig' ? m.ratePeriod*(p.perJahr/12) : m.ratePeriod*(p.perJahr/12); // auf Monat normiert
  const rec={
    typ:p.typ, bez:p.bez, geber:p.geber, nehmer:p.nehmer,
    dnr_intern: p.dnr||null,
    betrag:p.betrag, aktuell:p.betrag, zins: p.art==='zinsfrei'?0:p.zins,
    tilg: p.art==='annuitaet'?p.tilg:0,
    kapitaldienst: Math.round(kd*100)/100,
    aus: p.aus||null,
    laufzeit: p.aus?addMonths(p.aus,p.laufzeitMon||0):null,
    zinsbind: p.aus?addMonths(p.aus,p.laufzeitMon||0):null,
    status:'Aktiv',
    notizen:`Darlehensgenerator · ${({annuitaet:'Annuitätendarlehen',tilgung:'Tilgungsdarlehen',endfaellig:'Endfälliges Darlehen',zinsfrei:'Zins- und tilgungsfrei'})[p.art]}`+(p.sicher?` · ${p.sicher}`:''),
  };
  const u=(await sb.auth.getUser()).data.user;
  const {error}=await sb.from('loans').insert({...rec, created_by:u?u.id:null});
  if(error){ toast('Speichern fehlgeschlagen: '+error.message); return; }
  toast('Darlehen Nr. '+(p.dnr||'—')+' ins Register übernommen ✓ (Finance → Darlehen)');
  $('dnr').value=''; await reserveNextDnr();
}
