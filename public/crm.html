<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM – Macher OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f6f7f9;--surf:#fff;--surf2:#f1f3f6;--line:#e6e8ec;--bord2:#eef0f3;--text:#1c2024;--muted:#6b7280;--dim:#4b5563;--accent:#185fa5;--green:#1f7a4d;--red:#c0392b;--warn:#b45309;--r:8px;--rl:12px;}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px}
.hdr{background:var(--surf);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.logo{background:#1a1a2e;color:#fff;font-weight:700;font-size:11px;padding:5px 9px;border-radius:4px}.hdr-title{font-size:16px;font-weight:600}
.nav{display:flex;gap:4px;flex-wrap:wrap}
.nav button{font:inherit;font-size:12.5px;font-weight:600;padding:7px 13px;border:1px solid var(--line);border-radius:8px;background:var(--surf);color:var(--dim);cursor:pointer}.nav button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.spacer{flex:1}
.main{max-width:1280px;margin:0 auto;padding:20px 24px 60px}
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);margin-bottom:16px;overflow:hidden}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.card-bd{padding:14px 16px}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.bar input,.bar select{font:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--surf)}
.bar input{min-width:220px}
.btn{font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer}.btn:hover{opacity:.92}.btn.sec{background:var(--surf2);color:var(--text);border-color:var(--line)}
.tablewrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:700px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--bord2);white-space:nowrap}
th{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700;background:var(--surf2)}
tbody tr:hover td{background:#fafbfc}
.lnk{color:var(--accent);font-weight:600;cursor:pointer}.lnk:hover{text-decoration:underline}
.abtn{font-size:12px;padding:3px 8px;border-radius:5px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer}.abtn:hover{color:var(--red);border-color:var(--red)}
.kb{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kbcol{flex:0 0 250px;background:var(--surf2);border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;max-height:70vh}
.kbcol.over{outline:2px dashed var(--accent);outline-offset:-2px}
.kbcolhd{padding:9px 12px;font-size:11.5px;font-weight:700;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}.kbcolhd .n{color:var(--muted)}
.kbcolbd{padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:40px}
.kbcard{background:var(--surf);border:1px solid var(--line);border-radius:8px;padding:9px 10px;cursor:grab}.kbcard:active{cursor:grabbing}
.kbt{font-weight:600;font-size:12.5px;color:var(--accent);cursor:pointer}.kbm{font-size:11px;color:var(--muted);margin-top:2px}
.kbv{font-size:13px;font-weight:700;margin-top:3px}
.pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;cursor:pointer;white-space:nowrap}.p-offen{background:#eef0f3;color:var(--dim)}.p-erledigt{background:#e8f6ee;color:var(--green)}
.typ{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;background:#e8f2fd;color:var(--accent)}
.empty{text-align:center;padding:26px;color:var(--muted)}
.ov{position:fixed;inset:0;background:rgba(20,25,35,.45);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:32px 16px;overflow:auto}.ov.show{display:flex}
.dlg{background:var(--surf);border-radius:12px;width:100%;max-width:820px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.dlg-hd{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-weight:700}
.dlg-bd{padding:16px 18px;max-height:66vh;overflow:auto}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.fld label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:3px}
.fld input,.fld select,.fld textarea{width:100%;font:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:var(--surf);resize:vertical}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--accent)}
.fld.wide{grid-column:1/-1}
.secttl{font-weight:700;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin:18px 0 8px;border-top:1px solid var(--line);padding-top:12px}
.tl{border-left:2px solid var(--line);padding-left:14px}
.tli{position:relative;margin:9px 0}
.tli::before{content:"";position:absolute;left:-19px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--accent)}
.tli.mail::before{background:#7c3aed}.tli.notiz::before{background:var(--green)}.tli.aktivitaet::before{background:var(--warn)}.tli.erstellt::before{background:var(--muted)}
.tli .ts{font-size:10.5px;color:var(--muted);font-weight:600}
.tli .tx{font-size:12.5px;line-height:1.45;white-space:pre-wrap}
.tli .sub{font-size:11.5px;color:var(--dim)}
.tli a{color:var(--accent)}
.dlg-ft{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:space-between;align-items:center;flex-wrap:wrap}
.dlg-ft textarea{flex:1;min-width:220px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;resize:vertical}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--line);border-radius:var(--r);padding:10px 20px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:300}.toast.show{opacity:1}
@media(max-width:760px){.fgrid{grid-template-columns:1fr}}
</style></head><body>
<div class="hdr">
  <div class="logo">MACHER OS</div><div class="hdr-title">CRM</div>
  <div class="nav" id="nav"></div>
  <div class="spacer"></div>
  <button class="btn" id="newBtn" onclick="openNew()">+ Neu</button>
</div>
<div class="main" id="main"><div class="empty">Lädt…</div></div>

<div class="ov" id="ov" onclick="if(event.target===this)closeDlg()">
  <div class="dlg">
    <div class="dlg-hd"><span id="dlgTitle">Datensatz</span><span class="abtn" onclick="closeDlg()">✕</span></div>
    <div class="dlg-bd">
      <div class="fgrid" id="dlgFields"></div>
      <div id="tlWrap"><div class="secttl">Zeitstrahl — Änderungen, Notizen, E-Mails &amp; Aktivitäten</div><div class="tl" id="tlList"></div></div>
    </div>
    <div class="dlg-ft">
      <textarea id="noteInput" rows="2" placeholder="Notiz zum Datensatz … (Datum &amp; Uhrzeit automatisch)"></textarea>
      <span style="display:flex;gap:8px"><button class="btn sec" onclick="addNote()">+ Notiz</button><button class="btn" onclick="saveEntity()">Speichern</button></span>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const sb=window.supabase.createClient('https://jqzxctfqvcwbctpjksvg.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxenhjdGZxdmN3YmN0cGprc3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzA0MzIsImV4cCI6MjA5NzcwNjQzMn0.RKIbZxJdusKWWPjBJqlxZ8e1m8So02UslOg55YRsn3o');
const $=id=>document.getElementById(id);const esc=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function fmtDT(ts){try{return new Date(ts).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})+' Uhr';}catch(e){return ts;}}
function fmtD(d){if(!d)return '—';const p=String(d).split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0]:d;}
const eur=n=>n==null||n===''?'—':new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
const STUFEN=['Qualifizierung','Bedarfsanalyse','Angebot erstellt','Verhandlung','Gewonnen','Verloren'];
const AKTTYP=['Aufgabe','Anruf','Termin'];
const TBL={kontakt:'crm_kontakte',firma:'crm_firmen',deal:'crm_deals'};
const LBL={kontakt:'Kontakt',firma:'Firma',deal:'Deal'};
const SPEC={
 kontakt:[['vorname','Vorname','text'],['name','Nachname','text'],['email','E-Mail','text'],['telefon','Telefon','text'],['position','Position','text'],['firma_id','Firma','firma'],['notizen','Notizen','textarea']],
 firma:[['name','Firmenname','text'],['branche','Branche','text'],['website','Website','text'],['telefon','Telefon','text'],['adresse','Adresse','text'],['notizen','Notizen','textarea']],
 deal:[['titel','Titel','text'],['firma_id','Firma','firma'],['kontakt_id','Kontakt','kontakt'],['wert','Wert (€)','number'],['stufe','Stufe','stufe'],['wahrscheinlichkeit','Wahrscheinlichkeit (%)','number'],['abschluss_datum','Abschlussdatum','date'],['notizen','Notizen','textarea']]
};
let VIEW='kontakte', K=[],F=[],D=[],A=[],TL=[],M=[], CUR=null, DRAG=null, q='', aFilt={typ:'',status:''};

function initNav(){const t=[['kontakte','Kontakte'],['firmen','Firmen'],['deals','Deals'],['aktivitaeten','Aktivitäten']];
  $('nav').innerHTML=t.map(x=>`<button class="${VIEW===x[0]?'on':''}" onclick="setView('${x[0]}')">${x[1]}</button>`).join('');}
function setView(v){VIEW=v;q='';initNav();render();}

async function load(){
  const[k,f,d,a,tl,m]=await Promise.all([
    sb.from('crm_kontakte').select('*').order('name'),
    sb.from('crm_firmen').select('*').order('name'),
    sb.from('crm_deals').select('*').order('created_at',{ascending:false}),
    sb.from('crm_aktivitaeten').select('*').order('faellig',{ascending:true,nullsFirst:false}),
    sb.from('crm_timeline').select('*').order('created_at',{ascending:false}),
    sb.from('crm_mails').select('*').order('datum',{ascending:false}).limit(1000)
  ]);
  K=k.data||[];F=f.data||[];D=d.data||[];A=a.data||[];TL=tl.data||[];M=m.data||[];
  initNav();render();
}
const firmaName=id=>{const x=F.find(f=>f.id===id);return x?x.name:'';};
const kontaktName=id=>{const x=K.find(k=>k.id===id);return x?((x.vorname||'')+' '+(x.name||'')).trim():'';};
function kName(k){return ((k.vorname||'')+' '+(k.name||'')).trim()||'(ohne Name)';}

function render(){
  if(VIEW==='kontakte')return renderKontakte();
  if(VIEW==='firmen')return renderFirmen();
  if(VIEW==='deals')return renderDeals();
  return renderAkt();
}
function searchBar(ph){return `<div class="bar"><input placeholder="${ph}" value="${esc(q)}" oninput="q=this.value;clearTimeout(window._t);window._t=setTimeout(render,150)"></div>`;}
function match(o,fields){if(!q)return true;const s=q.toLowerCase();return fields.map(f=>o[f]).filter(Boolean).some(v=>String(v).toLowerCase().includes(s));}

function renderKontakte(){
  const list=K.filter(k=>match(k,['vorname','name','email','telefon','position'])||firmaName(k.firma_id).toLowerCase().includes(q.toLowerCase()));
  $('main').innerHTML=`<div class="card"><div class="card-hd"><span>Kontakte <span style="color:var(--muted);font-weight:400">· ${list.length}</span></span></div><div class="card-bd">${searchBar('Kontakt suchen …')}
   ${list.length?`<div class="tablewrap"><table><thead><tr><th>Name</th><th>Firma</th><th>E-Mail</th><th>Telefon</th><th>Position</th><th>Mails</th><th></th></tr></thead><tbody>`+
   list.map(k=>{const mails=mailsFor(k).length;return `<tr>
     <td><span class="lnk" onclick="openEntity('kontakt','${k.id}')">${esc(kName(k))}</span></td>
     <td>${esc(firmaName(k.firma_id))||'—'}</td><td>${esc(k.email)||'—'}</td><td>${esc(k.telefon)||'—'}</td><td>${esc(k.position)||'—'}</td>
     <td>${mails||'—'}</td><td><button class="abtn" onclick="delEntity('kontakt','${k.id}')">✕</button></td></tr>`;}).join('')+
   '</tbody></table></div>':'<div class="empty">Keine Kontakte — oben „+ Neu".</div>'}</div></div>`;
}
function renderFirmen(){
  const list=F.filter(f=>match(f,['name','branche','website','telefon','adresse']));
  $('main').innerHTML=`<div class="card"><div class="card-hd"><span>Firmen <span style="color:var(--muted);font-weight:400">· ${list.length}</span></span></div><div class="card-bd">${searchBar('Firma suchen …')}
   ${list.length?`<div class="tablewrap"><table><thead><tr><th>Firma</th><th>Branche</th><th>Website</th><th>Telefon</th><th>Kontakte</th><th>Deals</th><th></th></tr></thead><tbody>`+
   list.map(f=>`<tr>
     <td><span class="lnk" onclick="openEntity('firma','${f.id}')">${esc(f.name)}</span></td>
     <td>${esc(f.branche)||'—'}</td><td>${f.website?`<a href="${esc(f.website)}" target="_blank" style="color:var(--accent)">${esc(f.website)}</a>`:'—'}</td>
     <td>${esc(f.telefon)||'—'}</td><td>${K.filter(k=>k.firma_id===f.id).length}</td><td>${D.filter(d=>d.firma_id===f.id).length}</td>
     <td><button class="abtn" onclick="delEntity('firma','${f.id}')">✕</button></td></tr>`).join('')+
   '</tbody></table></div>':'<div class="empty">Keine Firmen — oben „+ Neu".</div>'}</div></div>`;
}
function renderDeals(){
  const sum=D.reduce((s,d)=>s+(Number(d.wert)||0),0);
  $('main').innerHTML=`<div class="card"><div class="card-hd"><span>Deals-Pipeline <span style="color:var(--muted);font-weight:400">· ${D.length} · Gesamtwert ${eur(sum)}</span></span></div>
   <div class="card-bd"><div class="kb">`+STUFEN.map(s=>{
     const list=D.filter(d=>d.stufe===s);const wert=list.reduce((a,b)=>a+(Number(b.wert)||0),0);
     const cards=list.map(d=>`<div class="kbcard" draggable="true" ondragstart="dragStart(event,'${d.id}')">
       <div class="kbt" onclick="openEntity('deal','${d.id}')">${esc(d.titel)||'(ohne Titel)'}</div>
       <div class="kbm">${esc(firmaName(d.firma_id))||'—'}${d.kontakt_id?' · '+esc(kontaktName(d.kontakt_id)):''}</div>
       <div class="kbv">${eur(d.wert)}${d.abschluss_datum?`<span style="font-size:10px;font-weight:400;color:var(--muted)"> · ${fmtD(d.abschluss_datum)}</span>`:''}</div>
     </div>`).join('');
     return `<div class="kbcol" ondragover="allowDrop(event,this)" ondragleave="this.classList.remove('over')" ondrop="drop(event,'${esc(s)}',this)">
       <div class="kbcolhd"><span>${esc(s)}</span><span class="n">${list.length} · ${eur(wert)}</span></div>
       <div class="kbcolbd">${cards||'<div class="empty" style="padding:8px;font-size:11px">—</div>'}</div></div>`;}).join('')
   +'</div></div></div>';
}
function renderAkt(){
  let list=A.filter(a=>!aFilt.typ||a.typ===aFilt.typ).filter(a=>!aFilt.status||a.status===aFilt.status);
  if(q)list=list.filter(a=>match(a,['betreff','notizen']));
  $('main').innerHTML=`<div class="card"><div class="card-hd"><span>Aktivitäten <span style="color:var(--muted);font-weight:400">· ${list.length}</span></span></div><div class="card-bd">
   <div class="bar">
     <select onchange="aFilt.typ=this.value;render()"><option value="">Alle Typen</option>${AKTTYP.map(t=>`<option ${aFilt.typ===t?'selected':''}>${t}</option>`).join('')}</select>
     <select onchange="aFilt.status=this.value;render()"><option value="">Alle Status</option><option ${aFilt.status==='offen'?'selected':''}>offen</option><option ${aFilt.status==='erledigt'?'selected':''}>erledigt</option></select>
     <input placeholder="Suchen …" value="${esc(q)}" oninput="q=this.value;clearTimeout(window._t);window._t=setTimeout(render,150)">
   </div>
   ${list.length?`<div class="tablewrap"><table><thead><tr><th>Typ</th><th>Betreff</th><th>Fällig</th><th>Bezug</th><th>Status</th><th>Notiz</th><th></th></tr></thead><tbody>`+
   list.map(a=>`<tr>
     <td><span class="typ">${esc(a.typ)}</span></td>
     <td><input class="inl" style="border:1px solid transparent;background:transparent;font:inherit;font-size:12.5px;min-width:170px" value="${esc(a.betreff)}" onchange="updAkt('${a.id}','betreff',this.value)"></td>
     <td><input type="date" style="border:1px solid transparent;background:transparent;font:inherit;font-size:12.5px" value="${a.faellig||''}" onchange="updAkt('${a.id}','faellig',this.value)"></td>
     <td>${a.kontakt_id?esc(kontaktName(a.kontakt_id)):(a.firma_id?esc(firmaName(a.firma_id)):(a.deal_id?'Deal':'—'))}</td>
     <td><span class="pill ${a.status==='erledigt'?'p-erledigt':'p-offen'}" onclick="toggleAkt('${a.id}')">${esc(a.status)}</span></td>
     <td><input style="border:1px solid transparent;background:transparent;font:inherit;font-size:12.5px;min-width:150px" value="${esc(a.notizen)}" onchange="updAkt('${a.id}','notizen',this.value)"></td>
     <td><button class="abtn" onclick="delAkt('${a.id}')">✕</button></td></tr>`).join('')+
   '</tbody></table></div>':'<div class="empty">Keine Aktivitäten — oben „+ Neu".</div>'}</div></div>`;
}

// ——— Drag & Drop Deals ———
function dragStart(ev,id){DRAG=id;ev.dataTransfer.effectAllowed='move';}
function allowDrop(ev,el){ev.preventDefault();el.classList.add('over');}
async function drop(ev,stufe,el){ev.preventDefault();el.classList.remove('over');if(!DRAG)return;const id=DRAG;DRAG=null;
  const d=D.find(x=>x.id===id);if(!d||d.stufe===stufe)return;const alt=d.stufe;
  const{error}=await sb.from('crm_deals').update({stufe,updated_at:new Date().toISOString()}).eq('id',id);
  if(error){toast(error.message);return;}
  d.stufe=stufe;await logTL('deal',id,'aenderung',{feld:'Stufe',alt,neu:stufe});render();}

// ——— Aktivitäten ———
async function updAkt(id,f,v){const{error}=await sb.from('crm_aktivitaeten').update({[f]:v===''?null:v,updated_at:new Date().toISOString()}).eq('id',id);if(error){toast(error.message);return;}const a=A.find(x=>x.id===id);if(a)a[f]=v;}
async function toggleAkt(id){const a=A.find(x=>x.id===id);const s=a.status==='erledigt'?'offen':'erledigt';await sb.from('crm_aktivitaeten').update({status:s}).eq('id',id);a.status=s;render();}
async function delAkt(id){if(!confirm('Aktivität löschen?'))return;await sb.from('crm_aktivitaeten').delete().eq('id',id);A=A.filter(x=>x.id!==id);render();}

// ——— Timeline ———
async function logTL(typ,id,art,o){const rec={entity_typ:typ,entity_id:id,art,feld:o.feld||null,alt:o.alt==null?null:String(o.alt),neu:o.neu==null?null:String(o.neu),text:o.text||null};
  const{data}=await sb.from('crm_timeline').insert(rec).select();if(data&&data[0])TL.unshift(data[0]);if(CUR&&CUR.id===id)renderTL();}
function mailsFor(k){if(!k||!k.email)return [];const e=k.email.toLowerCase();return M.filter(m=>((m.von||'')+' '+(m.an||'')).toLowerCase().includes(e));}
function renderTL(){
  if(!CUR||!CUR.id){$('tlWrap').style.display='none';return;}
  $('tlWrap').style.display='';
  const items=[];
  TL.filter(t=>t.entity_typ===CUR.typ&&t.entity_id===CUR.id).forEach(t=>items.push({t:t.created_at,art:t.art,feld:t.feld,alt:t.alt,neu:t.neu,text:t.text}));
  // Aktivitäten
  A.filter(a=>(CUR.typ==='kontakt'&&a.kontakt_id===CUR.id)||(CUR.typ==='firma'&&a.firma_id===CUR.id)||(CUR.typ==='deal'&&a.deal_id===CUR.id))
   .forEach(a=>items.push({t:a.created_at,art:'aktivitaet',text:a.typ+': '+(a.betreff||'')+(a.faellig?' · fällig '+fmtD(a.faellig):'')+' · '+a.status}));
  // Mails
  let mails=[];
  if(CUR.typ==='kontakt'){const k=K.find(x=>x.id===CUR.id);mails=mailsFor(k);}
  else if(CUR.typ==='firma'){K.filter(k=>k.firma_id===CUR.id).forEach(k=>{mails=mails.concat(mailsFor(k));});}
  else if(CUR.typ==='deal'){const d=D.find(x=>x.id===CUR.id);if(d&&d.kontakt_id){const k=K.find(x=>x.id===d.kontakt_id);mails=mailsFor(k);}}
  mails.forEach(m=>items.push({t:m.datum||m.created_at,art:'mail',text:m.betreff||'(kein Betreff)',sub:(m.von||'')+' → '+(m.an||''),snippet:m.snippet,link:m.link}));
  items.sort((a,b)=>new Date(b.t)-new Date(a.t));
  $('tlList').innerHTML=items.length?items.map(i=>{
    if(i.art==='mail')return `<div class="tli mail"><div class="ts">✉ E-Mail · ${fmtDT(i.t)}</div><div class="tx"><b>${esc(i.text)}</b>${i.link?` <a href="${esc(i.link)}" target="_blank">↗</a>`:''}</div><div class="sub">${esc(i.sub)}</div>${i.snippet?`<div class="sub" style="color:var(--muted)">${esc(i.snippet)}</div>`:''}</div>`;
    if(i.art==='notiz')return `<div class="tli notiz"><div class="ts">📝 Notiz · ${fmtDT(i.t)}</div><div class="tx">${esc(i.text)}</div></div>`;
    if(i.art==='aktivitaet')return `<div class="tli aktivitaet"><div class="ts">📌 Aktivität · ${fmtDT(i.t)}</div><div class="tx">${esc(i.text)}</div></div>`;
    if(i.art==='erstellt')return `<div class="tli erstellt"><div class="ts">➕ ${fmtDT(i.t)}</div><div class="tx">${esc(i.text||'Datensatz angelegt')}</div></div>`;
    return `<div class="tli"><div class="ts">🔄 Änderung · ${fmtDT(i.t)}</div><div class="tx"><b>${esc(i.feld)}</b>: ${esc(i.alt||'—')} → ${esc(i.neu||'—')}</div></div>`;
  }).join(''):'<div class="empty" style="padding:10px">Noch keine Einträge.</div>';
}

// ——— Dialog ———
function fieldHtml(typ,f,val){
  const [key,label,kind]=f;
  let inp;
  if(kind==='textarea')inp=`<textarea id="m_${key}" rows="3">${esc(val)}</textarea>`;
  else if(kind==='firma')inp=`<select id="m_${key}"><option value="">—</option>${F.map(x=>`<option value="${x.id}" ${x.id===val?'selected':''}>${esc(x.name)}</option>`).join('')}</select>`;
  else if(kind==='kontakt')inp=`<select id="m_${key}"><option value="">—</option>${K.map(x=>`<option value="${x.id}" ${x.id===val?'selected':''}>${esc(kName(x))}</option>`).join('')}</select>`;
  else if(kind==='stufe')inp=`<select id="m_${key}">${STUFEN.map(s=>`<option ${s===val?'selected':''}>${esc(s)}</option>`).join('')}</select>`;
  else inp=`<input id="m_${key}" type="${kind==='number'?'number':kind==='date'?'date':'text'}" value="${val==null?'':esc(val)}">`;
  return `<div class="fld ${kind==='textarea'?'wide':''}"><label>${label}</label>${inp}</div>`;
}
function openEntity(typ,id){
  const rec=(typ==='kontakt'?K:typ==='firma'?F:D).find(x=>x.id===id);if(!rec)return;
  CUR={typ,id,rec:{...rec}};
  $('dlgTitle').textContent=LBL[typ]+' · '+(typ==='kontakt'?kName(rec):typ==='firma'?rec.name:(rec.titel||'Deal'));
  $('dlgFields').innerHTML=SPEC[typ].map(f=>fieldHtml(typ,f,rec[f[0]])).join('');
  $('noteInput').value='';renderTL();$('ov').classList.add('show');
}
function openNew(){
  if(VIEW==='aktivitaeten')return openNewAkt();
  const typ=VIEW==='kontakte'?'kontakt':VIEW==='firmen'?'firma':'deal';
  CUR={typ,id:null,rec:{}};
  $('dlgTitle').textContent='Neuer '+LBL[typ];
  $('dlgFields').innerHTML=SPEC[typ].map(f=>fieldHtml(typ,f,typ==='deal'&&f[0]==='stufe'?STUFEN[0]:'')).join('');
  $('noteInput').value='';$('tlWrap').style.display='none';$('ov').classList.add('show');
}
async function openNewAkt(){
  const betreff=prompt('Betreff der Aktivität:');if(!betreff)return;
  const typ=prompt('Typ (Aufgabe / Anruf / Termin):','Aufgabe')||'Aufgabe';
  const{data,error}=await sb.from('crm_aktivitaeten').insert({typ:AKTTYP.includes(typ)?typ:'Aufgabe',betreff,status:'offen'}).select();
  if(error){toast(error.message);return;}
  if(data&&data[0])A.unshift(data[0]);render();
}
function closeDlg(){$('ov').classList.remove('show');CUR=null;}
async function saveEntity(){
  if(!CUR)return;const {typ,id,rec}=CUR;const row={};
  SPEC[typ].forEach(f=>{const el=$('m_'+f[0]);if(!el)return;let v=el.value;if(v==='')v=null;
    if(f[2]==='number'&&v!=null)v=Number(v);row[f[0]]=v;});
  row.updated_at=new Date().toISOString();
  if(id){
    const changes=SPEC[typ].filter(f=>String(rec[f[0]]==null?'':rec[f[0]])!==String(row[f[0]]==null?'':row[f[0]]));
    const{error}=await sb.from(TBL[typ]).update(row).eq('id',id);if(error){toast(error.message);return;}
    for(const f of changes){let alt=rec[f[0]],neu=row[f[0]];
      if(f[2]==='firma'){alt=firmaName(alt);neu=firmaName(neu);}
      if(f[2]==='kontakt'){alt=kontaktName(alt);neu=kontaktName(neu);}
      await logTL(typ,id,'aenderung',{feld:f[1],alt,neu});}
    toast(changes.length?changes.length+' Änderung(en) gespeichert ✓':'Keine Änderungen');
  } else {
    const{data,error}=await sb.from(TBL[typ]).insert(row).select();if(error){toast(error.message);return;}
    if(data&&data[0])await logTL(typ,data[0].id,'erstellt',{text:LBL[typ]+' angelegt'});
    toast(LBL[typ]+' angelegt ✓');
  }
  closeDlg();load();
}
async function addNote(){
  if(!CUR||!CUR.id){toast('Erst speichern, dann Notiz');return;}
  const t=$('noteInput').value.trim();if(!t){toast('Bitte Text eingeben');return;}
  await logTL(CUR.typ,CUR.id,'notiz',{text:t});$('noteInput').value='';toast('Notiz gespeichert ✓');
}
async function delEntity(typ,id){if(!confirm(LBL[typ]+' löschen?'))return;await sb.from(TBL[typ]).delete().eq('id',id);await sb.from('crm_timeline').delete().eq('entity_typ',typ).eq('entity_id',id);load();}

(async()=>{const{data:{session}}=await sb.auth.getSession();if(!session){$('main').innerHTML='<div class="empty" style="padding:60px">Bitte zuerst im OS einloggen.</div>';return;}load();})();
</script></body></html>
