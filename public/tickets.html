<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticketsystem – Wohntraum OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f6f7f9;--surf:#fff;--surf2:#f1f3f6;--line:#e6e8ec;--bord2:#eef0f3;--text:#1c2024;--muted:#6b7280;--dim:#4b5563;--accent:#185fa5;--green:#1f7a4d;--red:#c0392b;--warn:#b45309;--r:8px;--rl:12px;}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px}
.hdr{background:var(--surf);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.logo{background:#1a1a2e;color:#fff;font-weight:700;font-size:11px;padding:5px 9px;border-radius:4px}.hdr-title{font-size:16px;font-weight:600}
.nav{display:flex;gap:4px;flex-wrap:wrap}
.nav button{font:inherit;font-size:12.5px;font-weight:600;padding:7px 13px;border:1px solid var(--line);border-radius:8px;background:var(--surf);color:var(--dim);cursor:pointer}.nav button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.spacer{flex:1}
.main{max-width:1280px;margin:0 auto;padding:20px 24px 60px}
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);margin-bottom:16px;overflow:hidden}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.card-bd{padding:14px 16px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:760px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);padding:13px 15px}
.kpi .n{font-size:22px;font-weight:700;line-height:1.2}
.kpi .l{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.kpi.warn .n{color:var(--red)}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.bar input,.bar select{font:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--surf)}
.bar input{min-width:220px}
.btn{font:inherit;font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer}.btn:hover{opacity:.92}
.btn.sec{background:var(--surf2);color:var(--text);border-color:var(--line)}
.tablewrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:900px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--bord2);white-space:nowrap}
th{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700;background:var(--surf2)}
tbody tr:hover td{background:#fafbfc}
.lnk{color:var(--accent);font-weight:600;cursor:pointer}.lnk:hover{text-decoration:underline}
.abtn{font:inherit;font-size:12px;padding:3px 8px;border-radius:5px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer}.abtn:hover{color:var(--red);border-color:var(--red)}
.pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;white-space:nowrap}
.s-Neu{background:#e8f2fd;color:var(--accent)}.s-InBearbeitung{background:#fdf1e0;color:var(--warn)}
.s-Wartet{background:#f1f3f6;color:var(--dim)}.s-Erledigt{background:#e8f6ee;color:var(--green)}
.pr{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px}
.pr-P1{background:#fdecea;color:var(--red)}.pr-P2{background:#e8f2fd;color:var(--accent)}.pr-P3{background:#f1f3f6;color:var(--muted)}
.ov{position:fixed;inset:0;background:rgba(20,25,35,.45);display:none;align-items:flex-start;justify-content:center;z-index:200;padding:32px 16px;overflow:auto}.ov.show{display:flex}
.dlg{background:var(--surf);border-radius:12px;width:100%;max-width:760px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.dlg-hd{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-weight:700}
.dlg-bd{padding:16px 18px;max-height:70vh;overflow:auto}
.dlg-ft{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
@media(max-width:760px){.fgrid{grid-template-columns:1fr}}
.fld label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:3px}
.fld input,.fld select,.fld textarea{width:100%;font:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:var(--surf);resize:vertical}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--accent)}
.fld.wide{grid-column:1/-1}
.asana{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:#f06a6a;text-decoration:none}
.asana:hover{text-decoration:underline}
.kb{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kbcol{flex:0 0 270px;background:var(--surf2);border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;max-height:70vh}
.kbcol.over{outline:2px dashed var(--accent);outline-offset:-2px}
.kbcolhd{padding:9px 12px;font-size:11.5px;font-weight:700;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}.kbcolhd .n{color:var(--muted)}
.kbcolbd{padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:40px}
.kbcard{background:var(--surf);border:1px solid var(--line);border-radius:8px;padding:9px 10px;cursor:grab}.kbcard:active{cursor:grabbing}
.kbt{font-weight:600;font-size:12.5px;color:var(--accent);cursor:pointer}
.kbm{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.due-over{color:var(--red);font-weight:700}.due-soon{color:var(--warn);font-weight:700}
.empty{text-align:center;padding:26px;color:var(--muted)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--line);border-radius:var(--r);padding:10px 20px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:300}.toast.show{opacity:1}
</style></head><body>
<div class="hdr">
  <div class="logo">WOHNTRAUM OS</div><div class="hdr-title">Ticketsystem</div>
  <div class="nav" id="nav"></div>
  <div class="spacer"></div>
  <button class="btn" onclick="openNew()">+ Ticket</button>
</div>
<div class="main" id="main"><div class="empty">Lädt…</div></div>

<div class="ov" id="ov" onclick="if(event.target===this)closeDlg()">
  <div class="dlg">
    <div class="dlg-hd"><span id="dlgTitle">Ticket</span><span class="abtn" onclick="closeDlg()">✕</span></div>
    <div class="dlg-bd">
      <div class="fgrid">
        <div class="fld wide"><label>Titel</label><input id="f_titel" type="text"></div>
        <div class="fld"><label>Status</label><select id="f_status"></select></div>
        <div class="fld"><label>Priorität</label><select id="f_prio"></select></div>
        <div class="fld"><label>Kontakt</label><select id="f_kontakt_id"></select></div>
        <div class="fld"><label>Firma</label><select id="f_firma_id"></select></div>
        <div class="fld"><label>Verantwortlich</label><select id="f_verantwortlich"></select></div>
        <div class="fld"><label>Fällig am</label><input id="f_faellig" type="date"></div>
        <div class="fld wide"><label>Asana-Link <span style="font-weight:400;text-transform:none">(Aufgabe in Asana zum aktuellen Stand)</span></label>
          <input id="f_asana_url" type="text" placeholder="https://app.asana.com/…"></div>
        <div class="fld wide"><label>Beschreibung</label><textarea id="f_beschreibung" rows="5"></textarea></div>
      </div>
      <div id="asanaHint" style="margin-top:10px"></div>
    </div>
    <div class="dlg-ft">
      <button class="btn sec" onclick="closeDlg()">Abbrechen</button>
      <button class="btn" onclick="saveTicket()">Speichern</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const sb=window.supabase.createClient('https://jqzxctfqvcwbctpjksvg.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxenhjdGZxdmN3YmN0cGprc3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzA0MzIsImV4cCI6MjA5NzcwNjQzMn0.RKIbZxJdusKWWPjBJqlxZ8e1m8So02UslOg55YRsn3o');
const $=id=>document.getElementById(id);
const esc=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function fmtD(d){if(!d)return '—';const p=String(d).split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0]:d;}

const STATUS=['Neu','In Bearbeitung','Wartet','Erledigt'];
const PRIO=['P1','P2','P3'];
const PERS=['','Eric','Jürgen','Stephan','Ramona','Extern'];
const sCls=s=>'s-'+String(s||'Neu').replace(/\s+/g,'');
const heute=()=>new Date().toISOString().slice(0,10);

let VIEW='offen', T=[], K=[], F=[], CUR=null, DRAG=null, q='', fPrio='', fKontakt='', fVer='';

const kName=k=>((k.vorname||'')+' '+(k.name||'')).trim()||'(ohne Name)';
const kontaktName=id=>{const x=K.find(k=>k.id===id);return x?kName(x):'';};
const firmaName=id=>{const x=F.find(f=>f.id===id);return x?x.name:'';};

async function load(){
  const[t,k,f]=await Promise.all([
    sb.from('crm_tickets').select('*').order('created_at',{ascending:false}),
    sb.from('crm_kontakte').select('*').order('name'),
    sb.from('crm_firmen').select('*').order('name')
  ]);
  T=t.data||[];K=k.data||[];F=f.data||[];
  initNav();render();
}

function initNav(){const t=[['offen','Meine offenen ToDos'],['alle','Alle Tickets'],['board','Board']];
  $('nav').innerHTML=t.map(x=>`<button class="${VIEW===x[0]?'on':''}" onclick="setView('${x[0]}')">${x[1]}</button>`).join('');}
function setView(v){VIEW=v;render();}

function dueCls(t){
  if(!t.faellig||t.status==='Erledigt')return '';
  const d=t.faellig,h=heute();
  if(d<h)return 'due-over';
  const in3=new Date(Date.now()+3*864e5).toISOString().slice(0,10);
  return d<=in3?'due-soon':'';
}
function baseList(){
  let l=T.slice();
  if(q){const s=q.toLowerCase();l=l.filter(t=>[t.titel,t.beschreibung,kontaktName(t.kontakt_id),firmaName(t.firma_id)].filter(Boolean).some(v=>String(v).toLowerCase().includes(s)));}
  if(fPrio)l=l.filter(t=>t.prio===fPrio);
  if(fKontakt)l=l.filter(t=>t.kontakt_id===fKontakt);
  if(fVer)l=l.filter(t=>(t.verantwortlich||'')===fVer);
  return l;
}
function kpis(){
  const offen=T.filter(t=>t.status!=='Erledigt');
  const ueber=offen.filter(t=>t.faellig&&t.faellig<heute()).length;
  const heuteF=offen.filter(t=>t.faellig===heute()).length;
  const p1=offen.filter(t=>t.prio==='P1').length;
  return `<div class="kpis">
    <div class="kpi"><div class="n">${offen.length}</div><div class="l">Offene Tickets</div></div>
    <div class="kpi ${ueber?'warn':''}"><div class="n">${ueber}</div><div class="l">Überfällig</div></div>
    <div class="kpi"><div class="n">${heuteF}</div><div class="l">Heute fällig</div></div>
    <div class="kpi"><div class="n">${p1}</div><div class="l">Priorität P1</div></div>
  </div>`;
}
function filterBar(){
  return `<div class="bar">
    <input placeholder="Ticket suchen …" value="${esc(q)}" oninput="q=this.value;clearTimeout(window._t);window._t=setTimeout(render,150)">
    <select onchange="fPrio=this.value;render()"><option value="">Alle Prioritäten</option>${PRIO.map(p=>`<option ${fPrio===p?'selected':''}>${p}</option>`).join('')}</select>
    <select onchange="fVer=this.value;render()"><option value="">Alle Verantwortlichen</option>${PERS.filter(Boolean).map(p=>`<option ${fVer===p?'selected':''}>${esc(p)}</option>`).join('')}</select>
    <select onchange="fKontakt=this.value;render()"><option value="">Alle Kontakte</option>${K.map(k=>`<option value="${k.id}" ${fKontakt===k.id?'selected':''}>${esc(kName(k))}</option>`).join('')}</select>
  </div>`;
}
function rows(list){
  return list.map(t=>`<tr>
    <td style="color:var(--muted);font-weight:700">#${t.nummer}</td>
    <td><span class="lnk" onclick="openTicket('${t.id}')">${esc(t.titel)}</span></td>
    <td><span class="pill ${sCls(t.status)}">${esc(t.status)}</span></td>
    <td><span class="pr pr-${esc(t.prio||'P2')}">${esc(t.prio||'P2')}</span></td>
    <td>${esc(kontaktName(t.kontakt_id))||esc(firmaName(t.firma_id))||'—'}</td>
    <td>${esc(t.verantwortlich)||'—'}</td>
    <td class="${dueCls(t)}">${fmtD(t.faellig)}</td>
    <td>${t.asana_url?`<a class="asana" href="${esc(t.asana_url)}" target="_blank" rel="noopener">● Asana ↗</a>`:'—'}</td>
    <td><button class="abtn" onclick="delTicket('${t.id}')">✕</button></td></tr>`).join('');
}
function render(){
  if(VIEW==='board')return renderBoard();
  const all=baseList();
  const list=VIEW==='offen'?all.filter(t=>t.status!=='Erledigt').sort((a,b)=>(a.faellig||'9999')<(b.faellig||'9999')?-1:1):all;
  $('main').innerHTML=kpis()+`<div class="card"><div class="card-hd"><span>${VIEW==='offen'?'Offene ToDos':'Alle Tickets'} <span style="color:var(--muted);font-weight:400">· ${list.length}</span></span></div>
   <div class="card-bd">${filterBar()}
   ${list.length?`<div class="tablewrap"><table><thead><tr><th>Nr</th><th>Titel</th><th>Status</th><th>Prio</th><th>Bezug</th><th>Verantwortlich</th><th>Fällig</th><th>Asana</th><th></th></tr></thead><tbody>${rows(list)}</tbody></table></div>`
   :'<div class="empty">Keine Tickets — oben „+ Ticket".</div>'}</div></div>`;
}
function renderBoard(){
  const list=baseList();
  $('main').innerHTML=kpis()+`<div class="card"><div class="card-hd"><span>Board <span style="color:var(--muted);font-weight:400">· ${list.length}</span></span></div>
   <div class="card-bd">${filterBar()}<div class="kb">`+STATUS.map(s=>{
     const l=list.filter(t=>(t.status||'Neu')===s);
     const cards=l.map(t=>`<div class="kbcard" draggable="true" ondragstart="dragStart(event,'${t.id}')">
       <div class="kbt" onclick="openTicket('${t.id}')">#${t.nummer} · ${esc(t.titel)}</div>
       <div class="kbm"><span class="pr pr-${esc(t.prio||'P2')}">${esc(t.prio||'P2')}</span>
         ${t.faellig?`<span class="${dueCls(t)}">${fmtD(t.faellig)}</span>`:''}
         ${t.kontakt_id?`<span>${esc(kontaktName(t.kontakt_id))}</span>`:''}
         ${t.asana_url?`<a class="asana" href="${esc(t.asana_url)}" target="_blank" rel="noopener">● Asana ↗</a>`:''}</div>
     </div>`).join('');
     return `<div class="kbcol" ondragover="allowDrop(event,this)" ondragleave="this.classList.remove('over')" ondrop="drop(event,'${esc(s)}',this)">
       <div class="kbcolhd"><span>${esc(s)}</span><span class="n">${l.length}</span></div>
       <div class="kbcolbd">${cards||'<div class="empty" style="padding:8px;font-size:11px">—</div>'}</div></div>`;}).join('')
   +'</div></div></div>';
}

function dragStart(ev,id){DRAG=id;ev.dataTransfer.effectAllowed='move';}
function allowDrop(ev,el){ev.preventDefault();el.classList.add('over');}
async function drop(ev,status,el){
  ev.preventDefault();el.classList.remove('over');
  const t=T.find(x=>x.id===DRAG);if(!t||t.status===status)return;
  await setStatus(t.id,status);
}
async function setStatus(id,status){
  const patch={status,updated_at:new Date().toISOString(),erledigt_at:status==='Erledigt'?new Date().toISOString():null};
  const{error}=await sb.from('crm_tickets').update(patch).eq('id',id);
  if(error){toast(error.message);return;}
  const t=T.find(x=>x.id===id);if(t)Object.assign(t,patch);
  render();toast('Status: '+status+' ✓');
}

function selOpts(list,val,fn){return '<option value="">—</option>'+list.map(x=>`<option value="${x.id}" ${x.id===val?'selected':''}>${esc(fn(x))}</option>`).join('');}
function fillForm(t){
  $('f_titel').value=t.titel||'';
  $('f_status').innerHTML=STATUS.map(s=>`<option ${(t.status||'Neu')===s?'selected':''}>${s}</option>`).join('');
  $('f_prio').innerHTML=PRIO.map(p=>`<option ${(t.prio||'P2')===p?'selected':''}>${p}</option>`).join('');
  $('f_kontakt_id').innerHTML=selOpts(K,t.kontakt_id,kName);
  $('f_firma_id').innerHTML=selOpts(F,t.firma_id,x=>x.name);
  $('f_verantwortlich').innerHTML=PERS.map(p=>`<option value="${esc(p)}" ${(t.verantwortlich||'')===p?'selected':''}>${p||'—'}</option>`).join('');
  $('f_faellig').value=t.faellig||'';
  $('f_asana_url').value=t.asana_url||'';
  $('f_beschreibung').value=t.beschreibung||'';
  $('asanaHint').innerHTML=t.asana_url
    ? `<a class="asana" href="${esc(t.asana_url)}" target="_blank" rel="noopener">● Aufgabe in Asana öffnen ↗</a>
       <div style="font-size:11.5px;color:var(--muted);margin-top:4px">Der Bearbeitungsstand wird in Asana gepflegt. Dieses Ticket verweist nur darauf.</div>`
    : '<div style="font-size:11.5px;color:var(--muted)">Noch kein Asana-Link hinterlegt. Aufgaben-URL aus Asana kopieren und oben einfügen.</div>';
}
function openTicket(id){
  const t=T.find(x=>x.id===id);if(!t)return;
  CUR={id};$('dlgTitle').textContent='Ticket #'+t.nummer;
  fillForm(t);$('ov').classList.add('show');
}
function openNew(){
  CUR={id:null};$('dlgTitle').textContent='Neues Ticket';
  fillForm({status:'Neu',prio:'P2'});$('ov').classList.add('show');
}
function closeDlg(){$('ov').classList.remove('show');CUR=null;}

async function saveTicket(){
  if(!CUR)return;
  const titel=$('f_titel').value.trim();
  if(!titel){toast('Titel fehlt');return;}
  const status=$('f_status').value;
  const row={titel,status,prio:$('f_prio').value,
    kontakt_id:$('f_kontakt_id').value||null,firma_id:$('f_firma_id').value||null,
    verantwortlich:$('f_verantwortlich').value||null,faellig:$('f_faellig').value||null,
    asana_url:$('f_asana_url').value.trim()||null,beschreibung:$('f_beschreibung').value||null,
    updated_at:new Date().toISOString(),
    erledigt_at:status==='Erledigt'?new Date().toISOString():null};
  if(CUR.id){const{error}=await sb.from('crm_tickets').update(row).eq('id',CUR.id);if(error){toast(error.message);return;}toast('Ticket gespeichert ✓');}
  else{const{error}=await sb.from('crm_tickets').insert(row);if(error){toast(error.message);return;}toast('Ticket angelegt ✓');}
  closeDlg();load();
}
async function delTicket(id){
  const t=T.find(x=>x.id===id);
  if(!confirm('Ticket #'+(t?t.nummer:'')+' löschen?'))return;
  await sb.from('crm_tickets').delete().eq('id',id);load();
}

window.setView=setView;window.openTicket=openTicket;window.openNew=openNew;window.closeDlg=closeDlg;
window.saveTicket=saveTicket;window.delTicket=delTicket;window.setStatus=setStatus;
window.dragStart=dragStart;window.allowDrop=allowDrop;window.drop=drop;

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session){$('main').innerHTML='<div class="empty" style="padding:60px">Bitte zuerst im OS einloggen.</div>';return;}
  const p=new URLSearchParams(location.search);
  if(p.get('kontakt'))fKontakt=p.get('kontakt');
  load();
})();
</script></body></html>
